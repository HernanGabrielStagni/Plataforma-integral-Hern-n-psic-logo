      /* Feriado local: 11 de noviembre — Día de Río Cuarto */
      function getFeriadoSet(extraFeriados = []) {
        const map = {};
        Object.entries(FERIADOS_NAC_RAW).forEach(([year, dias]) => {
          dias.forEach(([m, d, nombre]) => {
            const k = `${year}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
            map[k] = { nombre, tipo: "nacional" };
          });
        });
        for (let y = 2024; y <= 2030; y++) {
          map[`${y}-11-11`] = { nombre: "Día de Río Cuarto", tipo: "local" };
        }
        extraFeriados.forEach((f) => {
          map[f.fecha] = {
            nombre: f.nombre || "Feriado",
            tipo: f.tipo || "local",
          };
        });
        return map;
      }

      function timeToPx(time) {
        const [h, m] = time.split(":").map(Number);
        return (h - AG_START) * AG_PX_H + m * (AG_PX_H / 60);
      }
      function durPx(start, end) {
        const [sh, sm] = start.split(":").map(Number);
        const [eh, em] = end.split(":").map(Number);
        return ((eh - sh) * 60 + (em - sm)) * (AG_PX_H / 60);
      }
      function calcFin(start, mins) {
        const [h, m] = start.split(":").map(Number);
        const t = h * 60 + m + mins;
        return `${String(Math.floor(t / 60)).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`;
      }
      function getWeekDates(base) {
        const d =
          typeof base === "string"
            ? new Date(base + "T12:00:00")
            : new Date(base);
        const day = d.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        const lun = new Date(d);
        lun.setDate(d.getDate() + diff);
        const days = [];
        for (let i = 0; i < 7; i++) {
          const dd = new Date(lun);
          dd.setDate(lun.getDate() + i);
          days.push(dd);
        }
        return days;
      }
      /* Convierte Date a "YYYY-MM-DD" usando hora LOCAL (no UTC) para evitar
         el desfase de zona horaria que produce toISOString() en UTC-3 Argentina */
      function dateStr(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }
      function getMondayStr(fechaStr) {
        if (!fechaStr) return null;
        const d = new Date(fechaStr + "T12:00:00");
        const day = d.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        d.setDate(d.getDate() + diff);
        return dateStr(d);
      }

      /* Calcula la edad en años desde una fecha de nacimiento "YYYY-MM-DD" */
      function calcularEdad(fechaNacimiento) {
        if (!fechaNacimiento) return null;
        const hoy = new Date();
        const nac = new Date(fechaNacimiento + "T00:00:00");
        let edad = hoy.getFullYear() - nac.getFullYear();
        const mesActual = hoy.getMonth();
        const diaActual = hoy.getDate();
        const mesNac = nac.getMonth();
        const diaNac = nac.getDate();
        if (
          mesActual < mesNac ||
          (mesActual === mesNac && diaActual < diaNac)
        ) {
          edad--;
        }
        return edad;
      }

      /* Slots de 30 min para la grilla: 8:00, 8:30 … 19:30 */
      const AG_SLOTS = [];
      for (let h = AG_START; h < AG_END; h++) {
        AG_SLOTS.push(`${String(h).padStart(2, "0")}:00`);
        AG_SLOTS.push(`${String(h).padStart(2, "0")}:30`);
      }

      /* ═══════════════════════════════════════ */
      /* AGENDA: GRILLA SEMANAL                 */
      /* ═══════════════════════════════════════ */
      /* Distribuye sesiones superpuestas en    */
      /* sub-columnas (estilo Google Calendar). */
      /* Retorna array con { ...sesion, col, ncols } */
      function layoutSessions(sessions) {
        if (!sessions.length) return [];
        const sorted = [...sessions].sort((a, b) =>
          a.horaInicio.localeCompare(b.horaInicio),
        );

        function overlaps(a, b) {
          return a.horaInicio < b.horaFin && b.horaInicio < a.horaFin;
        }

        // Asignar columna a cada sesión
        const out = sorted.map((s) => ({ ...s, col: 0, ncols: 1 }));
        for (let i = 0; i < out.length; i++) {
          const ocupadas = new Set();
          for (let j = 0; j < i; j++) {
            if (overlaps(out[j], out[i])) ocupadas.add(out[j].col);
          }
          let c = 0;
          while (ocupadas.has(c)) c++;
          out[i].col = c;
        }

        // Calcular ncols = máxima columna del grupo de superposición + 1
        for (let i = 0; i < out.length; i++) {
          let maxCol = out[i].col;
          for (let j = 0; j < out.length; j++) {
            if (i !== j && overlaps(out[i], out[j])) {
              maxCol = Math.max(maxCol, out[j].col);
            }
          }
          out[i].ncols = maxCol + 1;
        }

        return out;
      }

      function AgendaGridSemanal({
        weekDates,
        sesiones,
        pacientes,
        hoyStr,
        feriadoMap,
        onCellClick,
        onSessionClick,
        dailyTotals,
      }) {
        function getPac(id) {
          return pacientes.find((p) => p.id === id);
        }

        function handleColClick(e, ds) {
          /* ignora clicks en sesiones (stopPropagation desde ahí) */
          const rect = e.currentTarget.getBoundingClientRect();
          const y = e.clientY - rect.top;
          const mins = Math.floor(y / (AG_PX_H / 60) / 30) * 30;
          const total = AG_START * 60 + mins;
          const hr = Math.floor(total / 60);
          const mn = total % 60;
          const hora = `${String(hr).padStart(2, "0")}:${String(mn).padStart(2, "0")}`;
          onCellClick(ds, hora);
        }

        return (
          <div className="ag-wrap">
            <div
              className="ag-grid"
              style={{
                gridTemplateColumns: `56px repeat(${weekDates.length}, 1fr)`,
              }}
            >
              {/* ── CABECERA ── */}
              <div className="ag-corner" />
              {weekDates.map((d, i) => {
                const ds = dateStr(d);
                const isToday = ds === hoyStr;
                const fInfo = feriadoMap && feriadoMap[ds];
                return (
                  <div
                    key={i}
                    className={`ag-day-hd ${isToday ? "today" : ""} ${fInfo ? "feriado" : ""}`}
                    title={fInfo ? fInfo.nombre : ""}
                  >
                    {isToday ? (
                      <div className="ag-today-badge">
                        <div className="ag-day-abbr">{DIAS_HD[i]}</div>
                        <div className="ag-day-num">{d.getDate()}</div>
                      </div>
                    ) : (
                      <>
                        <div className="ag-day-abbr">{DIAS_HD[i]}</div>
                        <div className="ag-day-num">{d.getDate()}</div>
                      </>
                    )}
                    <div className="ag-day-mes">
                      {MESES_CORTO[d.getMonth()]}
                    </div>
                    {fInfo && <div className="feriado-badge">⭐</div>}
                  </div>
                );
              })}

              {/* ── CUERPO ── */}
              <div
                className="ag-body"
                style={{
                  gridTemplateColumns: `56px repeat(${weekDates.length}, 1fr)`,
                }}
              >
                {/* columna de tiempo */}
                <div className="ag-time-col">
                  {AG_SLOTS.map((t, i) => (
                    <div
                      key={i}
                      className={`ag-time-cell ${t.endsWith(":00") ? "hora" : ""}`}
                    >
                      {t.endsWith(":00") ? t : ""}
                    </div>
                  ))}
                </div>

                {/* columnas de días */}
                {weekDates.map((d, di) => {
                  const ds = dateStr(d);
                  const isToday = ds === hoyStr;
                  const daySes = sesiones.filter((s) => s.fecha === ds);
                  const isFeriadoCol = feriadoMap && !!feriadoMap[ds];

                  return (
                    <div
                      key={di}
                      className={`ag-col ${isToday ? "today" : ""} ${isFeriadoCol ? "feriado-col" : ""}`}
                      onClick={(e) => handleColClick(e, ds)}
                    >
                      {/* líneas de media hora */}
                      {AG_SLOTS.map((t, i) => (
                        <div
                          key={i}
                          className="ag-line"
                          style={{
                            top: `${i * 30}px`,
                            height: "30px",
                            borderTop: `1px solid ${t.endsWith(":00") ? "#DDD5C4" : "#EDE8DC"}`,
                          }}
                        />
                      ))}

                      {/* bloques de sesión — con layout de superposición */}
                      {layoutSessions(daySes).map((s) => {
                        const pac = getPac(s.pacienteId);
                        const cols = s.colorLabel
                          ? PALETA_COLORES.find((c) => c.id === s.colorLabel) ||
                            TIPO_COLORS[s.tipo] ||
                            TIPO_COLORS.individual
                          : TIPO_COLORS[s.tipo] || TIPO_COLORS.individual;
                        const top = timeToPx(s.horaInicio);
                        const h = Math.max(durPx(s.horaInicio, s.horaFin), 22);
                        const short = h < 38;
                        // sub-columna: divide el ancho del día equitativamente
                        const GAP = 2;
                        const pct = 100 / s.ncols;
                        const lPct = s.col * pct;
                        const rPct = 100 - (s.col + 1) * pct;
                        return (
                          <div
                            key={s.id}
                            className="ag-session"
                            style={{
                              top: `${top}px`,
                              height: `${h}px`,
                              left: `calc(${lPct}% + ${s.col === 0 ? 3 : GAP}px)`,
                              right: `calc(${rPct}% + ${s.col === s.ncols - 1 ? 3 : GAP}px)`,
                              background: cols.bg,
                              borderLeft: `3px solid ${cols.border}`,
                            }}
                            onClick={(e) => {
                              e.stopPropagation();
                              onSessionClick(s);
                            }}
                            title={`${pac ? pac.nombre + " " + pac.apellido : "—"} · ${s.horaInicio}–${s.horaFin}`}
                          >
                            {s.tipo === "reserva_personal" ? (
                              <>
                                <div
                                  style={{
                                    display: "flex",
                                    alignItems: "center",
                                    gap: "4px",
                                    minWidth: 0,
                                  }}
                                >
                                  <span
                                    style={{
                                      fontSize: "13px",
                                      flexShrink: 0,
                                      lineHeight: 1,
                                    }}
                                  >
                                    {
                                      (
                                        RESERVA_CATS.find(
                                          (c) => c.v === s.categoria,
                                        ) || RESERVA_CATS[0]
                                      ).icon
                                    }
                                  </span>
                                  <span
                                    className="ag-ses-nombre"
                                    style={{ color: cols.text }}
                                  >
                                    {s.titulo ||
                                      (
                                        RESERVA_CATS.find(
                                          (c) => c.v === s.categoria,
                                        ) || RESERVA_CATS[0]
                                      ).l}
                                  </span>
                                </div>
                                {!short && (
                                  <div
                                    className="ag-ses-hora"
                                    style={{ color: cols.text }}
                                  >
                                    {s.horaInicio}–{s.horaFin}
                                  </div>
                                )}
                              </>
                            ) : (
                              <>
                                {(tienePendientePago(s, hoyStr) || tieneNotasAlerta(s) || esTurnoPasadoSinCalificar(s)) && (
                                  <div
                                    className="ag-pago-alerta"
                                    title="Turno requiere atención"
                                  >
                                    !
                                  </div>
                                )}
                                <div
                                  style={{
                                    display: "flex",
                                    alignItems: "center",
                                    gap: "4px",
                                    minWidth: 0,
                                  }}
                                >
                                  <span
                                    style={{
                                      fontSize:
                                        s.estado === "asistio" ||
                                        s.estado === "pendiente" ||
                                        !s.estado
                                          ? "13px"
                                          : "11px",
                                      flexShrink: 0,
                                      lineHeight: 1,
                                    }}
                                  >
                                    {ESTADO_ICONS[s.estado] || "⏳"}
                                  </span>
                                  {s.superposicionConfirmada && (
                                    <span
                                      style={{
                                        fontSize: "11px",
                                        flexShrink: 0,
                                        lineHeight: 1,
                                      }}
                                      title="Superposición confirmada"
                                    >
                                      ⚠️
                                    </span>
                                  )}
                                  <span
                                    className="ag-ses-nombre"
                                    style={{ color: cols.text }}
                                  >
                                    {pac
                                      ? `${pac.nombre} ${pac.apellido ? pac.apellido.charAt(0) + "." : ""}`.trim()
                                      : "—"}
                                  </span>
                                </div>
                                {!short && (
                                  <div
                                    className="ag-ses-hora"
                                    style={{ color: cols.text }}
                                  >
                                    {s.horaInicio}–{s.horaFin}
                                  </div>
                                )}
                              </>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>

              {/* ── FOOTER: totales estimados por día ── */}
              {dailyTotals && (
                <>
                  <div
                    style={{
                      background: "var(--vd)",
                      borderTop: "2px solid rgba(200,146,42,.3)",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      padding: "4px 2px",
                    }}
                  >
                    <span
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: "7px",
                        color: "rgba(255,255,255,.3)",
                        textTransform: "uppercase",
                        letterSpacing: ".05em",
                        writingMode: "vertical-rl",
                        transform: "rotate(180deg)",
                      }}
                    >
                      Tot.
                    </span>
                  </div>
                  {(dailyTotals || []).map((t, i) => {
                    const nada = t.ef === 0 && t.or === 0;
                    return (
                      <div
                        key={i}
                        style={{
                          background: "#F5F0E8",
                          borderTop: "2px solid rgba(200,146,42,.25)",
                          borderRight:
                            i < dailyTotals.length - 1
                              ? "1px solid #DDD5C4"
                              : "none",
                          padding: "5px 4px",
                          display: "flex",
                          flexDirection: "column",
                          alignItems: "center",
                          gap: "1px",
                          minHeight: "38px",
                          justifyContent: "center",
                        }}
                      >
                        {nada ? (
                          <span
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: "9px",
                              color: "var(--tx3)",
                            }}
                          >
                            —
                          </span>
                        ) : (
                          <>
                            {t.ef > 0 && (
                              <span
                                style={{
                                  fontFamily: "var(--mono)",
                                  fontSize: "9px",
                                  color: "var(--tx2)",
                                  whiteSpace: "nowrap",
                                }}
                              >
                                <span style={{ color: "var(--tx3)" }}>Ef.</span>
                                ${t.ef.toLocaleString("es-AR")}
                              </span>
                            )}
                            {t.or > 0 && (
                              <span
                                style={{
                                  fontFamily: "var(--mono)",
                                  fontSize: "9px",
                                  color: "var(--tx2)",
                                  whiteSpace: "nowrap",
                                }}
                              >
                                <span style={{ color: "var(--tx3)" }}>Or.</span>
                                ${t.or.toLocaleString("es-AR")}
                              </span>
                            )}
                          </>
                        )}
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* AGENDA: CALENDARIO MENSUAL             */
      /* ═══════════════════════════════════════ */
      function AgendaCalendarioMensual({
        baseDate,
        sesiones,
        feriadoMap,
        onDayClick,
        onMonthChange,
      }) {
        const year = baseDate.getFullYear();
        const month = baseDate.getMonth();
        const hoyStr = dateStr(new Date());

        const firstDay = new Date(year, month, 1);
        let offset = firstDay.getDay() - 1;
        if (offset < 0) offset = 6;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const cells = [];
        for (let i = 0; i < offset; i++) cells.push(null);
        for (let d = 1; d <= daysInMonth; d++)
          cells.push(new Date(year, month, d));
        while (cells.length % 7 !== 0) cells.push(null);

        function sesForDay(d) {
          if (!d) return [];
          const ds = dateStr(d);
          return sesiones.filter((s) => s.fecha === ds);
        }

        return (
          <div className="card">
            {/* nav mes */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                gap: "12px",
                marginBottom: "16px",
              }}
            >
              <button
                className="btn btn-sec"
                onClick={() => onMonthChange(new Date(year, month - 1, 1))}
              >
                ←
              </button>
              <span
                style={{
                  fontFamily: "var(--serif2)",
                  fontSize: "20px",
                  fontWeight: 700,
                  color: "var(--vd)",
                  flex: 1,
                  textAlign: "center",
                }}
              >
                {MESES_FULL[month]} {year}
              </span>
              <button
                className="btn btn-sec"
                onClick={() => onMonthChange(new Date(year, month + 1, 1))}
              >
                →
              </button>
            </div>

            {/* cabecera días */}
            <div className="cal-grid" style={{ marginBottom: "6px" }}>
              {["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"].map((d) => (
                <div key={d} className="cal-day-hd">
                  {d}
                </div>
              ))}
            </div>

            {/* grid */}
            <div className="cal-grid">
              {cells.map((d, i) => {
                if (!d) return <div key={i} />;
                const ds = dateStr(d);
                const isToday = ds === hoyStr;
                const ss = sesForDay(d);
                return (
                  <div
                    key={i}
                    className={`cal-cell ${isToday ? "today" : ""} ${feriadoMap && feriadoMap[ds] ? "feriado" : ""}`}
                    onClick={() => onDayClick(d)}
                    title={
                      feriadoMap && feriadoMap[ds] ? feriadoMap[ds].nombre : ""
                    }
                  >
                    <div className="cal-num">
                      {d.getDate()}
                      {feriadoMap && feriadoMap[ds] ? " ⭐" : ""}
                    </div>
                    <div className="cal-dots">
                      {ss.slice(0, 7).map((s, si) => {
                        const cols =
                          TIPO_COLORS[s.tipo] || TIPO_COLORS.individual;
                        return (
                          <div
                            key={si}
                            className="cal-dot"
                            style={{ background: cols.border }}
                            title={s.tipo}
                          />
                        );
                      })}
                      {ss.length > 7 && (
                        <span
                          style={{
                            fontFamily: "var(--mono)",
                            fontSize: "8px",
                            color: "var(--tx3)",
                          }}
                        >
                          +{ss.length - 7}
                        </span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* leyenda tipos */}
            <div
              style={{
                display: "flex",
                gap: "16px",
                marginTop: "16px",
                flexWrap: "wrap",
              }}
            >
              {[
                ["individual", "Individual"],
                ["AT", "AT"],
                ["pareja", "Pareja"],
                ["grupo", "Grupo"],
              ].map(([t, l]) => (
                <div
                  key={t}
                  style={{ display: "flex", alignItems: "center", gap: "5px" }}
                >
                  <div
                    style={{
                      width: "9px",
                      height: "9px",
                      borderRadius: "50%",
                      background: TIPO_COLORS[t].border,
                    }}
                  />
                  <span
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: "11px",
                      color: "var(--tx3)",
                    }}
                  >
                    {l}
                  </span>
                </div>
              ))}
            </div>
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* AGENDA: DETECCIÓN DE SUPERPOSICIÓN     */
      /* ═══════════════════════════════════════ */
      function detectarSuperposiciones(sesionActual, todasLasSesiones) {
        return todasLasSesiones.filter((s) => {
          if (s.id === sesionActual.id) return false; // misma sesión (edición)
          if (s.fecha !== sesionActual.fecha) return false; // distinto día
          if (s.estado === "cancelo") return false; // canceladas no ocupan horario
          if (s.tipo === "reserva_personal") return false; // reservas no generan conflicto clínico
          // Algoritmo de solapamiento: A.inicio < B.fin && B.inicio < A.fin
          return (
            sesionActual.horaInicio < s.horaFin &&
            s.horaInicio < sesionActual.horaFin
          );
        });
      }

      /* ═══════════════════════════════════════ */
      /* AGENDA: MODAL TURNO (nuevo / editar)   */
      /* ═══════════════════════════════════════ */
      /* Retorna los campos de pago por defecto según el paciente */
      function pagoDesde(pac) {
        const esOS =
          pac && (pac.cobertura === "obra_social" || pac.cobertura === "mixto");
        return {
          modalidadPago: esOS ? "obra_social" : "particular",
          montoParticular: pac ? pac.valorParticular || "" : "",
          particularAbonado: false,
          metodoPagoParticular: "efectivo",
          coseguroMonto: pac ? pac.coseguro || "" : "",
          coseguroAbonado: false,
          metodoPagoOS: "efectivo",
          ordenEmitida: false,
          ordenFirmada: false,
          /* Cobro por cancelación / reprogramación */
          cobroCancel: false,
          cancelEfectivo: false, // cobra en efectivo/transfer
          montoCancel: pac ? pac.valorParticular || "" : "",
          cancelAbonado: false,
          cancelOrden: false, // cobra con orden OS
          cancelOrdenToken: "",
          cancelOrdenSaldada: false,
        };
      }

      function ModalTurno({
        mode,
        sesion,
        defaultFecha,
        defaultHora,
        pacientes,
        allSesiones,
        onClose,
        onSave,
        onDelete,
        onSaveCobro,
        onUpdateSesion,
        todosObjetivos,
      }) {
        const [f, setF] = useState({});
        const [busq, setBusq] = useState("");
        const [sugs, setSugs] = useState([]);
        const [showSugs, setShowSugs] = useState(false);
        const [pacSel, setPacSel] = useState(null);
        const [conflictos, setConflictos] = useState([]);
        const [showConflictos, setShowConflictos] = useState(false);
        const [notasTab, setNotasTab] = useState("clinica");
        const [confirmCancel, setConfirmCancel] = useState(false);
        const overlayMDRef = useRef(false);

        function tryClose() { setConfirmCancel(true); }
        function doClose() { setConfirmCancel(false); onClose(); }

        /* Campos nuevos de pago viven en f. Este helper los extrae con defaults */
        function pagoF(sesData) {
          return {
            modalidadPago: sesData?.modalidadPago || "particular",
            montoParticular: sesData?.montoParticular ?? "",
            particularAbonado: sesData?.particularAbonado ?? false,
            metodoPagoParticular: sesData?.metodoPagoParticular || "efectivo",
            coseguroMonto: sesData?.coseguroMonto ?? "",
            coseguroAbonado: sesData?.coseguroAbonado ?? false,
            metodoPagoOS: sesData?.metodoPagoOS || "efectivo",
            ordenEmitida: sesData?.ordenEmitida ?? false,
            ordenFirmada: sesData?.ordenFirmada ?? false,
            cobroCancel: sesData?.cobroCancel ?? false,
            /* compat. legado: cancelMetodo='efectivo_transfer' → cancelEfectivo, 'orden_os' → cancelOrden */
            cancelEfectivo:
              sesData?.cancelEfectivo ??
              (sesData?.cancelMetodo === "efectivo_transfer" ? true : false),
            montoCancel: sesData?.montoCancel ?? "",
            cancelAbonado: sesData?.cancelAbonado ?? false,
            cancelOrden:
              sesData?.cancelOrden ??
              (sesData?.cancelMetodo === "orden_os" ? true : false),
            cancelOrdenToken: sesData?.cancelOrdenToken || "",
            cancelOrdenSaldada: sesData?.cancelOrdenSaldada ?? false,
          };
        }

        useEffect(() => {
          if (mode === "editar" && sesion) {
            const pac = pacientes.find((p) => p.id === sesion.pacienteId);
            // Si la sesión ya tiene datos de pago nuevo, usarlos; sino derivar del paciente
            const tienePagoNuevo = sesion.modalidadPago != null;
            const datosPago = tienePagoNuevo ? pagoF(sesion) : pagoDesde(pac);
            setF({ ...sesion, ...datosPago });
            if (pac) {
              setPacSel(pac);
              setBusq(`${pac.nombre} ${pac.apellido}`);
            } else {
              setPacSel(null);
              setBusq("");
            }
          } else {
            const inicio = defaultHora || "10:00";
            setF({
              id: genId(),
              pacienteId: "",
              fecha: defaultFecha || dateStr(new Date()),
              horaInicio: inicio,
              horaFin: calcFin(inicio, 45),
              tipo: "individual",
              estado: "pendiente",
              cobrado: false,
              montoCobrado: 0,
              notas: "",
              evolucionClinica: "",
              notasAdmin: "",
              notasAsistencia: "",
              notasAlertas: { clinica: false, admin: false, asistencia: false },
              colorLabel: "",
              ...pagoDesde(null),
            });
            setPacSel(null);
            setBusq("");
          }
          setSugs([]);
          setShowSugs(false);
          setConflictos([]);
          setShowConflictos(false);
          setNotasTab("clinica");
        }, [mode, sesion?.id, defaultFecha, defaultHora]);

        function upd(k, v) {
          setF((prev) => ({ ...prev, [k]: v }));
        }

        /* ── objetivos de la semana del turno ── */
        const objSemanaKey = getMondayStr(f.fecha);
        const objSemana = objSemanaKey
          ? (todosObjetivos || []).find((o) => o.semanaKey === objSemanaKey)
          : null;
        const tieneObjetivos = objSemana && (
          (objSemana.obj1 && objSemana.obj1EvaluarEn !== "dia") ||
          (objSemana.obj2 && objSemana.obj2EvaluarEn !== "dia")
        );

        function handleBusq(q) {
          setBusq(q);
          if (q.length < 2) {
            setSugs([]);
            setShowSugs(false);
            return;
          }
          const low = q.toLowerCase();
          const m = pacientes
            .filter(
              (p) =>
                `${p.nombre} ${p.apellido}`.toLowerCase().includes(low) ||
                p.dni.includes(q),
            )
            .slice(0, 5);
          setSugs(m);
          setShowSugs(m.length > 0);
        }

        /* Devuelve el nombre del día en español para una fecha "YYYY-MM-DD" */
        function diaSemanaStr(fechaStr) {
          if (!fechaStr) return null;
          const [y, m, d] = fechaStr.split("-").map(Number);
          const idx = new Date(y, m - 1, d).getDay(); // local, sin issues UTC
          return [
            "domingo",
            "lunes",
            "martes",
            "miercoles",
            "jueves",
            "viernes",
            "sabado",
          ][idx];
        }

        /* Busca el slot horario del paciente para un día dado (o null si no hay) */
        function slotPacienteEnFecha(pac, fechaStr) {
          if (!pac?.diasHorarios?.length || !fechaStr) return null;
          const dia = diaSemanaStr(fechaStr);
          return pac.diasHorarios.find((h) => h.dia === dia) || null;
        }

        function selectPac(pac) {
          setPacSel(pac);
          setBusq(`${pac.nombre} ${pac.apellido}`);
          setSugs([]);
          setShowSugs(false);
          const pd = pagoDesde(pac);
          // Si ya hay fecha en el form y el paciente tiene horario ese día → auto-completar
          setF((prev) => {
            const slot = slotPacienteEnFecha(pac, prev.fecha);
            return {
              ...prev,
              pacienteId: pac.id,
              tipo: pac.tipo === "AT" ? "AT" : prev.tipo,
              ...(slot
                ? { horaInicio: slot.horaInicio, horaFin: slot.horaFin }
                : {}),
              ...pd,
            };
          });
        }

        function buildSesionFinal(extras = {}) {
          const cobradoPart =
            f.modalidadPago === "particular" && f.particularAbonado;
          const cobradoOS =
            f.modalidadPago === "obra_social" && f.coseguroAbonado;
          const cobrado = cobradoPart || cobradoOS;
          const montoCobrado = cobradoPart
            ? Number(f.montoParticular) || 0
            : cobradoOS
              ? Number(f.coseguroMonto) || 0
              : 0;
          return { ...f, cobrado, montoCobrado, ...extras };
        }

        function handleSave() {
          if (!f.pacienteId) {
            showToast("⚠️ Seleccioná un paciente");
            return;
          }
          if (!f.fecha) {
            showToast("⚠️ Ingresá la fecha");
            return;
          }
          if (!f.horaInicio || !f.horaFin) {
            showToast("⚠️ Ingresá horario");
            return;
          }
          const conf = detectarSuperposiciones(
            f,
            allSesiones || getData("hgsp_sesiones"),
          );
          if (conf.length > 0) {
            setConflictos(conf);
            setShowConflictos(true);
            return;
          }
          const ses = buildSesionFinal();
          // Crear cobro en hgsp_cobros si corresponde y no existe aún
          if (ses.cobrado && onSaveCobro) {
            const yaExiste = getData("hgsp_cobros").some(
              (c) => c.sesionId === ses.id,
            );
            if (!yaExiste) {
              onSaveCobro({
                id: genId(),
                pacienteId: ses.pacienteId,
                sesionId: ses.id,
                fecha: ses.fecha,
                concepto:
                  ses.modalidadPago === "particular"
                    ? "particular"
                    : "coseguro",
                monto: ses.montoCobrado,
                cobrado: true,
                metodoPago:
                  ses.modalidadPago === "particular"
                    ? ses.metodoPagoParticular
                    : ses.metodoPagoOS,
              });
            }
          }
          onSave(ses);
        }

        function handleSaveForzado() {
          const ses = buildSesionFinal({ superposicionConfirmada: true });
          onSave(ses);
        }

        function handleEstado(estado) {
          const updf = { ...f, estado };
          setF(updf);
          onUpdateSesion(updf);
          showToast(`📋 Estado: ${estado}`);
        }

        /* Auto-guarda el rating de objetivo inmediatamente (solo en editar) */
        function handleObjRating(campo, val) {
          const newVal = f[campo] === val ? null : val;
          const updf = { ...f, [campo]: newVal };
          setF(updf);
          if (mode === "editar" && onUpdateSesion) {
            onUpdateSesion(updf);
          }
        }

        const isEditar = mode === "editar";
        const ESTADOS = [
          { v: "pendiente", l: "⏳ Pendiente" },
          { v: "asistio", l: "✅ Asistió" },
          { v: "cancelo", l: "❌ Canceló" },
          { v: "reprogramo", l: "🔄 Reprogramó" },
        ];
        const TIPOS = [
          { v: "individual", l: "👤 Individual" },
          { v: "AT", l: "🤝 AT" },
          { v: "pareja", l: "👥 Pareja" },
          { v: "grupo", l: "👨‍👩‍👧 Grupo" },
        ];

        /* ── Acordeón: sección abierta ── */
        const [openSection, setOpenSection] = useState(null);
        function toggleSec(k) {
          setOpenSection((prev) => (prev === k ? null : k));
        }

        /* ── Checklist: valores de completitud ── */
        const estadoCompleto = !!(f.estado && f.estado !== "pendiente");

        const cobroCmpleto = (() => {
          if (f.tipo === "AT") return true;
          if (f.estado === "cancelo" || f.estado === "reprogramo") {
            if (!f.cobroCancel) return true;
            return !!(f.cancelAbonado || f.cancelOrdenSaldada);
          }
          if (f.modalidadPago === "obra_social")
            return !!(f.coseguroAbonado && f.ordenEmitida && f.ordenFirmada);
          if (f.modalidadPago === "particular") return !!f.particularAbonado;
          return false;
        })();

        const calificCmpleto = (() => {
          if (!tieneObjetivos) return true;
          if (objSemana?.obj1 && objSemana.obj1EvaluarEn !== "dia" && !f.obj1Estado) return false;
          if (objSemana?.obj2 && objSemana.obj2EvaluarEn !== "dia" && !f.obj2Estado) return false;
          return true;
        })();

        /* ── Valores resumen para acordeón cerrado ── */
        const tipoInfo = TIPOS.find((t) => t.v === f.tipo) || TIPOS[0];

        const cobroResumen = (() => {
          if (f.tipo === "AT") return "AT — sin cobro directo";
          if (f.estado === "cancelo" || f.estado === "reprogramo") {
            if (!f.cobroCancel) return "Sin cobro por cancelación";
            return f.cancelAbonado || f.cancelOrdenSaldada ? "Abonado ✓" : "Pendiente de cobro";
          }
          if (f.modalidadPago === "obra_social") {
            const p = [];
            if (f.coseguroAbonado) p.push("Coseguro ✓");
            if (f.ordenEmitida) p.push("Orden ✓");
            if (f.ordenFirmada) p.push("Firma ✓");
            return "OS" + (p.length ? " · " + p.join(" · ") : "");
          }
          const monto = f.montoParticular ? " · $" + Number(f.montoParticular).toLocaleString("es-AR") : "";
          return "Particular" + monto + (f.particularAbonado ? " ✓" : "");
        })();

        const calificResumen = (() => {
          if (!tieneObjetivos) return "Sin objetivos esta semana";
          const items = [
            objSemana?.obj1 && objSemana.obj1EvaluarEn !== "dia" ? f.obj1Estado : null,
            objSemana?.obj2 && objSemana.obj2EvaluarEn !== "dia" ? f.obj2Estado : null,
          ].filter((_, i) => (i === 0 ? (objSemana?.obj1 && objSemana.obj1EvaluarEn !== "dia") : (objSemana?.obj2 && objSemana.obj2EvaluarEn !== "dia")));
          const sin = items.filter((e) => !e).length;
          const buenos = items.filter((e) => e === "bueno").length;
          const malos = items.filter((e) => e === "malo").length;
          const parts = [];
          if (buenos) parts.push(buenos + " 😊");
          if (malos) parts.push(malos + " 😞");
          if (sin) parts.push(sin + " sin calificar");
          return parts.join(" · ") || "Sin calificar";
        })();

        const notasResumen = (() => {
          const tieneAlerta = f.notasAlertas?.clinica || f.notasAlertas?.admin || f.notasAlertas?.asistencia;
          if (tieneAlerta) return "⚠ Con alertas pendientes";
          const txt = f.evolucionClinica || f.notasAdmin || f.notasAsistencia || "";
          if (!txt) return "Opcional — sin notas";
          return txt.length > 40 ? txt.slice(0, 40) + "…" : txt;
        })();

        return ReactDOM.createPortal(
          <div
            className="modal-overlay"
            onMouseDown={(e) => {
              overlayMDRef.current = e.target === e.currentTarget;
            }}
            onClick={(e) => {
              if (e.target === e.currentTarget && overlayMDRef.current)
                tryClose();
              overlayMDRef.current = false;
            }}
          >
            <div className="modal-card" style={{ maxWidth: "520px" }}>
              <div className="modal-bar" />
              {confirmCancel ? (
                <div className="modal-confirm-cancel">
                  <span className="modal-confirm-cancel-text">¿Salir sin guardar los cambios?</span>
                  <div className="modal-confirm-cancel-btns">
                    <button className="btn btn-danger" style={{ padding: "5px 14px", fontSize: "13px" }} onClick={doClose}>Sí, salir</button>
                    <button className="btn btn-sec" style={{ padding: "5px 14px", fontSize: "13px" }} onClick={() => setConfirmCancel(false)}>No, quedarme</button>
                  </div>
                </div>
              ) : (
                <div className="modal-header">
                  <span className="modal-title">
                    {isEditar ? "Edición de turno" : "Creación de turno"}
                  </span>
                  <div style={{ display: "flex", gap: "6px", alignItems: "center", flexShrink: 0 }}>
                    {isEditar && (
                      <button className="modal-icon-btn danger" onClick={() => onDelete(f)} title="Eliminar">🗑️</button>
                    )}
                    <button className="modal-icon-btn" onClick={handleSave} title="Guardar">💾</button>
                    <button className="modal-icon-btn" onClick={tryClose} title="Cerrar">✕</button>
                  </div>
                </div>
              )}
              <div className="modal-body">
                {/* ─── 0. PACIENTE ─── */}
                <div className="acc-row" style={{ border:"2px solid rgba(200,146,42,.75)", overflow:"visible", position:"relative" }}>
                  <div className="acc-head" style={{ cursor: isEditar ? "default" : "pointer" }}
                       onClick={() => !isEditar && openSection !== "paciente" && toggleSec("paciente")}>
                    {!isEditar && openSection === "paciente" ? (
                      <input
                        style={{ flex:1, background:"transparent", border:"none", outline:"none",
                                 fontFamily:"var(--serif)", fontSize:"16px", fontWeight:700,
                                 color:"var(--do)", width:"100%", padding:0, letterSpacing:".01em" }}
                        placeholder="Buscar por nombre o DNI..."
                        value={busq}
                        onChange={(e) => handleBusq(e.target.value)}
                        onFocus={() => busq.length >= 2 && setShowSugs(true)}
                        onBlur={() => setTimeout(() => { setShowSugs(false); setOpenSection(null); }, 180)}

      function ModalReserva({
        reserva,
        defaultFecha,
        defaultHora,
        onClose,
        onSave,
        onDelete,
      }) {
        const [f, setF] = useState(() => {
          if (reserva) return { ...reserva };
          return {
            id: genId(),
            tipo: "reserva_personal",
            categoria: "personal",
            titulo: "",
            fecha: defaultFecha || "",
            horaInicio: defaultHora || "10:00",
            horaFin: calcFin(defaultHora || "10:00", 60),
            estado: "pendiente",
            cobrado: false,
            notas: "",
            colorLabel: "",
          };
        });

        function upd(k, v) {
          setF((prev) => ({ ...prev, [k]: v }));
        }

        function handleSave() {
          if (!f.fecha) {
            showToast("⚠️ Ingresá la fecha");
            return;
          }
          if (!f.horaInicio || !f.horaFin) {
            showToast("⚠️ Ingresá horario");
            return;
          }
          const catInfo =
            RESERVA_CATS.find((c) => c.v === f.categoria) || RESERVA_CATS[0];
          const tit = f.titulo.trim() || catInfo.l;
          onSave({ ...f, titulo: tit });
        }

        const isEditar = !!reserva;
        const catActual =
          RESERVA_CATS.find((c) => c.v === f.categoria) || RESERVA_CATS[0];
        const resOverlayMDRef = useRef(false);
        const [confirmCancel, setConfirmCancel] = useState(false);
        function tryClose() { setConfirmCancel(true); }
        function doClose() { setConfirmCancel(false); onClose(); }

        return ReactDOM.createPortal(
          <div
            className="modal-overlay"
            onMouseDown={(e) => {
              resOverlayMDRef.current = e.target === e.currentTarget;
            }}
            onClick={(e) => {
              if (e.target === e.currentTarget && resOverlayMDRef.current)
                tryClose();
              resOverlayMDRef.current = false;
            }}
          >
            <div className="modal-card" style={{ maxWidth: "440px" }}>
              <div className="modal-bar" />
              {confirmCancel ? (
                <div className="modal-confirm-cancel">

                      <button className="modal-icon-btn danger" onClick={() => onDelete(f)} title="Eliminar">🗑️</button>

                    <button className="modal-icon-btn" onClick={tryClose} title="Cerrar">✕</button>
                  </div>

              <div className="modal-body">
                {/* COLOR DE ETIQUETA */}
                <div style={{ marginBottom: "14px" }}>
                  <div
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: "10px",
                      color: "rgba(255,255,255,.4)",
                      textTransform: "uppercase",
                      letterSpacing: ".07em",
                      marginBottom: "6px",
                    }}
                  >
                    Color etiqueta
                  </div>
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      flexWrap: "wrap",
                      gap: "6px",
                    }}
                  >
                    <button
                      onClick={() => upd("colorLabel", "")}
                      title="Color por defecto (gris)"
                      style={{
                        width: "20px",
                        height: "20px",
                        borderRadius: "50%",
                        border: `2px solid ${!f.colorLabel ? "var(--do)" : "rgba(255,255,255,.18)"}`,
                        background: "rgba(255,255,255,.08)",
                        cursor: "pointer",
                        flexShrink: 0,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        fontSize: "10px",
                        color: "rgba(255,255,255,.45)",

                          onClick={() => upd("colorLabel", c.id)}

                      value={f.fecha || ""}

                  </div>

                    <div className="modal-label">Inicio</div>
                    <input
