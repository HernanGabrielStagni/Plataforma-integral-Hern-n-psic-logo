              justifyContent: "center",
              padding: "16px",
            }}
          >
            <div
              style={{
                background: "var(--vd)",
                border: "2px solid var(--vm)",
                borderRadius: "var(--r)",
                width: "100%",
                maxWidth: "480px",
                overflow: "hidden",
                maxHeight: "90vh",
                overflowY: "auto",
              }}
            >
              <div
                style={{
                  height: "4px",
                  background: "linear-gradient(90deg,var(--do),#E8B84B)",
                  position: "sticky",
                  top: 0,
                }}
              />
              <div style={{ padding: "22px" }}>
                <div
                  style={{
                    fontFamily: "var(--serif)",
                    fontSize: "18px",
                    color: "var(--do)",
                    marginBottom: "18px",
                  }}
                >
                  📝 Nuevo registro
                </div>

                {/* Fila 1: Fecha acostarse + Hora acostarse (texto puro) */}
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "1fr 1fr",
                    gap: "12px",
                    marginBottom: "12px",
                  }}
                >
                  <div>
                    <label style={suenoModalLabel}>Fecha me acosté</label>
                    <input
                      type="date"
                      value={f.fechaDormir}
                      onChange={(e) =>
                        setF({ ...f, fechaDormir: e.target.value })
                      }
                      style={suenoModalInput}
                    />
                  </div>
                  <div>
                    <label style={suenoModalLabel}>Hora me acosté</label>
                    <input
                      type="text"
                      placeholder="--:--"
                      value={f.horaAcostarse}
                      maxLength={5}
                      onChange={(e) =>
                        setF({ ...f, horaAcostarse: fmtHora(e.target.value) })
                      }
                      onBlur={() => {
                        if (f.horaAcostarse)
                          setF((p) => ({
                            ...p,
                            horaAcostarse: completarHora(p.horaAcostarse),
                          }));
                      }}
                      style={{
                        ...suenoModalInput,
                        letterSpacing: ".1em",
                        textAlign: "center",
                      }}
                    />
                  </div>
                </div>

                {/* Fila 2: Fecha despertar + Hora despertar (texto puro) */}
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "1fr 1fr",
                    gap: "12px",
                    marginBottom: "12px",
                  }}
                >
                  <div>
                    <label style={suenoModalLabel}>Fecha me desperté</label>
                    <input
                      type="date"
                      value={f.fechaDespertar}
                      onChange={(e) =>
                        setF({ ...f, fechaDespertar: e.target.value })
                      }
                      style={suenoModalInput}
                    />
                  </div>
                  <div>
                    <label style={suenoModalLabel}>Hora me desperté</label>
                    <input
                      type="text"
                      placeholder="--:--"
                      value={f.horaDespertar}
                      maxLength={5}
                      onChange={(e) =>
                        setF({ ...f, horaDespertar: fmtHora(e.target.value) })
                      }
                      onBlur={() => {
                        if (f.horaDespertar)
                          setF((p) => ({
                            ...p,
                            horaDespertar: completarHora(p.horaDespertar),
                          }));
                      }}
                      style={{
                        ...suenoModalInput,
                        letterSpacing: ".1em",
                        textAlign: "center",
                      }}
                    />
                  </div>
                </div>

                {/* Calidad y Notas — botones dorados colapsables en la misma fila */}
                <div
                  style={{
                    display: "flex",
                    gap: "10px",
                    marginBottom: "12px",
                    justifyContent: "space-evenly",
                  }}
                >
                  <button
                    type="button"
                    onClick={() => {
                      const next = !mostrarCalidad;
                      setMostrarCalidad(next);
                      if (next) setMostrarNotas(false);
                    }}
                    style={{
                      padding: "6px 20px",
                      borderRadius: "50px",

                      border: "1.5px solid #E8862F",

                      fontFamily: "var(--sans)",

                      padding: "6px 20px",

                      background: "#FFFFFF",

                      fontFamily: "var(--sans)",

                        : "none",
                    }}
                  >
                    {mostrarNotas ? "📝 Notas ▲" : "📝 Notas ▼"}
                  </button>
                </div>

                {/* Panel Calidad expandido */}
                {mostrarCalidad && (
                  <div style={{ marginBottom: "12px" }}>

      /* ── Tab: Hoy y esta semana ── */
      function TabSuenoDashboard({ registros, config, onActualizar }) {
        const [modalAbierto, setModalAbierto] = useState(false);
        const [confirmar, setConfirmar] = useState(null); // { reg, anterior } pendiente de confirmación
        const hoy = dateStr(new Date());
        const metaHora = config?.metaHoraAcostarse || "01:00";
        const metaN = normalizarHoraSueno(metaHora);
        const regHoy = registros.find((r) => r.fechaDespertar === hoy);
        const cumplioAnoche = regHoy
          ? normalizarHoraSueno(regHoy.horaAcostarse) <= metaN
          : false;
        const racha = calcularRachaSueno(registros, metaHora);
        const cumpl7 = cumplimientoSueno(registros, metaHora, 7);
        const medianaHora = medianaHoraSueno(registros, 7);
        const promDur = (() => {
          const corte = new Date();
          corte.setDate(corte.getDate() - 7);
          const rec = registros.filter(
            (r) =>
              new Date(r.fechaDespertar + "T12:00:00") >= corte &&
              r.duracionMin,
          );
          return rec.length
            ? Math.round(
                rec.reduce((a, r) => a + r.duracionMin, 0) / rec.length,
              )
            : null;
        })();

        function guardarConfirmado(reg) {
          // Usa la prop registros (React state, siempre sincronizada) como fuente de verdad
          const nuevos = registros.filter(
            (r) => r.fechaDespertar !== reg.fechaDespertar,
          );
          nuevos.push(reg);
          setData("hgsp_sueno_registros", nuevos);
          onActualizar(nuevos);
          showToast("Registro guardado.");
        }

        function guardar(reg) {
          // Usa registros prop en vez de getData para garantizar consistencia con el estado React
          const anterior = registros.find(
            (r) => r.fechaDespertar === reg.fechaDespertar,
          );
          if (anterior) {
            setConfirmar({ reg, anterior });
            return;
          }
          guardarConfirmado(reg);
        }

        const stats = [
          {
            label: "Hora típica semana",
            value: medianaHora || "--:--",
            tooltip:
              "Mediana de la hora de acostarse en los últimos 7 días. La mediana ignora valores extremos y refleja mejor tu patrón real.",
          },
          {
            label: "Cumplimiento 7d",
            value: `${cumpl7}%`,
            tooltip:
              "Porcentaje de días en los últimos 7 en que te acostaste antes de tu meta.",
          },
          {
            label: "Racha actual",
            value: `${racha} día${racha !== 1 ? "s" : ""}`,
            tooltip:
              "Días consecutivos cumpliendo la meta de hora de acostarse. Necesitás 2 o más días seguidos para iniciar una racha.",
          },
          {
            label: "Prom. horas dormidas",
            value: promDur ? minAHoras(promDur) : "--",
            tooltip:
              "Promedio de horas dormidas por noche en los últimos 7 días.",
          },
        ];

        return (
          <div>
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4,1fr)",
                gap: "12px",
                marginBottom: "20px",
              }}
            >
              {stats.map((s) => (
                <div
                  key={s.label}
                  title={s.tooltip}
                  style={{
                    background: "#FAF7F2",
                    border: "2px solid #B8B0A0",
                    borderRadius: "var(--r)",
                    padding: "14px 16px",
                    position: "relative",
                    overflow: "hidden",
                    cursor: "help",
                  }}
                >
                  <div
                    style={{
                      position: "absolute",
                      top: 0,
                      left: 0,
                      right: 0,
                      height: "3px",
                      background: "var(--do)",
                    }}
                  />
                  <div
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: "10px",
                      textTransform: "uppercase",
                      color: "var(--tx3)",
                      marginBottom: "6px",
                    }}
                  >
                    {s.label}

      /* ── Tab: Tendencia del mes ── */
      function TabSuenoTendencia({ registros, config }) {
        const metaHora = config?.metaHoraAcostarse || "01:00";
        const cumpl30 = cumplimientoSueno(registros, metaHora, 30);
        const prom30 = promedioHoraSueno(registros, 30);
        const racha = calcularRachaSueno(registros, metaHora);

        /* Tendencia: promedio últimos 7 días vs. 7 días previos */
        const tendencia = (() => {
          const c7 = new Date();
          c7.setDate(c7.getDate() - 7);
          const c14 = new Date();
          c14.setDate(c14.getDate() - 14);
          const r7 = registros.filter(
            (r) => new Date(r.fechaDespertar + "T12:00:00") >= c7,
          );
          const r7p = registros.filter((r) => {
            const d = new Date(r.fechaDespertar + "T12:00:00");
            return d >= c14 && d < c7;
          });
          if (!r7.length || !r7p.length) return "→";
          const p7 =
            r7.reduce(
              (a, r) => a + (normalizarHoraSueno(r.horaAcostarse) || 0),
              0,
            ) / r7.length;
          const p7p =
            r7p.reduce(
              (a, r) => a + (normalizarHoraSueno(r.horaAcostarse) || 0),
              0,
            ) / r7p.length;
          return p7 < p7p - 0.25 ? "↑" : p7 > p7p + 0.25 ? "↓" : "→";
        })();

        const metricas = [
          { label: "Promedio del mes", value: prom30 || "--:--" },
          { label: "Mejor racha del mes", value: `${racha} días` },
          { label: "Cumplimiento (30d)", value: `${cumpl30}%` },
          {
            label: "Tendencia últimos 7d",
            value:
              tendencia === "↑"
                ? "↑ Mejorando"
                : tendencia === "↓"
                  ? "↓ Empeorando"
                  : "→ Estable",
          },
        ];

        /* Correlación de palabras en notas */
        const correlacion = (() => {
          const conNotas = registros.filter(
            (r) => r.notas && r.notas.length > 3,
          );
          if (conNotas.length < 5) return null;
          const metaN = normalizarHoraSueno(metaHora);
          const stop = new Set([
            "que",
            "con",
            "una",
            "por",
            "para",
            "pero",
            "como",
            "este",
            "esta",
            "son",
            "los",
            "las",
            "del",
            "mas",
            "muy",
            "era",
            "fue",
            "hay",
            "sus",
            "sin",
            "todo",
            "cada",
            "bien",
            "tuve",
            "algo",
          ]);
          function top(regs) {
            const f = {};
            regs.forEach((r) =>
              (r.notas || "")
                .toLowerCase()
                .split(/\s+/)
                .forEach((p) => {
                  const c = p.replace(/[^a-záéíóúñ]/gi, "");
                  if (c.length >= 4 && !stop.has(c)) f[c] = (f[c] || 0) + 1;
                }),
            );
            return Object.entries(f)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5)
              .map(([p]) => p);
          }
          const tardes = conNotas.filter(
            (r) => normalizarHoraSueno(r.horaAcostarse) > metaN,
          );
          const temprano = conNotas.filter(
            (r) => normalizarHoraSueno(r.horaAcostarse) <= metaN,
          );
          return { tardes: top(tardes), temprano: top(temprano) };
        })();

        return (
          <div>
            <div
              style={{
                background: "#FAF7F2",
                border: "2px solid #B8B0A0",
                borderRadius: "var(--r)",
                padding: "18px",
                marginBottom: "16px",
              }}
            >
              <div
                style={{
                  fontFamily: "var(--serif2)",
                  fontSize: "14px",
                  fontWeight: 700,
                  color: "var(--vd)",
                  marginBottom: "12px",
                }}
              >
                Últimos 30 días
              </div>
              <SuenoChartMensual registros={registros} metaHora={metaHora} />
            </div>

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "1fr 1fr",
                gap: "12px",
                marginBottom: "16px",
              }}
            >
              {metricas.map((s) => (
                <div
                  key={s.label}
                  style={{
                    background: "#FAF7F2",
                    border: "2px solid #B8B0A0",
                    borderRadius: "var(--r)",
                    padding: "14px 16px",
                    position: "relative",
                    overflow: "hidden",
                  }}
                >
                  <div
                    style={{
                      position: "absolute",
                      top: 0,
                      left: 0,
                      right: 0,
                      height: "3px",
                      background: "var(--do)",
                    }}
                  />
                  <div
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: "10px",
                      textTransform: "uppercase",
                      color: "var(--tx3)",
                      marginBottom: "4px",
                    }}
                  >
                    {s.label}
                  </div>
                  <div
                    style={{
                      fontFamily: "var(--data)",
                      fontSize: "20px",
                      fontWeight: 700,
                      color: "var(--vd)",
                    }}
                  >
                    {s.value}
                  </div>
                </div>
              ))}
            </div>

            {correlacion ? (
              <div
                style={{
                  background: "#FAF7F2",
                  border: "2px solid #B8B0A0",
                  borderRadius: "var(--r)",
                  padding: "16px",
                }}
              >
                <div
                  style={{
                    fontFamily: "var(--serif2)",
                    fontSize: "14px",
                    fontWeight: 700,
                    color: "var(--vd)",
                    marginBottom: "12px",
                  }}
                >
                  Palabras frecuentes en notas
                </div>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "1fr 1fr",
                    gap: "12px",
                  }}
                >
                  {[
                    {
                      titulo: "Noches tarde",
                      palabras: correlacion.tardes,
                      color: "var(--do)",
                      bg: "rgba(200,146,42,.12)",
                    },
                    {
                      titulo: "Noches a tiempo",
                      palabras: correlacion.temprano,
                      color: "var(--vc)",
                      bg: "rgba(74,124,95,.12)",
                    },
                  ].map((col) => (
                    <div key={col.titulo}>
                      <div
                        style={{
                          fontFamily: "var(--mono)",
                          fontSize: "10px",
                          color: "var(--tx3)",
                          textTransform: "uppercase",
                          marginBottom: "8px",
                        }}
                      >
                        {col.titulo}
                      </div>
                      <div
                        style={{
                          display: "flex",
                          flexWrap: "wrap",
                          gap: "6px",
                        }}
                      >
                        {col.palabras.length ? (
                          col.palabras.map((p) => (
                            <span
                              key={p}
                              style={{
                                background: col.bg,
                                color: col.color,
                                padding: "3px 10px",
                                borderRadius: "20px",
                                fontSize: "12px",
                                fontFamily: "var(--mono)",
                              }}
                            >
                              {p}
                            </span>
                          ))
                        ) : (
                          <span
                            style={{ color: "var(--tx3)", fontSize: "12px" }}
                          >
                            Insuficientes notas
                          </span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div
                style={{
                  background: "rgba(45,90,61,.06)",
                  borderRadius: "var(--r)",
                  padding: "14px 16px",
                  color: "var(--tx3)",
                  fontSize: "13px",
                }}
              >
                Agregá notas a tus registros para ver correlaciones entre
                palabras y horarios.
              </div>
            )}
          </div>
        );
      }

      /* ── Tab: Objetivos ── */
      function TabSuenoObjetivos({ registros, config, onConfigChange }) {
        const [editando, setEditando] = useState(false);
        const [metaInput, setMetaInput] = useState(
          config?.metaHoraAcostarse || "01:00",
        );
        const [historial, setHistorial] = useState(() =>
          getData("hgsp_sueno_objetivos_historial"),
        );
        const sugerencia = sugerirObjetivo(registros, config);
        const cumpl14 = cumplimientoSueno(
          registros,
          config?.metaHoraAcostarse || "01:00",
          14,
        );
        const corte14 = new Date();
        corte14.setDate(corte14.getDate() - 14);
        const dias14 = registros.filter(
          (r) => new Date(r.fechaDespertar + "T12:00:00") >= corte14,
        ).length;

        function archivarMeta(cfgActual, cumplida) {
          if (!cfgActual?.metaHoraAcostarse) return;
          const h = [
            ...historial,
            {
              metaHoraAcostarse: cfgActual.metaHoraAcostarse,
              fechaDesde: cfgActual.fechaMetaCreada || dateStr(new Date()),
              fechaHasta: dateStr(new Date()),
              cumplida,
            },
          ];
          setData("hgsp_sueno_objetivos_historial", h);
          setHistorial(h);
        }

        function guardarMeta() {
          archivarMeta(config, cumpl14 >= 70);
          const nueva = {
            ...config,
            metaHoraAcostarse: metaInput,
            fechaMetaCreada: dateStr(new Date()),
          };
          setData("hgsp_sueno_config", nueva);
          onConfigChange(nueva);
          setEditando(false);
          showToast("Meta actualizada.");
        }

        function aceptarSugerencia() {
          archivarMeta(config, cumpl14 >= 70);
          const nueva = {
            ...config,
            metaHoraAcostarse: sugerencia.nuevaMeta,
            fechaMetaCreada: dateStr(new Date()),
          };
          setData("hgsp_sueno_config", nueva);
          onConfigChange(nueva);
          showToast("Nuevo objetivo aceptado.");
        }

        return (
          <div>
            {/* Meta actual */}
            <div
              style={{
                background: "#FAF7F2",
                border: "2px solid #B8B0A0",
                borderLeft: "5px solid var(--vm)",
                borderRadius: "var(--r)",
                padding: "18px",
                marginBottom: "14px",
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  marginBottom: "10px",
                }}
              >
                <div
                  style={{
                    fontFamily: "var(--serif2)",
                    fontSize: "15px",
                    fontWeight: 700,
                    color: "var(--vd)",
                  }}
                >
                  Meta actual
                </div>
                <button
                  onClick={() => setEditando(!editando)}
                  style={{
                    padding: "5px 14px",
                    borderRadius: "50px",
                    background: "transparent",
                    border: "1.5px solid var(--crb)",
                    cursor: "pointer",
                    fontSize: "12px",
                    fontFamily: "var(--sans)",
                  }}
                >
                  {editando ? "Cancelar" : "✏️ Editar"}
                </button>
              </div>
              {editando ? (
                <div
                  style={{ display: "flex", gap: "10px", alignItems: "center" }}
                >
                  <input
                    type="time"
                    value={metaInput}
                    onChange={(e) => setMetaInput(e.target.value)}
                    style={{
                      padding: "8px 14px",
                      borderRadius: "50px",
                      border: "2px solid var(--vm)",
                      background: "#F0EBE0",
                      fontFamily: "var(--mono)",
                      fontSize: "16px",
                    }}
                  />
                  <button
                    onClick={guardarMeta}
                    style={{
                      padding: "8px 20px",
                      borderRadius: "50px",
                      background: "var(--do)",
                      color: "var(--vd)",
                      border: "none",
                      cursor: "pointer",
                      fontWeight: 700,
                      fontFamily: "var(--sans)",
                    }}
                  >
                    Guardar
                  </button>
                </div>
              ) : (
                <div>
                  <div
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: "32px",
                      fontWeight: 700,
                      color: "var(--do)",
                      marginBottom: "4px",
                    }}
                  >
                    {config?.metaHoraAcostarse || "--:--"}
                  </div>
                  <div style={{ fontSize: "13px", color: "var(--tx2)" }}>
                    Llevás {dias14} registros en 14 días · cumpliste el{" "}
                    {cumpl14}%
                  </div>
                </div>
              )}
            </div>

            {/* Sugerencia */}
            {sugerencia.sugerir ? (
              <div
                style={{
                  background: "rgba(200,146,42,.08)",
                  border: "2px solid rgba(200,146,42,.4)",
                  borderRadius: "var(--r)",
                  padding: "16px",
                  marginBottom: "14px",
                }}
              >
                <div
                  style={{
                    fontFamily: "var(--serif2)",
                    fontSize: "14px",
                    fontWeight: 700,
                    color: "var(--do)",

                  }}

                  Historial de metas

                {historial.map((h, i) => (
                  <div

                      </span>
                    </div>
                    <span

                        color: h.cumplida ? "#A8DDB8" : "#FDEAAA",
                      }}
                    >
                      {h.cumplida ? "Logrado" : "Abandonado"}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      /* ── Tab: Historial ── */
      function TabSuenoHistorial({ registros, onEliminar }) {
        const sorted = [...registros].sort((a, b) =>
          b.fechaDespertar.localeCompare(a.fechaDespertar),
        );
        const [pag, setPag] = useState(0);
        const POR_PAG = 10;
        const paginas = Math.ceil(sorted.length / POR_PAG);
        const pagActual = sorted.slice(pag * POR_PAG, (pag + 1) * POR_PAG);

        if (!registros.length)
          return (
            <div
              style={{
                textAlign: "center",
                padding: "40px 20px",
                color: "var(--tx3)",
                fontSize: "14px",
              }}
            >
              No hay registros aún. Empezá desde "Hoy y esta semana".
            </div>
          );

        return (
          <div>
            <div className="tbl-wrap">
              <table className="tbl" style={{ width: "100%" }}>
                <thead>
                  <tr>
                    {[
                      "Desperté",
                      "Acostarse",
                      "Despertar",
                      "Duración",
                      "Calidad",
                      "Notas",
                      "",
                    ].map((h, i) => (
                      <th key={i}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {pagActual.map((r) => (
                    <tr key={r.id}>
                      <td
                        style={{ fontFamily: "var(--mono)", fontSize: "12px" }}
                      >
                        {r.fechaDespertar}
                      </td>
                      <td
                        style={{ fontFamily: "var(--mono)", fontSize: "12px" }}
                      >
                        {r.horaAcostarse}
                      </td>
                      <td
                        style={{ fontFamily: "var(--mono)", fontSize: "12px" }}
                      >
                        {r.horaDespertar}
                      </td>
                      <td
                        style={{ fontFamily: "var(--mono)", fontSize: "12px" }}
                      >
                        {minAHoras(r.duracionMin)}
                      </td>
                      <td>{"⭐".repeat(r.calidad || 0)}</td>
                      <td
                        style={{
                          maxWidth: "140px",
                          overflow: "hidden",
                          textOverflow: "ellipsis",
                          whiteSpace: "nowrap",
                          fontSize: "12px",
                          color: "var(--tx2)",
                        }}
                        title={r.notas}
                      >
                        {r.notas || "—"}
                      </td>
                      <td>
                        <button
                          onClick={() => onEliminar(r.id)}
                          style={{
                            padding: "3px 10px",
                            borderRadius: "20px",
                            border: "1px solid rgba(180,50,50,.4)",
                            background: "transparent",
                            color: "rgba(180,50,50,.8)",
                            cursor: "pointer",
                            fontSize: "11px",
                            fontFamily: "var(--sans)",
                          }}
                        >
                          Eliminar
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {paginas > 1 && (
              <div
                style={{
                  display: "flex",
                  justifyContent: "center",
                  gap: "8px",
                  marginTop: "14px",
                }}
              >
                {Array.from({ length: paginas }).map((_, i) => (
                  <button
                    key={i}
                    onClick={() => setPag(i)}
                    style={{
                      padding: "5px 12px",
                      borderRadius: "20px",
                      border: "1.5px solid",
                      cursor: "pointer",
                      fontFamily: "var(--mono)",
                      fontSize: "12px",
                      borderColor: pag === i ? "var(--do)" : "var(--crb)",
                      background: pag === i ? "var(--do)" : "transparent",
                      color: pag === i ? "var(--vd)" : "var(--tx2)",
                    }}
                  >
                    {i + 1}
                  </button>
                ))}
              </div>
            )}
          </div>
        );
      }

      /* ── Componente principal: SubModuloSueno ── */
      function SubModuloSueno({ onBack }) {
        const [registros, setRegistros] = useState(() => {
          // Limpieza única de datos de prueba (fase 2 testing)
          if (!localStorage.getItem("hgsp_sueno_clean_v1")) {
            localStorage.removeItem("hgsp_sueno_registros");
            localStorage.setItem("hgsp_sueno_clean_v1", "1");
          }
          return getData("hgsp_sueno_registros");
        });
        const [config, setConfig] = useState(() => {
          const raw = localStorage.getItem("hgsp_sueno_config");
          return raw ? JSON.parse(raw) : null;
        });
        const [tabActiva, setTabActiva] = useState("dashboard");
        const [metaOnboarding, setMetaOnboarding] = useState("01:00");

        function guardarMetaInicial() {
          const cfg = {
            metaHoraAcostarse: metaOnboarding,
            metaHorasDormir: 7,
            fechaMetaCreada: dateStr(new Date()),
          };
          setData("hgsp_sueno_config", cfg);
          setData("hgsp_sueno_registros", []);
          setData("hgsp_sueno_objetivos_historial", []);
          setConfig(cfg);
          setRegistros([]);
          showToast("Meta guardada. Empezá registrando tu primer noche.");
        }

        function eliminarRegistro(id) {
          const todos = registros.filter((r) => r.id !== id);
          setData("hgsp_sueno_registros", todos);
          setRegistros(todos);
          showToast("Registro eliminado.");
        }

        const TABS = [
          { id: "dashboard", label: "🌙 Hoy y esta semana" },
          { id: "tendencia", label: "📈 Tendencia del mes" },
          { id: "objetivos", label: "🎯 Objetivos" },
          { id: "historial", label: "📝 Historial" },
        ];

        return (
          <div style={{ maxWidth: "860px", margin: "0 auto" }}>
            {/* Header fijo: Volver + título — SEPARADO del bloque de tabs */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                gap: "14px",
                marginBottom: "22px",
                background: "#FAF7F2",
                border: "2px solid var(--vm)",
                borderRadius: "var(--r)",
                padding: "14px 18px",
                boxShadow: "0 4px 12px rgba(30,61,43,0.15)",
              }}
            >
              <button
                type="button"
                onClick={(e) => {
                  e.stopPropagation();
                  onBack();
                }}
                style={{
                  padding: "7px 16px",
                  borderRadius: "50px",
                  background: "var(--vm)",
                  color: "#FFFFFF",
                  border: "none",
                  cursor: "pointer",
                  fontFamily: "var(--sans)",
                  fontSize: "13px",
                  fontWeight: 600,
                  flexShrink: 0,
                }}
              >
                ← Volver
              </button>
              <div className="page-header" style={{ flex: 1, marginBottom: 0 }}>
                <div className="page-header-icon">😴</div>
                <div>
                  <div className="page-header-title">Sueño</div>
                  <div className="page-header-sub">
                    Registro y seguimiento del hábito de sueño
                  </div>
                </div>
              </div>
            </div>

            {!config ? (
              /* ONBOARDING */
              <div
                style={{
                  background: "var(--vd)",
                  border: "2px solid var(--vm)",
                  borderRadius: "var(--r)",
                  padding: "28px",
                  maxWidth: "440px",
                  margin: "0 auto",
                }}
              >
                <div
                  style={{
                    height: "4px",
                    background: "linear-gradient(90deg,var(--do),#E8B84B)",
                    borderRadius: "4px",
                    marginBottom: "20px",
                  }}
                />
                <div
                  style={{
                    fontFamily: "var(--serif)",
                    fontSize: "20px",
                    color: "var(--do)",
                    marginBottom: "8px",
                  }}
                >
                  Definamos tu meta de hora de acostarse
                </div>
                <div
                  style={{
                    color: "rgba(255,255,255,.7)",
                    fontSize: "13px",
                    lineHeight: 1.7,
                    marginBottom: "20px",
                  }}
                >
                  Elegí una hora realista. Podés ajustarla en cualquier momento.
                  <br />
                  <span
                    style={{ color: "rgba(255,255,255,.4)", fontSize: "12px" }}
                  >
                    El objetivo no es cumplirla perfecto desde el día uno — es
                    tener un patrón visible.
                  </span>
                </div>
                <div style={{ marginBottom: "20px" }}>
                  <label style={suenoModalLabel}>Meta hora de acostarse</label>
                  <input
                    type="time"
                    value={metaOnboarding}
                    onChange={(e) => setMetaOnboarding(e.target.value)}
                    style={{
                      ...suenoModalInput,
                      fontSize: "20px",
                      padding: "12px 18px",
                    }}
                  />
                </div>
                <button
                  type="button"
                  onClick={guardarMetaInicial}
                  style={{
                    width: "100%",
                    padding: "13px",
                    borderRadius: "50px",
                    background: "var(--do)",
                    color: "var(--vd)",
                    border: "none",
                    cursor: "pointer",
                    fontWeight: 700,
                    fontFamily: "var(--sans)",
                    fontSize: "15px",
                  }}
                >
                  Guardar meta y empezar
                </button>
              </div>
            ) : (
              <>
                {/* Tabs — contenedor independiente, sin ningún handler que llame a onBack */}
                <div
                  style={{
                    background: "var(--cro)",
                    borderRadius: "50px",
                    padding: "4px",
                    display: "flex",
                    gap: "2px",
                    marginBottom: "20px",
                  }}
                >
                  {TABS.map((t) => (
                    <button
                      key={t.id}
                      type="button"
                      onClick={(e) => {
                        e.stopPropagation();
                        setTabActiva(t.id);
                      }}
                      style={{
                        flex: 1,
                        padding: "8px 10px",
                        borderRadius: "50px",
                        border: "none",
                        cursor: "pointer",
                        fontFamily: "var(--sans)",
                        fontWeight: tabActiva === t.id ? 700 : 400,
                        fontSize: "12px",
                        background:
                          tabActiva === t.id ? "var(--vd)" : "transparent",
                        color: tabActiva === t.id ? "var(--bl)" : "var(--tx2)",
                        whiteSpace: "nowrap",
                      }}
                    >
                      {t.label}
                    </button>
                  ))}
                </div>
                {tabActiva === "dashboard" && (
                  <TabSuenoDashboard
                    registros={registros}
                    config={config}
                    onActualizar={setRegistros}
                  />
                )}
                {tabActiva === "tendencia" && (
                  <TabSuenoTendencia registros={registros} config={config} />
                )}
                {tabActiva === "objetivos" && (
                  <TabSuenoObjetivos
                    registros={registros}
                    config={config}
                    onConfigChange={setConfig}
                  />
                )}
                {tabActiva === "historial" && (
                  <TabSuenoHistorial
                    registros={registros}
                    onEliminar={eliminarRegistro}
                  />
                )}
              </>
            )}
          </div>
        );
      }

      /* Componente principal del módulo Vida y Hogar */
      function SeccionVidaHogar({ onNavigate }) {
        const [catAbierta, setCatAbierta] = useState(null);
        const [panelAbierto, setPanelAbierto] = useState(null);
        const [subModulo, setSubModulo] = useState(null);

        if (subModulo === "sueno")
          return <SubModuloSueno onBack={() => setSubModulo(null)} />;

        function toggleCat(id) {
          setCatAbierta((prev) => (prev === id ? null : id));
          setPanelAbierto(null);
        }

        function clickHijo(hijo) {
          if (hijo.estado === "enlazado") {
            onNavigate(hijo.enlaceA);
            return;
          }
          if (hijo.modulo) {
            setSubModulo(hijo.modulo);
            return;
          }
          // activo (proximamente) y pendiente: toggle panel inline
          setPanelAbierto((prev) => (prev === hijo.id ? null : hijo.id));
        }

        function colorEstado(estado) {
          if (estado === "activo")
            return "#96690E"; /* dorado oscuro — legible sobre crema */
          if (estado === "enlazado") return "var(--vm)"; /* verde medio */
          return "#7A6F65"; /* marrón-gris cálido */
        }

        function bgEstado(estado) {
          if (estado === "activo") return "#FFF4DC"; /* crema dorada */
          if (estado === "enlazado") return "#E8F0EB"; /* crema verde */
          return "#EAE4DA"; /* crema marrón */
        }

        function borderEstado(estado) {
          if (estado === "activo") return "#D4A030"; /* dorado */
          if (estado === "enlazado") return "#4A7C5F"; /* verde */
          return "#C0B5A8"; /* marrón claro */
        }

        function borderLeftEstado(estado) {
          if (estado === "activo") return "var(--do)";
          if (estado === "enlazado") return "var(--vc)";
          return "#B0A496";
        }

        function catActiva(cat) {
          return cat.hijos.some((h) => h.estado === "activo");
        }

        return (
          <div style={{ maxWidth: "780px", margin: "0 auto" }}>
            {/* Encabezado de página */}
            <div className="page-header" style={{ marginBottom: "28px" }}>
              <div className="page-header-icon">🌳</div>
              <div>
                <div className="page-header-title">Vida y Hogar</div>
                <div className="page-header-sub">
                  Organización personal —{" "}
                  {ARBOL_VIDA.reduce((a, c) => a + c.hijos.length, 0)} módulos ·{" "}
                  {ARBOL_VIDA.reduce(
                    (a, c) =>
                      a + c.hijos.filter((h) => h.estado === "activo").length,
                    0,
                  )}{" "}
                  activos
                </div>
              </div>
            </div>

            {/* Árbol de categorías */}
            {ARBOL_VIDA.map((cat) => {
              const abierta = catAbierta === cat.id;
              const activos = cat.hijos.filter(
                (h) => h.estado === "activo",
              ).length;
              const pendientes = cat.hijos.filter(
                (h) => h.estado === "pendiente",
              ).length;

              /* Colores por estado del ítem hijo */
              function bgHijo(estado) {
                if (estado === "activo")
                  return "#F5D898"; /* crema dorada — protagonista */
                if (estado === "enlazado")
                  return "#C8D8BE"; /* crema verde suave */
                return "#D8CEBC"; /* beige apagado — no compite */
              }
              function borderLeftHijo(estado) {
                if (estado === "activo")
                  return "#C8922A"; /* dorado var(--do) */
                if (estado === "enlazado") return "#4A7C5F"; /* verde */
                return "#A09888"; /* marrón gris muy neutro */
              }
              function textHijo(estado) {
                if (estado === "activo")
                  return "#6B4200"; /* dorado oscuro — prominente */
                if (estado === "enlazado") return "#1E3D2B"; /* verde oscuro */
                return "#6A6258"; /* gris-marrón apagado */
              }

              return (
                <div
                  key={cat.id}
                  style={{
                    marginBottom: "12px",
                    borderRadius: "18px",
                    border: "1.5px solid #1A1A18",
                    boxShadow: "4px 4px 0px rgba(0,0,0,0.75)",
                    overflow: "hidden",
                  }}
                >
                  {/* Header de categoría */}
                  <div
                    onClick={() => toggleCat(cat.id)}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "12px",
                      padding: "14px 18px",
                      background: catActiva(cat) ? "var(--vm)" : "#7A6F65",
                      cursor: "pointer",
                      userSelect: "none",
                      borderRadius: abierta ? "16px 16px 0 0" : "16px",
                      borderBottom: abierta
                        ? "1.5px solid rgba(0,0,0,0.4)"
                        : "none",
                      transition: "border-radius .2s",
                    }}
                  >
                    <span style={{ fontSize: "20px" }}>{cat.emoji}</span>
                    <div style={{ flex: 1 }}>
                      <div
                        style={{
                          fontFamily: "var(--serif)",
                          fontSize: "15px",
                          fontWeight: 700,
                          color: "#fff",
                        }}
                      >
                        {cat.label}
                      </div>
                      <div
                        style={{
                          fontFamily: "var(--mono)",
                          fontSize: "10px",
                          color: "rgba(255,255,255,.65)",
                          marginTop: "1px",
                        }}
                      >
                        {activos} activos · {pendientes} pendientes
                      </div>
                    </div>
                    <span
                      style={{
                        color: "rgba(255,255,255,.8)",
                        fontSize: "13px",
                        transition: "transform .2s",
                        display: "inline-block",
                        transform: abierta ? "rotate(180deg)" : "rotate(0deg)",
                      }}
                    >
                      ▼
                    </span>
                  </div>

                  {/* Hijos */}
                  {abierta && (
                    <div
                      style={{
                        background: "#4E6352",
                        borderRadius: "0 0 16px 16px",
                        padding: "10px 12px 12px",
                      }}
                    >
                      {cat.hijos.map((hijo) => (
                        <div key={hijo.id}>
                          <div
                            onClick={() => clickHijo(hijo)}
                            style={{
                              display: "flex",
                              alignItems: "center",
                              gap: "10px",
                              padding: "10px 14px 10px 12px",
                              marginBottom:
                                panelAbierto === hijo.id ? "0" : "6px",
                              borderRadius:
                                panelAbierto === hijo.id
                                  ? "10px 10px 0 0"
                                  : "10px",
                              background: bgHijo(hijo.estado),
                              border: "1.5px solid #1A1A18",
                              borderLeft: `6px solid ${borderLeftHijo(hijo.estado)}`,
                              boxShadow:
                                "2.5px 3px 0px rgba(0,0,0,0.55), inset 1px 1px 3px rgba(255,255,255,0.45)",
                              cursor: "pointer",
                              transition: "box-shadow .15s",
                            }}
                          >
                            <span
                              style={{
                                fontSize: "16px",
                                background: "#FFFFFF",
                                borderRadius: "50%",
                                width: "30px",
                                height: "30px",
                                display: "inline-flex",
                                alignItems: "center",
                                justifyContent: "center",
                                flexShrink: 0,
                              }}
                            >
                              {hijo.emoji}
                            </span>
                            <span
                              style={{
                                flex: 1,
                                fontSize: "13px",
                                fontWeight: 600,
                                color: textHijo(hijo.estado),
                              }}
                            >
                              {hijo.label}
                            </span>
                            {hijo.estado === "enlazado" && (
                              <span
                                style={{
                                  fontSize: "12px",
                                  color: "#2D5A3D",
                                  fontWeight: 700,
                                }}
                              >
                                →
                              </span>
                            )}
                            {hijo.estado === "activo" && (
                              <span
                                style={{
                                  fontFamily: "var(--mono)",
                                  fontSize: "9px",
                                  fontWeight: 700,
                                  background: "var(--do)",
                                  color: "var(--vd)",
                                  padding: "3px 9px",
                                  borderRadius: "10px",
                                  border: "1.5px solid #1A1A18",
                                  boxShadow: "1.5px 2px 0px rgba(0,0,0,0.45)",
                                }}
                              >
                                PRÓXIMO
                              </span>
                            )}
                            {hijo.estado === "pendiente" && (
                              <span
                                style={{
                                  fontFamily: "var(--mono)",
                                  fontSize: "9px",
                                  fontWeight: 500,
                                  color: "#8A8278",
                                  background: "#C8C0B4",
                                  padding: "2px 8px",
                                  borderRadius: "10px",
                                }}
                              >
                                pendiente
                              </span>
                            )}
                          </div>
                          {panelAbierto === hijo.id && (
                            <PanelPorConstruirse
                              id={hijo.id}
                              proximamente={hijo.proximamente}
                            />
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* COMPONENTE PRINCIPAL: App              */
      /* ═══════════════════════════════════════ */
      function App() {
        const [activeSection, setActiveSection] = useState("agenda");
        const [badgeCounts, setBadgeCounts] = useState({});
        const [modalTurno, setModalTurno] = useState(null);
        const [modalReserva, setModalReserva] = useState(null);

        const hoyStr = new Date().toISOString().slice(0, 10);

        useEffect(() => {
          setBadgeCounts(computeBadges());
        }, [activeSection]);

        function renderSection() {
          const agendaProps = {
            modalTurno, setModalTurno,
            modalReserva, setModalReserva
          };
          switch (activeSection) {
            case "agenda":
              return <SeccionAgenda {...agendaProps} />;
            case "pacientes":
              return <SeccionPacientes />;
            case "facturacion":
              return <SeccionFacturacion />;
            case "planillas_at":
              return <SeccionPlanillasAT />;
            case "gastos":
              return <SeccionGastos />;
            case "eventos":
              return <SeccionEventos />;
            case "config":
              return <SeccionConfig />;
            case "vida_hogar":
              return <SeccionVidaHogar onNavigate={setActiveSection} />;
            default:
              return <SeccionAgenda {...agendaProps} />;
          }
        }

        return (
          <React.Fragment>
            <Topbar
              activeSection={activeSection}
              onNavigate={setActiveSection}
              onNewTurno={() => setModalTurno({ mode: "nuevo", sesion: null, fecha: hoyStr, hora: "10:00" })}
              onNewReserva={() => setModalReserva({ reserva: null, fecha: hoyStr, hora: "10:00" })}
            />
            <div className="app-layout">
              <Sidebar
                activeSection={activeSection}
                onNavigate={setActiveSection}
                badgeCounts={badgeCounts}
              />
              <div className="main-content">{renderSection()}</div>
            </div>
            <ToastContainer />
          </React.Fragment>
        );
      }

      /* ═══════════════════════════════════════ */
      /* RENDER                                 */
      /* ═══════════════════════════════════════ */
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
