<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plataforma Clínica — Hernán Stagni</title>

    <!-- ═══════════════════════════════════════ -->
    <!-- GOOGLE FONTS                           -->
    <!-- ═══════════════════════════════════════ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Josefin+Slab:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ═══════════════════════════════════════ -->
    <!-- REACT 18 + BABEL + TAILWIND CDN        -->
    <!-- ═══════════════════════════════════════ -->
    <script
      src="https://unpkg.com/react@18/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

    <!-- ═══════════════════════════════════════ -->
    <!-- VARIABLES CSS + ESTILOS BASE           -->
    <!-- ═══════════════════════════════════════ -->
    <style>
      /* ── PALETA DE COLORES ── */
      :root {
        /* VERDES — estructura principal */
        --vd: #1e3d2b;
        --vm: #2d5a3d;
        --vc: #4a7c5f;
        --vs: #d4e6da;
        --vu: #eef5f0;

        /* DORADOS — acentos y branding */
        --do: #c8922a;
        --dc: #f5e6c8;

        /* CREMAS — fondos del área principal */
        --cr: #f5f0e8;
        --cro: #ede6d8;
        --crb: #d8d0c0;

        /* TEXTOS */
        --tx: #1a2e22;
        --tx2: #4a6357;
        --tx3: #7a9485;
        --bl: #ffffff;

        /* WARM ACCENTS */
        --wb: #fff8e8;
        --wc: #7a5200;

        /* RADIOS */
        --r: 20px;
        --rsm: 12px;

        /* FUENTES */
        --serif: 'Merriweather', serif;
        --serif2: 'Josefin Slab', serif;
        --data: 'DM Sans', sans-serif;
        --sans: 'Inter', sans-serif;
        --mono: 'DM Mono', monospace;
        --serif-num: 'DM Sans', sans-serif;
      }

      body {
        background: #ede8dc;
        font-family: var(--sans);
        color: var(--tx);
        font-size: 14px;
        line-height: 1.6;
        margin: 0;
        padding: 0;
      }

      * {
        box-sizing: border-box;
      }

      /* ── SCROLLBAR PERSONALIZADA ── */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--crb);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--vc);
      }

      /* ── TOPBAR ── */
      .topbar {
        background: var(--vd);
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        border-bottom: 2px solid rgba(200, 146, 42, 0.4);
      }
      .topbar-row-1 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 24px;
        border-bottom: 1px solid rgba(200, 146, 42, 0.2);
      }
      .topbar-row-2 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        background: rgba(0, 0, 0, 0.05);
      }

      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .topbar-icon {
        width: 42px;
        height: 42px;
        background: var(--do);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        box-shadow: 0 0 0 3px rgba(200, 146, 42, 0.35);
        flex-shrink: 0;
      }

      .topbar-title {
        font-family: var(--serif);
        font-size: 22px;
        font-weight: 400;
        color: var(--do);
        line-height: 1.2;
      }

      .topbar-subtitle {
        font-family: var(--sans);
        font-size: 12px;
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.2;
      }

      .topbar-center {
        display: none; /* eliminado: page-header sticky ya muestra la sección */
      }

      .topbar-cta {
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.92);
        border-radius: 50px;
        padding: 8px 18px;
        font-family: var(--sans);
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .topbar-cta:hover {
        background: rgba(255, 255, 255, 0.18);
        border-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-1px);
      }
      .topbar-cta.primary {
        background: var(--do);
        color: var(--vd);
        border-color: var(--do);
        box-shadow: 0 4px 12px rgba(200, 146, 42, 0.3);
      }
      .topbar-cta.primary:hover {
        background: #E8B84B;
        border-color: #E8B84B;
        box-shadow: 0 6px 16px rgba(200, 146, 42, 0.45);
      }
      .topbar-actions {
        display: flex;
        gap: 10px;
        margin-right: 10px;
      }

      /* ── LAYOUT PRINCIPAL ── */
      .app-layout {
        display: flex;
        min-height: calc(100vh - 64px);
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: 240px;
        background: var(--vd);
        position: sticky;
        top: 64px;
        height: calc(100vh - 64px);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .sidebar-section-label {
        color: var(--do);
        text-transform: uppercase;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.07em;
        padding: 18px 18px 8px;
        border-top: 1px solid rgba(200, 146, 42, 0.35);
      }
      .sidebar-section-label:first-child {
        border-top: none;
      }

      .sidebar-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 18px;
        margin: 2px 10px;
        border-radius: 50px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.78);
        font-weight: 500;
        font-size: 13.5px;
        transition: all 0.2s;
        user-select: none;
        position: relative;
      }
      .sidebar-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .sidebar-item.active {
        background: var(--do);
        color: var(--vd);
        font-weight: 700;
      }

      .sidebar-item-icon {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }
      .sidebar-item.active .sidebar-item-icon {
        background: rgba(30, 61, 43, 0.25);
      }

      .sidebar-badge {
        background: var(--do);
        color: var(--vd);
        font-family: var(--data);
        font-size: 10px;
        font-weight: 700;
        border-radius: 10px;
        padding: 2px 7px;
        margin-left: auto;
      }
      .sidebar-item.active .sidebar-badge {
        background: var(--vd);
        color: var(--do);
      }

      .sidebar-footer {
        margin-top: auto;
        padding: 18px;
        border-top: 1px solid rgba(200, 146, 42, 0.35);
      }

      .sidebar-footer-label {
        font-family: var(--mono);
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 10px;
      }

      .sidebar-status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 5px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.on {
        background: #4ade80;
        box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
      }
      .dot.off {
        background: #6b7280;
      }

      /* ── ÁREA PRINCIPAL ── */
      .main-content {
        flex: 1;
        padding: 28px 32px;
        min-width: 0;
      }

      /* ── SECCIÓN PAGE HEADER ── */
      .page-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
        padding: 12px 20px;
        background: var(--vd);
        position: sticky;
        top: 64px;
        z-index: 89;
        border-radius: var(--r);
        border: 2px solid var(--vm);
        border-left: 5px solid var(--do);
        box-shadow: 0 4px 16px rgba(30,61,43,.35);
      }
      .page-header-icon {
        width: 44px;
        height: 44px;
        background: rgba(200,146,42,.18);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
        border: 1.5px solid rgba(200,146,42,.35);
      }
      .page-header-title {
        font-family: var(--serif);
        font-size: 26px;
        font-weight: 700;
        color: #fff;
        letter-spacing: .02em;
      }
      .page-header-sub {
        font-family: var(--sans);
        font-size: 12px;
        color: rgba(255,255,255,.55);
        margin-top: 1px;
      }
      .page-header-btns {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        flex-shrink: 0;
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .collapsible-enter { animation: slideDown .2s ease-out; }
      @media (max-width: 767px) {
        .page-header-btns { flex-direction: column; align-items: stretch; width: 100%; margin-top: 10px; }
        .page-header-btns .btn, .page-header-btns button, .page-header-btns span { width: 100%; justify-content: center; }
      }

      /* ── CARDS ── */
      .card {
        background: #faf7f2;
        border: 2px solid #b8b0a0;
        border-left: 5px solid var(--vm);
        border-radius: var(--r);
        padding: 22px;
        margin-bottom: 18px;
      }
      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .card-header-icon {
        width: 32px;
        height: 32px;
        background: var(--vu);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .card-header-title {
        font-family: var(--serif2);
        font-size: 16px;
        font-weight: 700;
        color: var(--vd);
      }

      /* ── BOTONES ── */
      .btn {
        border-radius: 50px;
        font-family: var(--sans);
        font-weight: 600;
        padding: 9px 22px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid transparent;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn-p {
        background: var(--vd);
        color: var(--bl);
        border-color: var(--vd);
      }
      .btn-p:hover {
        background: var(--vm);
        border-color: var(--vm);
      }

      .btn-g {
        background: var(--do);
        color: var(--vd);
        border-color: var(--do);
      }
      .btn-g:hover {
        background: #b8821f;
        border-color: #b8821f;
      }

      .btn-sec {
        border-color: var(--crb);
        background: var(--bl);
        color: var(--tx);
      }
      .btn-sec:hover {
        border-color: var(--vc);
      }

      .btn-danger {
        border-color: #d9534f;
        background: transparent;
        color: #d9534f;
      }
      .btn-danger:hover {
        border-color: #c9302c;
        color: #c9302c;
      }

      /* ── INPUTS ── */
      .input {
        border-radius: 50px;
        padding: 9px 18px;
        border: 2px solid var(--vm);
        background: #f0ebe0;
        font-family: var(--sans);
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
        width: 100%;
      }
      .input:focus {
        border-color: var(--do);
        background: #fff8ec;
      }

      /* ── MODAL OVERLAY ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(30, 61, 43, 0.55);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.2s ease;
      }
      .modal-card {
        background: var(--vd);
        border: 2px solid var(--vm);
        border-radius: var(--r);
        width: 90%;
        max-width: 520px;
        max-height: 85vh;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      .modal-bar {
        height: 4px;
        background: linear-gradient(90deg, var(--do), #e8b84b);
        border-radius: var(--r) var(--r) 0 0;
        flex-shrink: 0;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px 14px;
        flex-shrink: 0;
        background: var(--vd);
        border-bottom: 1px solid rgba(200,146,42,.15);
      }
      .modal-title {
        font-family: var(--serif);
        color: var(--do);
        font-size: 20px;
        font-weight: 400;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
      }
      .modal-close {
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.5);
        font-size: 22px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 8px;
        transition: all 0.2s;
      }
      .modal-close:hover {
        color: var(--bl);
        background: rgba(255, 255, 255, 0.1);
      }
      .modal-body {
        padding: 18px 22px 22px;
        overflow-y: auto;
        flex: 1;
      }
      .modal-icon-btn {
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.15);
        color: rgba(255,255,255,.7);
        width: 32px; height: 32px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 15px; transition: all .2s;
        flex-shrink: 0;
      }
      .modal-icon-btn:hover { background: rgba(255,255,255,.15); color: white; }
      .modal-icon-btn.danger:hover { background: rgba(249,115,22,.2); color: #FCA87A; border-color: rgba(249,115,22,.4); }
      .modal-confirm-cancel {
        display: flex; flex-direction: column; gap: 10px;
        padding: 14px 22px;
        background: var(--vd);
        border-bottom: 1px solid rgba(200,146,42,.15);
        flex-shrink: 0;
      }
      .modal-confirm-cancel-text {
        color: rgba(255,255,255,.85); font-size: 13px; font-family: var(--sans);
      }
      .modal-confirm-cancel-btns { display: flex; gap: 8px; }
      /* ── MODAL TURNO: cabecera compacta ── */
      .mt-pac-nombre {
        font-family: var(--serif); color: var(--do);
        font-size: 17px; font-weight: 700; line-height: 1.2;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .mt-datetime {
        font-family: var(--mono); font-size: 11px;
        color: rgba(255,255,255,.5); margin-top: 2px;
      }
      .mt-always-row {
        display: grid; grid-template-columns: 1fr 1fr 1fr;
        gap: 8px; padding: 0 0 12px 0;
        border-bottom: 1px solid rgba(255,255,255,.07);
        margin-bottom: 2px;
      }
      .mt-always-row .modal-input { padding: 7px 10px; margin-bottom: 0; border: 2px solid var(--do); background: rgba(200,146,42,.08); }
      /* ── ACORDEÓN ── */
      .acc-row {
        border: 1.5px solid rgba(200,146,42,.28); border-radius: 12px;
        margin-bottom: 5px; background: rgba(255,255,255,.025);
        overflow: hidden; transition: border-color .15s;
      }
      .acc-row:hover { border-color: rgba(200,146,42,.52); }
      .acc-row:last-of-type { margin-bottom: 0; }
      .acc-head {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 14px; cursor: pointer; user-select: none;
        transition: background .15s;
      }
      .acc-head:hover { background: rgba(255,255,255,.04); }
      .acc-chk {
        width: 17px; height: 17px; flex-shrink: 0; border-radius: 4px;
        border: 2px solid rgba(200,146,42,.45); background: transparent;
        display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-weight: 900; color: transparent; transition: all .15s;
      }
      .acc-chk.on { background: var(--do); border-color: var(--do); color: var(--vd); }
      .acc-label {
        font-family: var(--mono); font-size: 11px; font-weight: 500;
        color: rgba(255,255,255,.82); text-transform: uppercase;
        letter-spacing: .07em; white-space: nowrap;
      }
      .acc-value {
        font-family: var(--mono); font-size: 12px; color: var(--do);
        flex: 1; text-align: right; margin-right: 2px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .acc-arrow { color: rgba(255,255,255,.28); font-size: 10px; flex-shrink: 0; }
      .acc-body { padding: 0 14px 14px 14px; }
      .modal-label {
        font-family: var(--serif2);
        font-size: 10px;
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }
      .modal-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 2px solid rgba(200, 146, 42, 0.3);
        color: rgba(255, 255, 255, 0.9);
        border-radius: 50px;
        padding: 9px 18px;
        font-family: var(--sans);
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
        margin-bottom: 14px;
      }
      .modal-input:focus {
        border-color: var(--do);
        background: rgba(255, 255, 255, 0.1);
      }

      /* ── TOAST ── */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 300;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toast {
        background: var(--vd);
        color: var(--cr);
        border: 1px solid var(--vm);
        border-radius: 12px;
        padding: 14px 20px 10px;
        min-width: 280px;
        max-width: 380px;
        box-shadow: 0 8px 30px rgba(30, 61, 43, 0.4);
        animation: slideInRight 0.3s ease;
        overflow: hidden;
        position: relative;
      }
      .toast-text {
        font-size: 13.5px;
        font-weight: 500;
        margin-bottom: 8px;
      }
      .toast-progress {
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
        margin: 0 -20px -10px;
      }
      .toast-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--do), #e8b84b);
        border-radius: 4px;
        animation: shrink 3s linear forwards;
      }

      /* ── BADGE ── */
      .badge {
        border-radius: 50px;
        padding: 5px 12px;
        font-weight: 700;
        font-size: 11px;
        display: inline-block;
      }
      .badge-ok {
        background: #1e3d2b;
        color: #a8ddb8;
      }
      .badge-warn {
        background: #7a5200;
        color: #fdeaaa;
      }
      .badge-error {
        background: #7a2800;
        color: #ffd0b8;
      }

      /* ── TABS ── */
      .tabs-container {
        background: var(--cro);
        border-radius: 50px;
        padding: 4px;
        display: inline-flex;
        gap: 2px;
      }
      .tab-item {
        padding: 7px 18px;
        border-radius: 50px;
        font-family: var(--serif2);
        font-weight: 500;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--tx2);
        user-select: none;
      }
      .tab-item:hover {
        color: var(--vd);
      }
      .tab-item.active {
        background: var(--vd);
        color: var(--bl);
        font-weight: 700;
      }

      /* ── STAT CARD ── */
      .stat-card {
        background: #faf7f2;
        border: 1px solid rgba(184, 176, 160, 0.6);
        border-radius: 12px;
        padding: 8px 14px 10px;
        position: relative;
        overflow: hidden;
        box-shadow:
          0 6px 12px rgba(0, 0, 0, 0.15),
          0 2px 4px rgba(0, 0, 0, 0.12),
          inset 0 1px 1px rgba(255, 255, 255, 0.8),
          inset 0 -2px 4px rgba(184, 176, 160, 0.15);
        transform: translateY(0);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow:
          0 10px 18px rgba(0, 0, 0, 0.2),
          0 4px 6px rgba(0, 0, 0, 0.1),
          inset 0 1px 1px rgba(255, 255, 255, 0.8),
          inset 0 -2px 4px rgba(184, 176, 160, 0.15);
      }
      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--do), #e8b84b);
      }
      .stat-label {
        font-family: var(--mono);
        font-size: 9px;
        text-transform: uppercase;
        color: var(--tx3);
        letter-spacing: 0.05em;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .stat-value {
        font-family: var(--data);
        font-size: 17px;
        font-weight: 700;
        color: var(--vd);
        line-height: 1.1;
        text-shadow: 1px 1px 2px rgba(200, 146, 42, 0.15);
      }
      /* Signo $ más pequeño que el número */
      .stat-value .sv-currency {
        font-size: 0.65em;
        font-weight: 500;
        color: var(--tx3);
        vertical-align: super;
        margin-right: 2px;
        letter-spacing: 0;
      }
      /* Separadores de miles en DM Sans */
      .stat-value .sv-num {
        font-family: var(--data);
      }

      /* ── SEARCH INPUT ── */
      .search-wrap {
        position: relative;
        display: inline-block;
      }
      .search-wrap .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        pointer-events: none;
      }
      .search-wrap .input {
        padding-left: 40px;
      }

      /* ── ANIMATIONS ── */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideInRight {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes shrink {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }

      /* ── STATS GRID ── */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 0;
      }
      /* ── TOTALES COBRO ── */
      .totales-cobro {
        display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;
      }
      .total-item {
        background: #FAF7F2; border: 2px solid #B8B0A0; border-radius: var(--r);
        padding: 14px 18px; position: relative; overflow: hidden;
      }
      .total-item::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; }
      .total-item.cobrado::before { background: linear-gradient(90deg, var(--vm), #4A7C5F); }
      .total-item.pendiente::before { background: linear-gradient(90deg, var(--do), #E8B84B); }
      .total-item-label { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--tx3); margin-bottom:4px; }
      .total-item-valor { font-family:var(--serif); font-size:26px; font-weight:700; color:var(--vd); }
      /* ── AGENDA ACCIONES ── */
      .agenda-acciones { display:flex; gap:8px; align-items:center; margin-left:auto; flex-wrap:wrap; }
      /* ── PANEL OBJETIVOS ── */
      .obj-panel-view { display:flex; align-items:flex-start; gap:24px; }
      .obj-edit-actions { display:flex; gap:8px; margin-top:12px; }
      /* ── BREADCRUMB MOBILE ── */
      .topbar-breadcrumb { display:none; }

      /* ══════════════════════════════════════════ */
      /* RESPONSIVE < 768px                        */
      /* ══════════════════════════════════════════ */
      @media (max-width: 767px) {
        .sidebar {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          top: auto;
          width: 100%;
          height: 60px;
          flex-direction: row;
          overflow-x: auto;
          overflow-y: hidden;
          z-index: 99;
          border-top: 2px solid rgba(200, 146, 42, 0.4);
          align-items: center;
          justify-content: space-around;
          padding: 0 4px;
        }
        .sidebar-section-label,
        .sidebar-footer,
        .sidebar-badge {
          display: none;
        }
        .sidebar-item {
          flex-direction: column;
          gap: 2px;
          padding: 6px 10px;
          margin: 0;
          border-radius: 12px;
          font-size: 9px;
          min-width: max-content;
        }
        .sidebar-item-icon {
          width: 30px;
          height: 30px;
          font-size: 16px;
        }
        .sidebar-item span:not(.sidebar-item-icon) {
          font-size: 9px;
        }

        .topbar-brand {
          flex: 1;
        }
        .topbar-cta {
          display: none;
        }
        .topbar-center {
          display: none;
        }
        .topbar {
          position: fixed; top: 0; left: 0; right: 0; z-index: 200;
          height: auto; flex-wrap: wrap; align-items: center;
          padding: 0 14px;
        }
        .topbar-breadcrumb {
          display: flex; align-items: center; gap: 8px; width: 100%;
          padding: 6px 0 8px; font-family: var(--sans); font-size: 13px;
          font-weight: 700; color: rgba(255,255,255,.88);
          border-top: 1px solid rgba(200,146,42,.22);
        }
        .app-layout {
          flex-direction: column;
          margin-top: 100px;
          min-height: calc(100vh - 100px - 60px);
        }
        /* BUG 1 — Objetivos responsive */
        .obj-panel-view { flex-direction: column !important; gap: 12px !important; }
        .obj-panel-view button[style] { width: 100% !important; box-sizing: border-box; }
        .obj-edit-actions { flex-direction: column; }
        .obj-edit-actions .btn { width: 100%; text-align: center; justify-content: center; }
        /* page-header sticky en mobile debajo del topbar de 2 filas */
        .page-header { top: 100px; }
        .main-content { padding: 16px 14px 80px; }
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
        .totales-cobro { grid-template-columns: 1fr; }
        .agenda-acciones { flex-direction: column; margin-left: 0; width: 100%; }
        .agenda-acciones .btn, .agenda-acciones > button, .agenda-acciones > span {
          width: 100%; justify-content: center; text-align: center;
        }
        .card {
          border-left-width: 3px;
        }
      }

      @media (max-width: 480px) {
        .stats-grid {
          grid-template-columns: 1fr;
        }
      }

      /* ══════════════════════════════════════════ */
      /* FASE 3 — ESTILOS MÓDULO PACIENTES        */
      /* ══════════════════════════════════════════ */

      /* ── TARJETA PACIENTE PREMIUM (fondo oscuro) ── */
      .pac-card {
        background: var(--vd);
        border: 2px solid var(--vm);
        border-radius: var(--r);
        padding: 18px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.25s;
      }
      .pac-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--do), #e8b84b);
      }
      .pac-card:hover {
        border-color: var(--do);
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(30, 61, 43, 0.35);
      }
      .pac-avatar {
        width: 42px;
        height: 42px;
        background: var(--do);
        color: var(--vd);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--serif);
        font-size: 16px;
        font-weight: 700;
        box-shadow: 0 0 12px rgba(200, 146, 42, 0.35);
        flex-shrink: 0;
      }
      .pac-name {
        font-family: var(--serif2);
        font-size: 16px;
        font-weight: 700;
        color: var(--do);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }
      .pac-detail {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
        font-family: var(--mono);
      }
      .pac-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      /* ── MODAL GRANDE ── */
      .modal-card.modal-lg {
        max-width: 750px;
        max-height: 90vh;
      }
      .modal-card.modal-xl {
        max-width: 900px;
        max-height: 92vh;
      }

      /* ── TABLA PACIENTES ── */
      .tbl {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
      }
      .tbl thead th {
        background: var(--vd);
        color: rgba(255, 255, 255, 0.75);
        font-family: var(--serif2);
        font-weight: 600;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 10px 12px;
        text-align: left;
      }
      .tbl thead th:first-child {
        border-radius: 10px 0 0 10px;
      }
      .tbl thead th:last-child {
        border-radius: 0 10px 10px 0;
      }
      .tbl tbody tr {
        border-bottom: 1px solid #ddd5c4;
        transition: background 0.15s;
      }
      .tbl tbody tr:hover {
        background: #f0ebe0;
      }
      .tbl tbody td {
        padding: 10px 12px;
        font-size: 13px;
        vertical-align: middle;
      }
      .tbl-wrap {
        overflow-x: auto;
      }

      /* ── FORM GRID DENTRO DE MODAL ── */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 16px;
      }
      .form-grid .full {
        grid-column: 1 / -1;
      }
      .form-field {
        margin-bottom: 4px;
      }

      /* ── TOGGLE SWITCH ── */
      .toggle-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        user-select: none;
      }
      .toggle-track {
        width: 40px;
        height: 22px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.15);
        position: relative;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      .toggle-track.on {
        background: var(--do);
      }
      .toggle-thumb {
        width: 18px;
        height: 18px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 2px;
        left: 2px;
        transition: left 0.2s;
      }
      .toggle-track.on .toggle-thumb {
        left: 20px;
      }

      /* ── PERFIL PACIENTE ── */
      .perfil-header {
        background: var(--vd);
        border-radius: var(--r);
        padding: 24px;
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
      }
      .perfil-header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--do), #e8b84b);
      }
      .perfil-avatar-lg {
        width: 64px;
        height: 64px;
        background: var(--do);
        color: var(--vd);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--serif);
        font-size: 26px;
        font-weight: 800;
        box-shadow: 0 0 16px rgba(200, 146, 42, 0.4);
      }

      /* ── ALERTA INLINE ── */
      .alert-warn {
        background: var(--dc);
        color: var(--wc);
        border-radius: var(--rsm);
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .alert-info {
        background: var(--vs);
        color: var(--vd);
        border-radius: var(--rsm);
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* ── ACTION LINK ── */
      .act-link {
        color: var(--do);
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
        transition: color 0.15s;
      }
      .act-link:hover {
        color: #b8821f;
        text-decoration: underline;
      }

      /* ── INPUT BASE (fuera de modal) ── */
      .input-base {
        border-radius: 50px;
        padding: 9px 18px;
        border: 2px solid var(--vm);
        background: #f0ebe0;
        font-family: var(--sans);
        font-size: 13px;
        color: var(--tx);
        outline: none;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .input-base:focus {
        border-color: var(--do);
        background: #fff8ec;
      }

      /* ── CHECKBOX CUSTOM ── */
      .chk-wrap {
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        user-select: none;
      }
      .chk-box {
        width: 20px;
        height: 20px;
        border: 2.5px solid var(--do);
        border-radius: 5px;
        background: #faf7f2;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: transparent;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .chk-box.chk-on {
        background: var(--vd);
        border-color: var(--vd);
        color: var(--do);
      }

      /* ── PRINT ── */
      @media print {
        body * {
          visibility: hidden;
        }
        #planilla-at-print,
        #planilla-at-print * {
          visibility: visible;
        }
        #planilla-at-print {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
        }
        .no-print {
          display: none !important;
        }
      }

      /* ── SLOT DÍA/HORARIO ── */
      .slot-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .slot-row select,
      .slot-row input {
        background: rgba(255, 255, 255, 0.06);
        border: 2px solid rgba(200, 146, 42, 0.3);
        color: rgba(255, 255, 255, 0.9);
        border-radius: 50px;
        padding: 6px 12px;
        font-family: var(--sans);
        font-size: 13px;
        outline: none;
      }
      .slot-row select {
        min-width: 120px;
      }
      .slot-row select option {
        background: var(--vd);
        color: white;
      }

      /* ── SELECT IN MODAL ── */
      .modal-select {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 2px solid rgba(200, 146, 42, 0.3);
        color: rgba(255, 255, 255, 0.9);
        border-radius: 50px;
        padding: 9px 18px;
        font-family: var(--sans);
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
        margin-bottom: 14px;
        -webkit-appearance: none;
        appearance: none;
      }
      .modal-select:focus {
        border-color: var(--do);
      }
      .modal-select option {
        background: var(--vd);
        color: white;
      }

      /* ── TEXTAREA IN MODAL ── */
      .modal-textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 2px solid rgba(200, 146, 42, 0.3);
        color: rgba(255, 255, 255, 0.9);
        border-radius: var(--rsm);
        padding: 12px 18px;
        font-family: var(--sans);
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
        margin-bottom: 14px;
        min-height: 80px;
        resize: vertical;
      }
      .modal-textarea:focus {
        border-color: var(--do);
      }

      /* ── PERFIL DATA SECTION ── */
      .data-section {
        background: #faf7f2;
        border: 2px solid #b8b0a0;
        border-left: 5px solid var(--vm);
        border-radius: var(--r);
        padding: 18px;
        margin-bottom: 14px;
      }
      .data-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 20px;
        margin-top: 8px;
      }
      .data-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--tx3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .data-val {
        font-size: 13.5px;
        font-weight: 500;
        color: var(--tx);
        text-transform: capitalize;
      }

      /* ══════════════════════════════════════════ */
      /* FASE 4 — MÓDULO AGENDA                    */
      /* ══════════════════════════════════════════ */

      /* ── GRILLA SEMANAL ── */
      .ag-wrap {
        overflow-x: auto;
      }
      .ag-grid {
        min-width: 680px;
        display: grid;
        grid-template-columns: 56px repeat(5, 1fr); /* default L-V; overridden inline */
      }
      .ag-corner {
        background: var(--vd);
        border-radius: var(--r) 0 0 0;
      }
      .ag-day-hd {
        background: var(--vd);
        padding: 10px 6px;
        text-align: center;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }
      .ag-day-hd:last-child {
        border-right: none;
        border-radius: 0 var(--r) 0 0;
      }
      .ag-day-hd.today {
        background: rgba(200, 146, 42, 0.22);
      }
      .ag-day-hd.feriado {
        background: rgba(200, 146, 42, 0.12);
      }
      .ag-day-hd.feriado .ag-day-num {
        color: var(--do);
      }
      .feriado-badge {
        font-family: var(--mono);
        font-size: 7px;
        color: var(--do);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        opacity: 0.85;
        line-height: 1;
      }
      .ag-col.feriado-col {
        background: rgba(200, 146, 42, 0.04);
      }
      .cal-cell.feriado {
        background: rgba(200, 146, 42, 0.09);
        border-color: rgba(200, 146, 42, 0.35);
      }
      .cal-cell.feriado .cal-num {
        color: var(--do);
      }
      .ag-day-num {
        font-family: var(--serif);
        font-size: 18px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.1;
      }
      /* circulo que engloba abbr + numero para hoy */
      .ag-today-badge {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        background: var(--vd);
        border-radius: 20px;
        padding: 4px 10px;
        box-shadow: 0 0 0 2px var(--do), 0 2px 8px rgba(200,146,42,.3);
        min-width: 44px;
        margin: 0 auto 2px;
      }
      .ag-today-badge .ag-day-abbr {
        color: rgba(255,255,255,.75);
        font-size: 8px;
      }
      .ag-today-badge .ag-day-num {
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.1;
      }
      /* keep old rule for non-badge fallback */
      .ag-day-hd.today .ag-day-num:not(.ag-today-badge .ag-day-num) {
        color: var(--do);
      }
      .ag-day-abbr {
        font-family: var(--mono);
        font-size: 9px;
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .ag-day-mes {
        font-family: var(--mono);
        font-size: 9px;
        color: rgba(255, 255, 255, 0.3);
      }
      .ag-body {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 56px repeat(5, 1fr); /* default L-V; overridden inline */
        border: 2px solid #b8b0a0;
        border-top: none;
        border-radius: 0 0 var(--r) var(--r);
        background: #faf7f2;
        overflow: hidden;
      }
      .ag-time-col {
        border-right: 1px solid #ddd5c4;
      }
      .ag-time-cell {
        height: 30px;
        display: flex;
        align-items: flex-start;
        padding-top: 3px;
        justify-content: center;
        font-family: var(--mono);
        font-size: 9px;
        color: var(--tx3);
        border-bottom: 1px solid #e8e0d4;
      }
      .ag-time-cell.hora {
        border-bottom-color: #ddd5c4;
      }
      .ag-col {
        position: relative;
        border-right: 1px solid #ddd5c4;
        height: 720px;
        cursor: pointer;
      }
      .ag-col:last-child {
        border-right: none;
      }
      .ag-col.today {
        background: rgba(200, 146, 42, 0.04);
      }
      .ag-line {
        position: absolute;
        left: 0;
        right: 0;
        pointer-events: none;
      }
      .ag-session {
        position: absolute;
        left: 3px;
        right: 3px;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        z-index: 2;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
        transition:
          filter 0.15s,
          transform 0.1s;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 3px 7px;
      }
      .ag-session:hover {
        filter: brightness(1.18);
        transform: scaleX(0.96);
      }
      .ag-ses-nombre {
        font-family: var(--sans);
        font-size: 13.5px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.2;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
        letter-spacing: 0.01em;
      }
      .ag-ses-hora {
        font-family: var(--mono);
        font-size: 11.5px;
        opacity: 0.9;
        line-height: 1.2;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      /* Badge de alerta de pago pendiente en bloque de sesión */
      .ag-pago-alerta {
        position: absolute;
        top: 1px;
        right: 2px;
        width: 17px;
        height: 17px;
        border-radius: 50%;
        background: #DC2626;
        color: #fff;
        font-size: 11px;
        font-weight: 900;
        font-family: var(--mono);
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        box-shadow: 0 0 0 2px rgba(220,38,38,0.4), 0 2px 6px rgba(0,0,0,.4);
        z-index: 2;
        letter-spacing: -.5px;
      }
      /* Panel de novedades de la semana */
      .novedades-panel {
        background: var(--vd);
        border: 2px solid var(--vm);
        border-left: 5px solid var(--do);
        border-radius: var(--r);

  <body>
    <div id="root"></div>

    <!-- ═══════════════════════════════════════ -->
    <!-- CAPA DE DATOS (localStorage)           -->
    <!-- ═══════════════════════════════════════ -->
    <script>
      function getData(key) {
        try {
          return JSON.parse(localStorage.getItem(key) || "[]");
        } catch (e) {
          console.error(e);
          return [];
        }
      }
      function setData(key, data) {
        try {
          localStorage.setItem(key, JSON.stringify(data));
        } catch (e) {
          console.error(e);
          showToast(
            "❌ Error: No se pudo guardar. Verifique el espacio disponible.",
          );
        }
      }
      function genId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2);
      }

      /* ═══════════════════════════════════════ */
      /* FASE 2 — DATOS DE EJEMPLO (SEED)       */
      /* ═══════════════════════════════════════ */
      // Lista canónica de obras sociales del sistema
      const OS_ESTANDAR = [
        {
          id: "os1",
          nombre: "Mutual Médica",
          valorOrden: 28000,
          valorCoseguro: 14000,
        },
        { id: "os2", nombre: "OSSEG", valorOrden: 24000, valorCoseguro: 12000 },
        { id: "os3", nombre: "ASPURC", valorOrden: 0, valorCoseguro: 0 },
        { id: "os4", nombre: "OSSACRA", valorOrden: 0, valorCoseguro: 0 },
        {
          id: "os5",
          nombre: "Prevención Salud",
          valorOrden: 0,
          valorCoseguro: 0,
        },
        { id: "os6", nombre: "Sancor Salud", valorOrden: 0, valorCoseguro: 0 },
        { id: "os7", nombre: "OSPACA", valorOrden: 0, valorCoseguro: 0 },
        { id: "os8", nombre: "OSDE", valorOrden: 0, valorCoseguro: 0 },
        { id: "os9", nombre: "Swiss Medical", valorOrden: 0, valorCoseguro: 0 },
        { id: "os10", nombre: "IOMA", valorOrden: 0, valorCoseguro: 0 },
        { id: "os11", nombre: "PAMI", valorOrden: 0, valorCoseguro: 0 },
      ];

      function seedData() {
        // Configuraciones base (solo si no existen)
        if (!localStorage.getItem("hgsp_config")) {
          setData("hgsp_config", {
            prestador: "Lic. Stagni Hernán Gabriel",
            mp: "11919",
            cuit: "20.24521983.1",
            domicilioTrabajo: "Vilelas 2223 - Río Cuarto",
            especialidad: "Psicología",
            valorSesionParticular: 28000,
            obrasSociales: OS_ESTANDAR,
          });
        }

        // Migración: agregar OS estándar faltantes sin pisar aranceles ya configurados
        const cfgActual = getData("hgsp_config");
        if (cfgActual) {
          const nombresExistentes = (cfgActual.obrasSociales || []).map(
            (o) => o.nombre,
          );
          const faltantes = OS_ESTANDAR.filter(
            (o) => !nombresExistentes.includes(o.nombre),
          );
          if (faltantes.length > 0) {
            cfgActual.obrasSociales = [
              ...(cfgActual.obrasSociales || []),
              ...faltantes,
            ];
            setData("hgsp_config", cfgActual);
          }
        }

        // Aseguramos que haya arrays vacíos al inicio si no hay datos
        if (!localStorage.getItem("hgsp_pacientes")) {
          setData("hgsp_pacientes", []);
          setData("hgsp_sesiones", []);
          setData("hgsp_cobros", []);
          setData("hgsp_gastos", []);
          setData("hgsp_eventos", []);
          setData("hgsp_at_registros", []);
          setData("hgsp_feriados_extra", []);
        }
      }

      /* Ejecutar seed al cargar */
      seedData();
    </script>

    <!-- ═══════════════════════════════════════ -->
    <!-- APLICACIÓN REACT                       -->
    <!-- ═══════════════════════════════════════ -->
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;

      /* ═══════════════════════════════════════ */
      /* NAVEGACIÓN — DEFINICIÓN DE SECCIONES   */
      /* ═══════════════════════════════════════ */
      const NAV_SECTIONS = [
        { id: "agenda", label: "Agenda", emoji: "📅", group: "PRINCIPAL" },
        {
          id: "pacientes",
          label: "Pacientes",
          emoji: "🌿",
          group: "PRINCIPAL",
        },
        {
          id: "facturacion",
          label: "Facturación",
          emoji: "💰",
          group: "PRINCIPAL",
        },
        {
          id: "planillas_at",
          label: "Planillas AT",
          emoji: "📋",
          group: "PRINCIPAL",
        },
        { id: "gastos", label: "Gastos", emoji: "📊", group: "PRINCIPAL" },
        { id: "vida_hogar", label: "Vida y Hogar", emoji: "🌳", group: "VIDA" },
        { id: "eventos", label: "Eventos", emoji: "🔔", group: "SISTEMA" },
        { id: "config", label: "Configuración", emoji: "⚙️", group: "SISTEMA" },
      ];

      /* ═══════════════════════════════════════ */
      /* COMPONENTE: Modal                      */
      /* ═══════════════════════════════════════ */
      function Modal({ isOpen, onClose, title, children, onSave, onDelete }) {
        const [confirmClose, setConfirmClose] = React.useState(false);
        if (!isOpen) return null;

        function tryClose() { if (onSave) setConfirmClose(true); else onClose(); }
        function doClose() { setConfirmClose(false); onClose(); }

        function handleOverlayClick(e) {
          if (e.target === e.currentTarget) tryClose();
        }

        return ReactDOM.createPortal(
          <div className="modal-overlay" onClick={handleOverlayClick}>
            <div className="modal-card">
              <div className="modal-bar"></div>
              {confirmClose ? (
                <div className="modal-confirm-cancel">
                  <span className="modal-confirm-cancel-text">¿Salir sin guardar los cambios?</span>
                  <div className="modal-confirm-cancel-btns">
                    <button className="btn btn-danger" style={{ padding: "5px 14px", fontSize: "13px" }} onClick={doClose}>Sí, salir</button>
                    <button className="btn btn-sec" style={{ padding: "5px 14px", fontSize: "13px" }} onClick={() => setConfirmClose(false)}>No, quedarme</button>
                  </div>
                </div>
              ) : (
                <div className="modal-header">
                  <span className="modal-title">{title}</span>
                  <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                    {onDelete && (
                      <button className="modal-icon-btn danger" onClick={onDelete} title="Eliminar">🗑️</button>
                    )}
                    {onSave && (
                      <button className="modal-icon-btn" onClick={onSave} title="Guardar">💾</button>
                    )}
                    <button className="modal-icon-btn" onClick={tryClose} title="Cerrar">✕</button>
                  </div>
                </div>
              )}
              <div className="modal-body">{children}</div>
            </div>
          </div>,
          document.body,
        );
      }

      /* ═══════════════════════════════════════ */
      /* COMPONENTE: Toast                      */
      /* ═══════════════════════════════════════ */
      let toastIdCounter = 0;
      let globalSetToasts = null;

      function showToast(message) {
        if (globalSetToasts) {
          const id = ++toastIdCounter;
          globalSetToasts((prev) => [...prev, { id, message }]);
          setTimeout(() => {
            globalSetToasts((prev) => prev.filter((t) => t.id !== id));
          }, 3200);
        }
      }

      function ToastContainer() {
        const [toasts, setToasts] = useState([]);
        globalSetToasts = setToasts;

        return (
          <div className="toast-container">
            {toasts.map((t) => (
              <div className="toast" key={t.id}>
                <div className="toast-text">{t.message}</div>
                <div className="toast-progress">
                  <div className="toast-progress-bar"></div>
                </div>
              </div>
            ))}
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* COMPONENTE: Badge                      */
      /* ═══════════════════════════════════════ */
      function Badge({ type = "ok", children }) {
        const cls =
          type === "warn"
            ? "badge-warn"
            : type === "error"
              ? "badge-error"
              : "badge-ok";
        return <span className={`badge ${cls}`}>{children}</span>;
      }

      /* ═══════════════════════════════════════ */
      /* COMPONENTE: Tabs                       */
      /* ═══════════════════════════════════════ */
      function Tabs({ tabs, active, onChange }) {
        return (
          <div className="tabs-container">
            {tabs.map((t) => (
              <div
                key={t.id}
                className={`tab-item ${active === t.id ? "active" : ""}`}
                onClick={() => onChange(t.id)}
              >
                {t.label}
              </div>
            ))}
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* COMPONENTE: StatCard                   */
      /* ═══════════════════════════════════════ */
      function StatCard({ label, value }) {
        const str = String(value);
        const isMoney = str.startsWith("$");
        const renderValue = () => {
          if (isMoney) {
            const num = str.slice(1); // quita el $
            return (
              <>
                <span className="sv-currency">$</span>
                <span className="sv-num">{num}</span>
              </>
            );
          }
          return <span className="sv-num">{value}</span>;
        };
        return (
          <div className="stat-card">
            <div className="stat-label">{label}</div>
            <div className="stat-value">{renderValue()}</div>
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* COMPONENTE: SearchInput                */
      /* ═══════════════════════════════════════ */
      function SearchInput({ placeholder = "Buscar...", value, onChange }) {
        return (
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input
              className="input"
              type="text"
              placeholder={placeholder}
              value={value || ""}
              onChange={(e) => onChange && onChange(e.target.value)}
            />
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* COMPONENTE: Topbar                     */
      /* ═══════════════════════════════════════ */
      function Topbar({ activeSection, onNavigate, onNewTurno, onNewReserva }) {
        const current = NAV_SECTIONS.find((s) => s.id === activeSection);

        return (
          <div className="topbar">
            {/* ROW 1: BRAND */}
            <div className="topbar-row-1">
              <div className="topbar-brand">
                <div className="topbar-icon">🌱</div>
                <div>
                  <div className="topbar-title">Plataforma Integral</div>
                  <div className="topbar-subtitle">
                    Hernán Gabriel Stagni · MP 11919 · v1.0
                  </div>
                </div>
              </div>
              {activeSection !== "agenda" && (
                <button className="topbar-cta" onClick={() => onNavigate("agenda")}>
                  + Nuevo turno
                </button>
              )}
            </div>

            {/* ROW 2: SECTION TITLE & ACTIONS */}
            <div className="topbar-row-2">
              <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                <span style={{ fontSize: "28px" }}>{current?.id === "agenda" ? "🗓️" : current?.emoji}</span>
                <span style={{ 
                  fontFamily: "var(--sans)", 
                  fontSize: "26px", 
                  fontWeight: "700", 
                  color: "#fff", 
                  letterSpacing: ".01em",
                  textShadow: "0 2px 4px rgba(0,0,0,0.3)"
                }}>
                  {current?.label}
                </span>
              </div>

              {activeSection === "agenda" && (
                <div className="topbar-actions">
                  <button className="topbar-cta" onClick={onNewReserva}>
                    <span style={{ fontSize: "16px" }}>🔔</span> Reservar horario
                  </button>
                  <button className="topbar-cta primary" onClick={onNewTurno}>
                    <span style={{ fontSize: "16px" }}>+</span> Nuevo turno
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* COMPONENTE: Sidebar                    */
      /* ═══════════════════════════════════════ */
      function Sidebar({ activeSection, onNavigate, badgeCounts }) {
        const groups = ["PRINCIPAL", "VIDA", "SISTEMA"];

        return (
          <div className="sidebar">
            {groups.map((group) => (
              <React.Fragment key={group}>
                <div className="sidebar-section-label">{group}</div>
                {NAV_SECTIONS.filter((s) => s.group === group).map(
                  (section) => (
                    <div
                      key={section.id}
                      className={`sidebar-item ${activeSection === section.id ? "active" : ""}`}
                      onClick={() => onNavigate(section.id)}
                    >
                      <span className="sidebar-item-icon">{section.emoji}</span>
                      <span>{section.label}</span>
                      {badgeCounts[section.id] > 0 && (
                        <span className="sidebar-badge">
                          {badgeCounts[section.id]}
                        </span>
                      )}
                    </div>
                  ),
                )}
              </React.Fragment>
            ))}

            {/* PIE — ESTADO DEL SISTEMA */}
            <div className="sidebar-footer">
              <div className="sidebar-footer-label">Estado del sistema</div>
              <div className="sidebar-status-row">
                <span className="dot on"></span>
                <span>localStorage</span>
              </div>
              <div className="sidebar-status-row">
                <span className="dot on"></span>
                <span>React 18</span>
              </div>
              <div className="sidebar-status-row">
                <span className="dot on"></span>
                <span>Sin errores</span>
              </div>
            </div>
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* SECCIONES PROVISIONALES                */
      /* ═══════════════════════════════════════ */

      /* ═══════════════════════════════════════ */
      /* FASE 4 — AGENDA: CONSTANTES            */
      /* ═══════════════════════════════════════ */
      const AG_START = 8; // hora inicio grilla
      const AG_END = 20; // hora fin grilla
      const AG_PX_H = 60; // px por hora
      const AG_TOTAL = (AG_END - AG_START) * AG_PX_H; // 720px

      const TIPO_COLORS = {
        individual: { bg: "#1E3A8A", text: "#FFFFFF", border: "#60A5FA" },
        AT: { bg: "#14532D", text: "#FFFFFF", border: "#4ADE80" },
        pareja: { bg: "#7C2D12", text: "#FFFFFF", border: "#FB923C" },
        grupo: { bg: "#4C1D95", text: "#FFFFFF", border: "#A78BFA" },
        reserva_personal: { bg: "#374151", text: "#F3F4F6", border: "#9CA3AF" },
      };

      /* Paleta de colores personalizables para etiquetas de turno */
      const PALETA_COLORES = [
        { id: "azul", bg: "#1E3A8A", text: "#DBEAFE", border: "#60A5FA" },
        { id: "teal", bg: "#134E4A", text: "#CCFBF1", border: "#2DD4BF" },
        { id: "verde", bg: "#14532D", text: "#DCFCE7", border: "#4ADE80" },
        { id: "violeta", bg: "#4C1D95", text: "#EDE9FE", border: "#A78BFA" },
        { id: "rosa", bg: "#881337", text: "#FFE4E6", border: "#FB7185" },
        { id: "naranja", bg: "#7C2D12", text: "#FFEDD5", border: "#FB923C" },
        { id: "ambar", bg: "#78350F", text: "#FEF3C7", border: "#FCD34D" },
        { id: "pizarra", bg: "#1E293B", text: "#E2E8F0", border: "#94A3B8" },
        /* +2 amarillos/naranjas */
        { id: "dorado", bg: "#92400E", text: "#FEF9C3", border: "#FBBF24" },
        { id: "mostaza", bg: "#713F12", text: "#FFF9C4", border: "#EAB308" },
        /* +2 grises */
        { id: "gris", bg: "#374151", text: "#F3F4F6", border: "#9CA3AF" },
        { id: "carbon", bg: "#1C1917", text: "#F5F5F4", border: "#78716C" },
      ];

      /* Categorías de reservas personales */
      const RESERVA_CATS = [
        { v: "dentista", l: "Dentista", icon: "🦷" },
        { v: "medico", l: "Médico", icon: "🏥" },
        { v: "gimnasio", l: "Gimnasio", icon: "🏋️" },
        { v: "terapia", l: "Mi terapia", icon: "🧘" },
        { v: "capacitacion", l: "Capacitación", icon: "📚" },
        { v: "tramite", l: "Trámite", icon: "📋" },
        { v: "personal", l: "Personal", icon: "📅" },
        { v: "otro", l: "Otro", icon: "✏️" },
      ];
      const ESTADO_ICONS = {
        asistio: "✅",
        cancelo: "❌",
        pendiente: "⏳",
        reprogramo: "🔄",
      };

      /* Helper: detecta si un turno tiene pendientes de cobro/orden */
      /* hoy: string 'YYYY-MM-DD' — necesario para detectar pendientes con fecha pasada */
      function tienePendientePago(s, hoy) {
        if (s.tipo === "AT") return false;
        if (s.tipo === "reserva_personal") return false;
        // Cobro por cancelación / reprogramación pendiente
        if (
          (s.estado === "cancelo" || s.estado === "reprogramo") &&
          s.cobroCancel
        ) {
          // esquema nuevo (campos independientes)
          if (s.cancelEfectivo && !s.cancelAbonado) return true;
          if (s.cancelOrden && !s.cancelOrdenSaldada) return true;
          // compat legado (campo cancelMetodo)
          if (!s.cancelEfectivo && !s.cancelOrden) {
            if (s.cancelMetodo === "orden_os" && !s.cancelOrdenSaldada)
              return true;
            if (s.cancelMetodo === "efectivo_transfer" && !s.cancelAbonado)
              return true;
          }
        }
        // Sesión asistida — esquema nuevo
        if (s.estado === "asistio") {
          if (s.modalidadPago === "obra_social")
            return !s.coseguroAbonado || !s.ordenEmitida;
          if (s.modalidadPago === "particular")
            return !s.particularAbonado && (Number(s.montoParticular) || 0) > 0;
          // Esquema legado (campo cobrado): sin modalidadPago asignado y sin confirmar cobro
          if (s.modalidadPago == null && s.cobrado === false) return true;
        }
        // Sesión pendiente cuya fecha ya llegó (hoy inclusive) → necesita revisión
        if (s.estado === "pendiente" && hoy && s.fecha <= hoy) {
          if (s.modalidadPago === "obra_social")
            return !s.coseguroAbonado || !s.ordenEmitida;
          if (s.modalidadPago === "particular")
            return !s.particularAbonado && (Number(s.montoParticular) || 0) > 0;
          // Sin esquema de pago definido: cualquier pendiente de hoy/pasado = revisar
          return true;
        }
        return false;
      }

      function tieneNotasAlerta(s) {
        const na = s.notasAlertas || {};
        return !!(na.clinica || na.admin || na.asistencia);
      }

      /* Turno que ya pasó en hora pero sigue en estado "pendiente" (sin calificar) */
      function esTurnoPasadoSinCalificar(s) {
        if (!s || s.tipo === "reserva_personal" || s.tipo === "AT") return false;
        if (s.estado !== "pendiente") return false;
        if (!s.fecha || !s.horaFin) return false;
        return new Date(`${s.fecha}T${s.horaFin}`) < new Date();
      }

      /* Genera items descriptivos del pendiente. Cada item: { texto, campo }
       campo = clave de la sesión que hay que setear a true para resolverlo */
      function descPendiente(s, pacNombre, hoy) {
        const items = [];
        // Cancelación / reprogramación con cobro pendiente
        if (
          (s.estado === "cancelo" || s.estado === "reprogramo") &&
          s.cobroCancel
        ) {
          const te = s.estado === "cancelo" ? "cancelación" : "reprogramación";
          // Esquema nuevo
          if (s.cancelEfectivo && !s.cancelAbonado) {
            const m = Number(s.montoCancel) || 0;
            items.push({
              texto: `Cobro efectivo por ${te}${m ? ` ($${m.toLocaleString("es-AR")})` : ""} · no abonado`,
              campo: "cancelAbonado",
            });
          }
          if (s.cancelOrden && !s.cancelOrdenSaldada) {
            items.push({
              texto: `Orden OS por ${te} · token pendiente`,
              campo: "cancelOrdenSaldada",
            });
          }
          // Compat legado
          if (!s.cancelEfectivo && !s.cancelOrden) {
            if (s.cancelMetodo === "orden_os" && !s.cancelOrdenSaldada)
              items.push({
                texto: `Orden OS por ${te} · pendiente de token`,
                campo: "cancelOrdenSaldada",
              });
            else if (
              s.cancelMetodo === "efectivo_transfer" &&
              !s.cancelAbonado
            ) {
              const m = Number(s.montoCancel) || 0;
              items.push({
                texto: `Cobro por ${te} pendiente${m ? ` ($${m.toLocaleString("es-AR")})` : ""}`,
                campo: "cancelAbonado",
              });
            }
          }
        }
        // Helper para items de cobro/orden
        function addItemsCobro() {
          if (s.modalidadPago === "obra_social") {
            if (!s.coseguroAbonado) {
              const m = Number(s.coseguroMonto) || 0;
              items.push({
                texto: `Coseguro OS pendiente${m ? ` ($${m.toLocaleString("es-AR")})` : ""}`,
                campo: "coseguroAbonado",
              });
            }
            if (!s.ordenEmitida)
              items.push({
                texto: "Orden de atención no emitida",
                campo: "ordenEmitida",
              });
            else if (!s.ordenFirmada)
              items.push({
                texto: "Orden emitida · pendiente de firma",
                campo: "ordenFirmada",
              });
          } else if (s.modalidadPago === "particular") {
            const m = Number(s.montoParticular) || 0;
            if (!s.particularAbonado && m > 0)
              items.push({
                texto: `Honorarios pendientes ($${m.toLocaleString("es-AR")})`,
                campo: "particularAbonado",
              });
            else if (!s.particularAbonado)
              items.push({
                texto: "Cobro particular sin confirmar",
                campo: "particularAbonado",
              });
          } else {
            // Esquema legado: campo cobrado
            if (s.cobrado === false) {
              const m = Number(s.montoCobrado) || 0;
              items.push({
                texto: `Cobro sin confirmar${m ? ` ($${m.toLocaleString("es-AR")})` : ""}`,
                campo: "cobrado",
              });
            }
          }
        }
        if (s.estado === "asistio") addItemsCobro();
        // Sesión pendiente cuya fecha ya llegó (hoy inclusive)
        if (s.estado === "pendiente" && hoy && s.fecha <= hoy) {
          if (s.modalidadPago || s.cobrado === false) {
            addItemsCobro();
          } else {
            // Sin datos de cobro: la sesión quedó sin confirmar
            items.push({
              texto: "Sesión sin confirmar — registrar asistencia y cobro",
              campo: null,
            });
          }
        }
        return {
          sesionId: s.id,
          sesion: s,
          pacNombre,
          fecha: s.fecha,
          hora: s.horaInicio,
          estado: s.estado,
          items,
        };
      }
      const DIAS_HD = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];

      /* ═══════════════════════════════════════ */

      const FERIADOS_NAC_RAW = {
