      /* ═══════════════════════════════════════ */
      /* SECCIÓN AGENDA (PRINCIPAL)             */
      /* ═══════════════════════════════════════ */
      function SeccionAgenda({ 
        modalTurno, setModalTurno, 
        modalReserva, setModalReserva 
      }) {
        const [vista, setVista] = useState("semanal");
        const [baseDate, setBaseDate] = useState(new Date());
        const [showWeekend, setShowWeekend] = useState(false);
        const [sesiones, setSesiones] = useState([]);
        const [pacientes, setPacientes] = useState([]);
        const [modalEliminar, setModalEliminar] = useState(null);
        const [modalConfirmActivar, setModalConfirmActivar] = useState(false);
        const [extraFeriados, setExtraFeriados] = useState([]);
        const [showFeriadoPanel, setShowFeriadoPanel] = useState(false);
        const [newFeriado, setNewFeriado] = useState({
          fecha: "",
          nombre: "",
          trabaja: false,
        });
        const [showOrdenes, setShowOrdenes] = useState(false);
        const [showNovedades, setShowNovedades] = useState(false);
        const [showStats, setShowStats] = useState(false);
        const [showObjPanel, setShowObjPanel] = useState(false);
        const [showCoord, setShowCoord] = useState(false);
        const [coordPendientes, setCoordPendientes] = useState([]);
        const [objetivosSemana, setObjetivosSemana] = useState([]);
        const [editandoObj, setEditandoObj] = useState(false);
        const [objDraft, setObjDraft] = useState({ obj1: "", obj2: "", obj1EvaluarEn: "turno", obj2EvaluarEn: "turno" });
        const [recordatoriosSemana, setRecordatoriosSemana] = useState([]);
        const [modalNuevoRec, setModalNuevoRec] = useState(false);
        const [recDraft, setRecDraft] = useState({ titulo: "", descripcion: "" });
        const [config, setConfig] = useState(
          () => getData("hgsp_config") || {},
        );

        function loadData() {
          setSesiones(getData("hgsp_sesiones"));
          setPacientes(getData("hgsp_pacientes").filter((p) => p.activo));
          setExtraFeriados(getData("hgsp_feriados_extra"));
          setCoordPendientes(getData("hgsp_coord_pendientes") || []);
          setObjetivosSemana(getData("hgsp_objetivos_semana") || []);
          setRecordatoriosSemana(getData("hgsp_recordatorios_semana") || []);
          setConfig(getData("hgsp_config") || {});
        }
        useEffect(() => {
          loadData();
        }, []);

        /* ── feriados ── */
        const feriadoMap = getFeriadoSet(extraFeriados);

        function addFeriado() {
          if (!newFeriado.fecha || !newFeriado.nombre.trim()) {
            showToast("⚠️ Ingresá fecha y nombre");
            return;
          }
          const all = getData("hgsp_feriados_extra");
          all.push({
            id: genId(),
            fecha: newFeriado.fecha,
            nombre: newFeriado.nombre.trim(),
            trabaja: newFeriado.trabaja,
            tipo: "local",
          });
          setData("hgsp_feriados_extra", all);
          setNewFeriado({ fecha: "", nombre: "", trabaja: false });
          loadData();
          showToast("📌 Feriado local agregado");
        }
        function delFeriado(id) {
          setData(
            "hgsp_feriados_extra",
            getData("hgsp_feriados_extra").filter((f) => f.id !== id),
          );
          loadData();
        }

        /* ── navegación semanal ── */
        const weekDates = getWeekDates(baseDate);
        const hoyStr = dateStr(new Date());

        function prevWeek() {
          const d = new Date(baseDate);
          d.setDate(d.getDate() - 7);
          setBaseDate(d);
        }
        function nextWeek() {
          const d = new Date(baseDate);
          d.setDate(d.getDate() + 7);
          setBaseDate(d);
        }
        function goHoy() {
          setBaseDate(new Date());
        }

        /* ── stats semana ── */
        const weekStrs = weekDates.map((d) => dateStr(d));
        const weekSes = sesiones.filter((s) => weekStrs.includes(s.fecha));

        /* Cobrado real (nuevo sistema de pagos) */
        const cobradoSem = weekSes
          .filter((s) => s.tipo !== "AT" && s.tipo !== "reserva_personal")
          .reduce((sum, s) => {
            let t = 0;
            if (s.modalidadPago === "particular" && s.particularAbonado)
              t += Number(s.montoParticular) || 0;
            if (s.modalidadPago === "obra_social" && s.coseguroAbonado)
              t += Number(s.coseguroMonto) || 0;
            // Cobro cancelación — esquema nuevo
            if (s.cobroCancel && s.cancelEfectivo && s.cancelAbonado)
              t += Number(s.montoCancel) || 0;
            // Cobro cancelación — compat legado
            if (
              s.cobroCancel &&
              !s.cancelEfectivo &&
              !s.cancelOrden &&
              s.cancelAbonado &&
              s.cancelMetodo !== "orden_os"
            )
              t += Number(s.montoCancel) || 0;
            return sum + t;
          }, 0);

        /* Pendiente a cobrar en la semana */
        const pendienteSem = weekSes
          .filter((s) => s.tipo !== "AT" && s.tipo !== "reserva_personal")
          .reduce((sum, s) => {
            let t = 0;
            if (s.estado === "asistio") {
              if (s.modalidadPago === "particular" && !s.particularAbonado)
                t += Number(s.montoParticular) || 0;
              if (s.modalidadPago === "obra_social" && !s.coseguroAbonado)
                t += Number(s.coseguroMonto) || 0;
            }
            // Cobro cancelación — esquema nuevo
            if (s.cobroCancel && s.cancelEfectivo && !s.cancelAbonado)
              t += Number(s.montoCancel) || 0;
            // Cobro cancelación — compat legado
            if (
              s.cobroCancel &&
              !s.cancelEfectivo &&
              !s.cancelOrden &&
              !s.cancelAbonado &&
              s.cancelMetodo !== "orden_os"
            )
              t += Number(s.montoCancel) || 0;
            return sum + t;
          }, 0);

        /* Órdenes emitidas en la semana */
        const ordenesSem = weekSes.filter(
          (s) => s.modalidadPago === "obra_social" && s.ordenEmitida,
        );

        /* helper: valor de orden para una sesión */
        function valorOrdenDe(s) {
          const pac = pacientes.find((p) => p.id === s.pacienteId);
          const osConf = pac?.obraSocial
            ? (config.obrasSociales || []).find(
                (o) => o.nombre === pac.obraSocial,
              )
            : null;
          return Number(pac?.valorOrden) || Number(osConf?.valorOrden) || 0;
        }

        /* helper: valor efectivo/particular para una sesión */
        function valorParticularDe(s) {
          const pac = pacientes.find((p) => p.id === s.pacienteId);
          return (
            Number(s.montoParticular) ||
            Number(pac?.valorParticular) ||
            Number(config.valorSesionParticular) ||
            0
          );
        }

        /* Valor total aprox de órdenes emitidas */
        const valorOrdenesSem = ordenesSem.reduce(
          (sum, s) => sum + valorOrdenDe(s),
          0,
        );

        /* Totales diarios por columna de agenda */
        const visibleDatesForGrid = weekDates.slice(0, showWeekend ? 7 : 5);
        const dailyTotals = visibleDatesForGrid.map((d) => {
          const ds = dateStr(d);
          const daySes = sesiones.filter(
            (s) =>
              s.fecha === ds &&
              s.tipo !== "reserva_personal" &&
              s.tipo !== "AT",
          );
          let ef = 0,
            or = 0;
          daySes.forEach((s) => {
            if (s.modalidadPago === "obra_social") {
              or += valorOrdenDe(s);
            } else {
              ef += valorParticularDe(s);
            }
          });
          return { ef, or };
        });

        const pendSem = weekSes.filter(
          (s) => s.estado === "pendiente" && s.tipo !== "reserva_personal",
        ).length;
        const cancelSem = weekSes.filter(
          (s) => s.estado === "cancelo" && s.tipo !== "reserva_personal",
        ).length;

        /* Novedades: sesiones con pendientes de cobro/orden/notas esta semana */
        const novedadesItems = weekSes
          .filter((s) => tienePendientePago(s, hoyStr) || tieneNotasAlerta(s) || esTurnoPasadoSinCalificar(s))
          .map((s) => {
            const pac = pacientes.find((p) => p.id === s.pacienteId);
            const nombre = pac ? `${pac.nombre} ${pac.apellido}` : "Paciente";
            const base = descPendiente(s, nombre, hoyStr);
            const na = s.notasAlertas || {};
            if (esTurnoPasadoSinCalificar(s))
              base.items.push({ texto: "Turno ya pasó — calificar estado", campo: "estado" });
            if (na.clinica)
              base.items.push({ texto: "Notas pendientes en Clínica", campo: "notasAlertas_clinica" });
            if (na.admin)
              base.items.push({ texto: "Notas pendientes en Administ.", campo: "notasAlertas_admin" });
            if (na.asistencia)
              base.items.push({ texto: "Notas pendientes en Asistencia", campo: "notasAlertas_asistencia" });
            return base;
          });

        /* ── label semana ── */
        const weekLabel = (() => {
          const a = weekDates[0];
          const b = weekDates[showWeekend ? 6 : 4];
          const ops = { day: "numeric", month: "long" };
          if (a.getMonth() === b.getMonth())
            return `${a.getDate()} – ${b.toLocaleDateString("es-AR", ops)} ${b.getFullYear()}`;
          return `${a.toLocaleDateString("es-AR", ops)} – ${b.toLocaleDateString("es-AR", ops)} ${b.getFullYear()}`;
        })();

        /* ── persistencia ── */
        function saveSesion(s) {
          const all = getData("hgsp_sesiones");
          const idx = all.findIndex((x) => x.id === s.id);
          if (idx >= 0) all[idx] = s;
          else all.push(s);
          setData("hgsp_sesiones", all);
          loadData();
        }
        /* Resuelve un ítem de novedad seteando su campo a true en la sesión */
        function resolverItem(sesionId, campo) {
          const all = getData("hgsp_sesiones");
          const idx = all.findIndex((x) => x.id === sesionId);
          if (idx < 0) return;
          if (campo.startsWith("notasAlertas_")) {
            const subkey = campo.replace("notasAlertas_", "");
            all[idx] = {
              ...all[idx],
              notasAlertas: { ...(all[idx].notasAlertas || {}), [subkey]: false },
            };
          } else {
            all[idx] = { ...all[idx], [campo]: true };
          }
          setData("hgsp_sesiones", all);
          loadData();
          showToast("✅ Ítem marcado como resuelto");
        }
        function deleteSesion(id) {
          setData(
            "hgsp_sesiones",
            getData("hgsp_sesiones").filter((s) => s.id !== id),
          );
          setModalEliminar(null);
          setModalTurno(null);
          loadData();
          showToast("🗑️ Turno eliminado");
        }
        function deleteReserva(id) {
          setData(
            "hgsp_sesiones",
            getData("hgsp_sesiones").filter((s) => s.id !== id),
          );
          setModalReserva(null);
          loadData();
          showToast("🗑️ Reserva eliminada");
        }
        function saveCobro(c) {
          const all = getData("hgsp_cobros");
          all.push(c);
          setData("hgsp_cobros", all);
          loadData();
        }

        /* ── semana key (fecha del lunes de la semana visible) ── */
        const semanaKey = dateStr(weekDates[0]);

        /* ── semana ya activada? ── */
        const semanasActivadas = getData("hgsp_semanas_activadas") || [];
        const semanaActivada = semanasActivadas.includes(semanaKey);

        /* ── recordatorios activos de esta semana ── */
        const recordatoriosActivos = recordatoriosSemana.filter(r => r.semana === semanaKey && !r.resuelto);

        /* ── pendientes de coordinación para esta semana ── */
        const coordSemana = coordPendientes.filter(
          (c) => c.semanaKey === semanaKey && !c.resuelta,
        );

        /* ── objetivos de la semana ── */
        const objActual =
          objetivosSemana.find((o) => o.semanaKey === semanaKey) || null;
        const sesParaObj = weekSes.filter((s) => s.tipo !== "reserva_personal");
        /* Denominator = solo sesiones que ya tienen una calificación para ese campo */
        function buildObjStats(campo) {
          const conRating = sesParaObj.filter(
            (s) => s[campo] === "bueno" || s[campo] === "malo",
          );
          const rated = conRating.length;
          const total = sesParaObj.length;
          if (rated === 0)
            return {
              malo: null,
              bueno: null,
              countMalo: 0,
              countBueno: 0,
              rated,
              total,
            };
          const countMalo = conRating.filter((s) => s[campo] === "malo").length;
          const countBueno = conRating.filter(
            (s) => s[campo] === "bueno",
          ).length;
          const pct = (val) =>
            Math.round(
              (conRating.filter((s) => s[campo] === val).length / rated) * 100,
            );
          return {
            malo: pct("malo"),
            bueno: pct("bueno"),
            countMalo,
            countBueno,
            rated,
            total,
          };
        }
        const obj1Stats = buildObjStats("obj1Estado");
        const obj2Stats = buildObjStats("obj2Estado");

        /* Stats para objetivos tipo "dia": basadas en evaluaciones por día almacenadas en el registro semana */
        function buildObjDiaStats(diasEvalKey) {
          const diasEval = objActual?.[diasEvalKey] || {};
          const dias = weekDates.slice(0, showWeekend ? 7 : 5);
          const entries = Object.entries(diasEval).filter(([d]) => dias.some(wd => dateStr(wd) === d));
          const rated = entries.length;
          const total = dias.length;
          if (rated === 0) return { malo: null, bueno: null, countMalo: 0, countBueno: 0, rated, total };
          const countBueno = entries.filter(([,v]) => v === "bueno").length;
          const countMalo  = entries.filter(([,v]) => v === "malo").length;
          return {
            malo: Math.round(countMalo / rated * 100),
            bueno: Math.round(countBueno / rated * 100),
            countMalo, countBueno, rated, total,
          };
        }

        /* Guarda evaluación diaria para objetivo tipo "dia" */
        function evaluarObjetivoDia(objNum, fecha, valor) {
          const all = getData("hgsp_objetivos_semana") || [];
          const idx = all.findIndex(o => o.semanaKey === semanaKey);
          if (idx < 0) return;
          const key = `obj${objNum}DiasEval`;
          const current = { ...(all[idx][key] || {}) };
          if (valor === null) { delete current[fecha]; }
          else { current[fecha] = valor; }
          all[idx] = { ...all[idx], [key]: current };
          setData("hgsp_objetivos_semana", all);
          loadData();
        }

        /* Guarda nuevo recordatorio para la semana */
        function guardarRecordatorio() {
          if (!recDraft.titulo.trim()) { showToast("⚠️ Ingresá un título"); return; }
          const all = getData("hgsp_recordatorios_semana") || [];
          all.push({ id: genId(), semana: semanaKey, titulo: recDraft.titulo.trim(), descripcion: recDraft.descripcion.trim(), resuelto: false, tipo: "recordatorio" });
          setData("hgsp_recordatorios_semana", all);
          setModalNuevoRec(false);
          setRecDraft({ titulo: "", descripcion: "" });
          loadData();
          showToast("📌 Recordatorio creado");
        }

        /* Marca un recordatorio como resuelto */
        function resolverRecordatorio(id) {
          const all = getData("hgsp_recordatorios_semana") || [];
          const idx = all.findIndex(r => r.id === id);
          if (idx < 0) return;
          all[idx] = { ...all[idx], resuelto: true };
          setData("hgsp_recordatorios_semana", all);
          loadData();
          showToast("✅ Recordatorio resuelto");
        }

        const pctBuenoGlobal =
          obj1Stats.bueno !== null || obj2Stats.bueno !== null
            ? Math.round(
                ((obj1Stats.bueno ?? 0) * obj1Stats.rated +
                  (obj2Stats.bueno ?? 0) * obj2Stats.rated) /
                  (obj1Stats.rated + obj2Stats.rated || 1),
              )
            : null;

        function guardarObjetivos() {
          const all = getData("hgsp_objetivos_semana") || [];
          const idx = all.findIndex((o) => o.semanaKey === semanaKey);
          const entry = {
            ...(idx >= 0 ? all[idx] : {}),
            id: idx >= 0 ? all[idx].id : genId(),
            semanaKey,
            obj1: objDraft.obj1.trim(),
            obj2: objDraft.obj2.trim(),
            obj1EvaluarEn: objDraft.obj1EvaluarEn || "turno",
            obj2EvaluarEn: objDraft.obj2EvaluarEn || "turno",
          };
          if (idx >= 0) all[idx] = entry;
          else all.push(entry);
          setData("hgsp_objetivos_semana", all);
          setEditandoObj(false);
          loadData();
          showToast("🎯 Objetivos guardados");
        }
        function abrirEditorObj() {
          setObjDraft({
            obj1: objActual?.obj1 || "",
            obj2: objActual?.obj2 || "",
            obj1EvaluarEn: objActual?.obj1EvaluarEn || "turno",
            obj2EvaluarEn: objActual?.obj2EvaluarEn || "turno",
          });
          setEditandoObj(true);
        }

        /* ── activar semana: carga turnos fijos y genera avisos flotantes ── */
        function activarSemana() {
          if (semanaActivada) {
            showToast("⚠️ Esta semana ya fue activada");
            return;
          }
          const allPacientes = getData("hgsp_pacientes").filter(
            (p) => p.activo,
          );
          const allSesiones = getData("hgsp_sesiones");
          const coord = getData("hgsp_coord_pendientes") || [];
          let creados = 0;
          let aCoordinar = 0;

          allPacientes.forEach((pac) => {
            const modalidad = pac.turnoModalidad || "fijo";
            if (
              modalidad === "fijo" &&
              pac.diasHorarios &&
              pac.diasHorarios.length > 0
            ) {
              pac.diasHorarios.forEach((slot) => {
                const diaIdx = DIAS_SEMANA.indexOf(slot.dia);
                if (diaIdx < 0 || diaIdx >= weekDates.length) return;
                const fecha = dateStr(weekDates[diaIdx]);
                const yaExiste = allSesiones.find(
                  (s) =>
                    s.pacienteId === pac.id &&
                    s.fecha === fecha &&
                    s.horaInicio === slot.horaInicio,
                );
                if (!yaExiste) {
                  allSesiones.push({
                    id: genId(),
                    pacienteId: pac.id,
                    fecha,
                    horaInicio: slot.horaInicio,
                    horaFin: slot.horaFin,
                    tipo: pac.tipo === "AT" ? "AT" : "individual",
                    estado: "pendiente",
                    cobrado: false,
                    montoCobrado: 0,
                    notas: "",
                    evolucionClinica: "",
                    notasAdmin: "",
                    notasAsistencia: "",
                    notasAlertas: { clinica: false, admin: false, asistencia: false },
                    modalidadPago:
                      pac.cobertura === "particular"
                        ? "particular"
                        : "obra_social",
                    montoParticular: pac.valorParticular || 0,
                    coseguroMonto: pac.coseguro || 0,
                  });
                  creados++;
                }
              });
            } else if (modalidad === "flotante") {
              const yaExiste = coord.find(
                (c) =>
                  c.pacienteId === pac.id &&
                  c.semanaKey === semanaKey &&
                  !c.resuelta,
              );
              if (!yaExiste) {
                coord.push({
                  id: genId(),
                  pacienteId: pac.id,
                  semanaKey,
                  resuelta: false,
                  nota: "",
                });
                aCoordinar++;
              }
            }
          });

          setData("hgsp_sesiones", allSesiones);
          setData("hgsp_coord_pendientes", coord);
          const act = getData("hgsp_semanas_activadas") || [];
          act.push(semanaKey);
          setData("hgsp_semanas_activadas", act);
          loadData();
          if (aCoordinar > 0) setShowCoord(true);
          showToast(
            `✅ Semana activada · ${creados} turno${creados !== 1 ? "s" : ""} cargado${creados !== 1 ? "s" : ""} · ${aCoordinar} a coordinar`,
          );
        }

        /* ── resolver ítem de coordinación ── */
        function resolverCoord(id) {
          const all = getData("hgsp_coord_pendientes") || [];
          const idx = all.findIndex((c) => c.id === id);
          if (idx >= 0) all[idx].resuelta = true;
          setData("hgsp_coord_pendientes", all);
          loadData();
          showToast("✅ Coordinado");
        }

        /* ── key del modal para forzar reset de estado al cambiar destino ── */
        const modalKey = modalTurno
          ? `${modalTurno.mode}-${modalTurno.sesion?.id || "new"}-${modalTurno.fecha}-${modalTurno.hora}`
          : "closed";

        return (
          <div>
            {/* El encabezado y botones se movieron al Topbar principal */}

            {/* ══ PANEL OBJETIVOS DE LA SEMANA ══ */}
            <div
              style={{
                background: "var(--vd)",
                border: "2px solid var(--vm)",
                borderLeft: "5px solid var(--do)",
                borderRadius: "var(--r)",
                padding: "20px 24px",
                marginBottom: "18px",
                position: "relative",
                overflow: "hidden",
              }}
            >
              <div
                style={{
                  position: "absolute",
                  top: 0,
                  left: 0,
                  right: 0,
                  height: "3px",
                  background: "linear-gradient(90deg,var(--do),#E8B84B)",
                }}
              />

              {!editandoObj ? (
                <>
                {/* Header colapsable de objetivos */}
                <button
                  onClick={() => setShowObjPanel(v => !v)}
                  style={{ display:"flex", alignItems:"center", justifyContent:"space-between", width:"100%", background:"none", border:"none", cursor:"pointer", padding:"0", marginBottom: showObjPanel ? "16px" : "0", textAlign:"left" }}
                >
                  <div>
                    <div style={{ fontFamily:"var(--serif2)", fontSize:"22px", fontWeight:700, color:"var(--do)", lineHeight:1.1, textShadow:"0 1px 4px rgba(0,0,0,.4)" }}>
                      🎯 Objetivos
                    </div>
                    <div style={{ fontFamily:"var(--mono)", fontSize:"15px", color:"var(--do)", fontWeight:700, marginTop:"4px", letterSpacing:".04em" }}>
                      {weekLabel}
                    </div>
                  </div>
                  <span style={{ fontFamily:"var(--mono)", fontSize:"11px", color:"rgba(200,146,42,.5)", fontWeight:400, flexShrink:0 }}>
                    {showObjPanel ? "▲ ocultar" : "▼ mostrar"}
                  </span>
                </button>
                {showObjPanel && (
                <div className="obj-panel-view collapsible-enter">
                  <div
                    style={{
                      flex: 1,
                      display: "flex",
                      flexDirection: "column",
                      gap: "8px",
                    }}
                  >
                    {[
                      { idx: 0, texto: objActual?.obj1, evaluarEn: objActual?.obj1EvaluarEn || "turno", stats: objActual?.obj1EvaluarEn === "dia" ? buildObjDiaStats("obj1DiasEval") : obj1Stats },
                      { idx: 1, texto: objActual?.obj2, evaluarEn: objActual?.obj2EvaluarEn || "turno", stats: objActual?.obj2EvaluarEn === "dia" ? buildObjDiaStats("obj2DiasEval") : obj2Stats },
                    ].map((item) => (
                      <div
                        key={item.idx}
                        style={{
                          background: "rgba(255,255,255,.04)",
                          border: "1px solid rgba(200,146,42,.2)",
                          borderRadius: "12px",
                          padding: "11px 13px",
                          marginBottom: "8px",
                        }}
                      >
                        {/* Fila 1: círculo número + texto */}
                        <div style={{ display: "flex", alignItems: "flex-start", gap: "10px" }}>
                          <div
                            style={{
                              width: "22px",
                              height: "22px",
                              borderRadius: "50%",
                              background: "var(--do)",
                              color: "var(--vd)",
                              display: "flex",
                              alignItems: "center",
                              justifyContent: "center",
                              fontFamily: "var(--mono)",
                              fontSize: "11px",
                              fontWeight: 700,
                              flexShrink: 0,
                              marginTop: "1px",
                            }}
                          >
                            {item.idx + 1}
                          </div>
                          <div
                            style={{
                              flex: 1,
                              fontFamily: "var(--sans)",
                              fontSize: "13px",
                              fontWeight: 600,
                              color: item.texto ? "rgba(255,255,255,.9)" : "rgba(255,255,255,.25)",
                              fontStyle: item.texto ? "normal" : "italic",
                              lineHeight: 1.4,
                            }}
                          >
                            {item.texto || "— Sin objetivo definido —"}
                          </div>
                        </div>
                        {/* Badge tipo */}
                        <div style={{ paddingLeft:"32px", marginTop:"4px" }}>
                          <span style={{ fontFamily:"var(--mono)", fontSize:"9px", color:"rgba(200,146,42,.55)", textTransform:"uppercase", letterSpacing:".04em" }}>
                            {item.evaluarEn === "dia" ? "📅 por día" : "🔁 por turno"}
                          </span>
                        </div>
                        {/* Evaluación por día (solo tipo "dia") */}
                        {item.texto && item.evaluarEn === "dia" && (
                          <div style={{ paddingLeft:"32px", marginTop:"8px" }}>
                            <div style={{ display:"flex", gap:"5px", flexWrap:"wrap" }}>
                              {weekDates.slice(0, showWeekend ? 7 : 5).map((d, di) => {
                                const ds = dateStr(d);
                                const diasEval = objActual?.[`obj${item.idx+1}DiasEval`] || {};
                                const val = diasEval[ds];
                                const dayLabel = ["L","M","X","J","V","S","D"][di];
                                const isPast = new Date(`${ds}T23:59`) <= new Date();
                                return (
                                  <button key={ds}
                                    onClick={() => { if (!isPast) return; const next = val === undefined ? "bueno" : val === "bueno" ? "malo" : null; evaluarObjetivoDia(item.idx+1, ds, next); }}
                                    title={isPast ? `${ds} — clic para evaluar` : "Día futuro"}
                                    style={{ padding:"4px 7px", borderRadius:"8px", border:`1.5px solid ${val==="bueno"?"rgba(125,204,144,.6)":val==="malo"?"rgba(248,113,113,.6)":"rgba(255,255,255,.12)"}`, background:val==="bueno"?"rgba(125,204,144,.15)":val==="malo"?"rgba(248,113,113,.12)":"rgba(255,255,255,.04)", cursor:isPast?"pointer":"default", opacity:isPast?1:0.4, display:"flex", flexDirection:"column", alignItems:"center", gap:"1px", minWidth:"28px" }}
                                  >
                                    <span style={{ fontFamily:"var(--mono)", fontSize:"9px", color:"rgba(255,255,255,.5)" }}>{dayLabel}</span>
                                    <span style={{ fontSize:"12px", lineHeight:1 }}>{val==="bueno"?"😊":val==="malo"?"😞":"·"}</span>
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        )}
                        {/* Fila 2: estado + caritas + porcentaje */}
                        {item.texto && item.stats.bueno !== null && (
                          <div
                            style={{
                              display: "flex",
                              alignItems: "center",
                              gap: "10px",
                              marginTop: "8px",
                              paddingLeft: "32px",
                              flexWrap: "wrap",
                            }}
                          >
                            <span
                              style={{ fontFamily: "var(--mono)", fontSize: "10px", color: "rgba(255,255,255,.25)", whiteSpace: "nowrap" }}
                              title="Calificadas / total"
                            >
                              {item.stats.rated}/{item.stats.total}
                            </span>
                            <span style={{ display: "flex", alignItems: "center", gap: "3px" }}>
                              <span style={{ fontFamily: "var(--mono)", fontSize: "11px", fontWeight: 700, color: "#F87171" }}>{item.stats.countMalo}</span>
                              <span style={{ fontSize: "14px" }}>😞</span>
                              <span style={{ fontFamily: "var(--mono)", fontSize: "9px", color: "rgba(248,113,113,.5)" }}>{item.stats.malo}%</span>
                            </span>
                            <span style={{ display: "flex", alignItems: "center", gap: "3px" }}>
                              <span style={{ fontFamily: "var(--mono)", fontSize: "11px", fontWeight: 700, color: "#7DCC90" }}>{item.stats.countBueno}</span>
                              <span style={{ fontSize: "14px" }}>😊</span>
                              <span style={{ fontFamily: "var(--mono)", fontSize: "9px", color: "rgba(125,204,144,.5)" }}>{item.stats.bueno}%</span>
                            </span>
                          </div>
                        )}
                        {item.texto && item.stats.bueno === null && (
                          <div style={{ paddingLeft: "32px", marginTop: "6px" }}>
                            <span style={{ fontFamily: "var(--mono)", fontSize: "10px", color: "rgba(255,255,255,.2)" }}>
                              {item.stats.total > 0 ? `0/${item.stats.total} calificados` : "sin sesiones"}
                            </span>
                          </div>
                        )}
                      </div>
                    ))}

                    {pctBuenoGlobal !== null &&
                      (objActual?.obj1 || objActual?.obj2) && (
                        <div
                          style={{
                            marginTop: "4px",
                            paddingTop: "8px",
                            borderTop: "1px solid rgba(200,146,42,.2)",
                            display: "flex",
                            alignItems: "center",
                            gap: "10px",
                          }}
                        >
                          <span
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: "10px",
                              color: "rgba(255,255,255,.35)",
                              textTransform: "uppercase",
                              letterSpacing: ".06em",
                            }}
                          >
                            EFECTIVIDAD SEMANAL
                          </span>
                          <span style={{ fontSize: "26px", lineHeight: 1 }}>
                            {pctBuenoGlobal >= 85
                              ? "🔥"
                              : pctBuenoGlobal >= 60
                                ? "😊"
                                : pctBuenoGlobal >= 40
                                  ? "😐"
                                  : "😞"}
                          </span>
                          <span
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: "14px",
                              fontWeight: 700,
                              color:
                                pctBuenoGlobal >= 60
                                  ? "#7DCC90"
                                  : pctBuenoGlobal >= 40
                                    ? "#F0C860"
                                    : "#F87171",
                            }}
                          >
                            {pctBuenoGlobal}%
                          </span>
                          <span
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: "10px",
                              color:
                                pctBuenoGlobal >= 60
                                  ? "#7DCC90"
                                  : "rgba(255,255,255,.3)",
                            }}
                          >
                            {pctBuenoGlobal >= 60
                              ? "✓ Umbral alcanzado"
                              : `Umbral p/ logrado: 60%`}
                          </span>
                        </div>
                      )}
                  </div>

                  <button
                    onClick={abrirEditorObj}
                    style={{
                      padding: "6px 14px",
                      borderRadius: "50px",
                      border: "2px solid rgba(200,146,42,.3)",
                      background: "rgba(200,146,42,.1)",
                      color: "var(--do)",
                      fontFamily: "var(--sans)",
                      fontSize: "12px",
                      fontWeight: 700,
                      cursor: "pointer",
                      flexShrink: 0,
                    }}
                  >
                    ✏️ {objActual ? "Editar" : "Definir"}
                  </button>
                </div>
                )}
                </>
              ) : (
                <div>
                  <div
                    style={{
                      fontFamily: "var(--serif2)",
                      fontSize: "16px",
                      fontWeight: 700,
                      color: "var(--do)",
                      marginBottom: "14px",
                    }}
                  >
                    ✏️ Definir objetivos de la semana
                  </div>
                  {[
                    { num: 1, key: "obj1", enKey: "obj1EvaluarEn" },
                    { num: 2, key: "obj2", enKey: "obj2EvaluarEn" },
                  ].map((item) => (
                    <div key={item.key} style={{ marginBottom: "14px" }}>
                      <div style={{ fontFamily:"var(--mono)", fontSize:"10px", color:"rgba(255,255,255,.4)", textTransform:"uppercase", letterSpacing:".06em", marginBottom:"4px" }}>
                        Objetivo {item.num}
                      </div>
                      <input
                        className="modal-input"
                        style={{ width: "100%", boxSizing: "border-box" }}
                        placeholder={`Objetivo ${item.num} de la semana...`}
                        value={objDraft[item.key]}
                        onChange={(e) => setObjDraft((prev) => ({ ...prev, [item.key]: e.target.value }))}

      function pacAlerts(p) {
        const alerts = [];
        if (p.vencimientoCredencial) {
          const diff =
            (new Date(p.vencimientoCredencial) - new Date()) / 86400000;
          if (diff < 30 && diff > 0) alerts.push("Credencial vence pronto");
          if (diff <= 0) alerts.push("Credencial vencida");
        }
        const sesiones = getData("hgsp_sesiones").filter(
          (s) => s.pacienteId === p.id,
        );
        const cobros = getData("hgsp_cobros").filter(
          (c) => c.pacienteId === p.id && !c.cobrado,
        );
        if (cobros.length > 0) alerts.push("Cobros pendientes");
        if (sesiones.length > 0) {
          const ultima = sesiones.sort((a, b) =>
            b.fecha.localeCompare(a.fecha),
          )[0];
          const diff2 = (new Date() - new Date(ultima.fecha)) / 86400000;
          if (diff2 > 30) alerts.push(">30 días sin sesión");
        }
        return alerts;
      }

      /* ═══════════════════════════════════════ */
      /* MODAL FORMULARIO PACIENTE (4 TABS)     */
      /* ═══════════════════════════════════════ */
      function ModalPaciente({ isOpen, onClose, paciente, onSave }) {
        const [tab, setTab] = useState("personal");
        const [f, setF] = useState({ ...EMPTY_PAC });
        const [errors, setErrors] = useState({});
        const [confirmCancel, setConfirmCancel] = useState(false);
        const pacOverlayMDRef = useRef(false);
        function tryClose() { setConfirmCancel(true); }
        function doClose() { setConfirmCancel(false); onClose(); }
        // Obras sociales desde configuración (se lee fresco al abrir el modal)
        const cfgOS = getData("hgsp_config")?.obrasSociales || [];

        useEffect(() => {
          if (isOpen) {
            setF(
              paciente
                ? { ...paciente }
                : {
                    ...EMPTY_PAC,
                    id: genId(),
                    fechaInicio: new Date().toISOString().slice(0, 10),
                  },
            );
            setTab("personal");
            setErrors({});
          }
        }, [isOpen]);

        function capitalize(str) {
          if (!str) return "";
          return str
            .trim()
            .split(/\s+/)
            .map((w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
            .join(" ");
        }
        function upd(k, v) {
          if ((k === "nombre" || k === "apellido") && v) v = capitalize(v);
          setF((prev) => ({ ...prev, [k]: v }));
        }

        function calcEndTime(startTime, minutes) {
          const [h, m] = startTime.split(":").map(Number);
          const totalMin = h * 60 + m + minutes;
          const eh = Math.floor(totalMin / 60) % 24;
          const em = totalMin % 60;
          return `${String(eh).padStart(2, "0")}:${String(em).padStart(2, "0")}`;
        }
        function addSlot() {
          setF((prev) => ({
            ...prev,
            diasHorarios: [
              ...prev.diasHorarios,
              { dia: "lunes", horaInicio: "10:00", horaFin: "10:45" },
            ],
          }));
        }
        function removeSlot(i) {
          setF((prev) => ({
            ...prev,
            diasHorarios: prev.diasHorarios.filter((_, idx) => idx !== i),
          }));
        }
        function updSlot(i, k, v) {
          setF((prev) => {
            const arr = [...prev.diasHorarios];
            arr[i] = { ...arr[i], [k]: v };
            if (k === "horaInicio") {
              arr[i].horaFin = calcEndTime(v, 45);
            }
            return { ...prev, diasHorarios: arr };
          });
        }

        /* ── lógica medicación ── */
        function addMed() {
          setF((prev) => ({
            ...prev,
            medicacionLista: [
              ...(prev.medicacionLista || []),
              { id: genId(), patologia: "", medicamento: "", dosis: "" },
            ],
          }));
        }
        function removeMed(id) {
          setF((prev) => ({
            ...prev,
            medicacionLista: prev.medicacionLista.filter((m) => m.id !== id),
          }));
        }
        function updMed(id, k, v) {
          setF((prev) => ({
            ...prev,
            medicacionLista: prev.medicacionLista.map((m) =>
              m.id === id ? { ...m, [k]: v } : m,
            ),
          }));
        }

        function validate() {
          const e = {};
          if (!f.nombre.trim()) e.nombre = true;
          if (!f.apellido.trim()) e.apellido = true;

          // Otros campos ahora son opcionales según pedido expreso del usuario
          setErrors(e);
          return e;
        }

        function handleSave() {
          const errs = validate();
          if (Object.keys(errs).length > 0) {
            const labels = {
              nombre: "Nombre",
              apellido: "Apellido",
              dni: "DNI (7-8 dígitos)",
              telefono: "Teléfono",
              fechaNacimiento: "Fecha nacimiento (futura)",
              nroAfiliado: "Nº Afiliado",
              fechaInicio: "Fecha inicio",
            };
            const faltantes = Object.keys(errs)
              .map((k) => labels[k] || k)
              .join(", ");
            showToast(`⚠️ Revisá: ${faltantes}`);
            return;
          }
          f.fechaUltimaModificacion = Date.now();
          onSave(f);
          onClose();
          showToast("✅ Paciente guardado correctamente");
        }

        if (!isOpen) return null;

        const fieldStyle = (k) =>
          errors[k] ? { border: "2px solid #D9534F" } : {};

        return ReactDOM.createPortal(
          <div
            className="modal-overlay"
            onMouseDown={(e) => {
              pacOverlayMDRef.current = e.target === e.currentTarget;
            }}
            onClick={(e) => {
              if (e.target === e.currentTarget && pacOverlayMDRef.current)
                tryClose();
              pacOverlayMDRef.current = false;

      /* ═══════════════════════════════════════ */
      /* MODAL BAJA PACIENTE                    */
      /* ═══════════════════════════════════════ */
      function ModalBaja({ isOpen, onClose, paciente, onConfirm }) {
        const [motivo, setMotivo] = useState("Alta terapéutica");
        const [detalle, setDetalle] = useState("");

        if (!isOpen || !paciente) return null;

        function handleConfirm() {
          if (!motivo) {
            showToast("⚠️ Seleccioná un motivo");
            return;
          }
          onConfirm(paciente.id, motivo + (detalle ? ` — ${detalle}` : ""));
          onClose();
        }

        return ReactDOM.createPortal(
          <div
            className="modal-overlay"
            onClick={(e) => {
              if (e.target === e.currentTarget) onClose();
            }}
          >
            <div className="modal-card">
              <div className="modal-bar"></div>
              <div className="modal-header">
                <span className="modal-title">Dar de baja</span>
                <button className="modal-close" onClick={onClose}>
                  ✕
                </button>
              </div>
              <div className="modal-body">
                <div className="alert-warn" style={{ marginBottom: "16px" }}>
                  ⚠️ Se marcará como inactivo a{" "}
                  <strong style={{ marginLeft: "4px" }}>
                    {paciente.nombre} {paciente.apellido}
                  </strong>
                </div>
                <div className="modal-label">Motivo de baja *</div>
                <select
                  className="modal-select"
                  value={motivo}
                  onChange={(e) => setMotivo(e.target.value)}
                >
                  <option>Alta terapéutica</option>
                  <option>Abandono</option>
                  <option>Derivación</option>
                  <option>Otro</option>
                </select>
                <div className="modal-label">Detalle (opcional)</div>
                <textarea
                  className="modal-textarea"
                  value={detalle}
                  onChange={(e) => setDetalle(e.target.value)}
                  placeholder="Comentarios adicionales..."
                />
                <div
                  style={{
                    display: "flex",
                    gap: "10px",
                    justifyContent: "flex-end",
                  }}
                >
                  <button className="btn btn-sec" onClick={onClose}>
                    Cancelar
                  </button>
                  <button className="btn btn-danger" onClick={handleConfirm}>
                    Confirmar baja
                  </button>
                </div>
              </div>
            </div>
          </div>,
          document.body,
        );
      }

                                {c.cobrado ? "Cobrado" : "Pendiente"}
                              </Badge>
                            </td>
                          </tr>
                        ))}

                    </table>
                  </div>
                </div>
              )}

      /* ═══════════════════════════════════════ */
      /* SECCIÓN PACIENTES (PRINCIPAL)          */
      /* ═══════════════════════════════════════ */
      function SeccionPacientes() {
        const [pacientes, setPacientes] = useState([]);
        const [search, setSearch] = useState("");
        const [filtroEstado, setFiltroEstado] = useState("activos");
        const [filtroTipo, setFiltroTipo] = useState("todos");
        const [filtroCobertura, setFiltroCobertura] = useState("todos");
        const [vistaCards, setVistaCards] = useState(false);
        const [modalOpen, setModalOpen] = useState(false);
        const [editPac, setEditPac] = useState(null);
        const [bajaModal, setBajaModal] = useState(null);
        const [perfilPac, setPerfilPac] = useState(null);

        function loadPacientes() {
          setPacientes(getData("hgsp_pacientes"));
        }
        useEffect(() => {
          loadPacientes();
        }, []);

        function savePaciente(p) {
          const all = getData("hgsp_pacientes");
          const idx = all.findIndex((x) => x.id === p.id);
          if (idx >= 0) all[idx] = p;
          else all.push(p);
          setData("hgsp_pacientes", all);
          loadPacientes();
        }

        function darDeBaja(id, motivo) {
          const all = getData("hgsp_pacientes");
          const idx = all.findIndex((x) => x.id === id);
          if (idx >= 0) {
            all[idx].activo = false;
            all[idx].fechaAlta = new Date().toISOString().slice(0, 10);
            all[idx].motivoBaja = motivo;
            all[idx].fechaUltimaModificacion = Date.now();
            setData("hgsp_pacientes", all);
            loadPacientes();
            setPerfilPac(null);
            showToast("📋 Paciente dado de baja");
          }
        }

        function reactivar(id) {
          const all = getData("hgsp_pacientes");
          const idx = all.findIndex((x) => x.id === id);
          if (idx >= 0) {
            all[idx].activo = true;
            all[idx].fechaAlta = null;
            all[idx].motivoBaja = "";
            all[idx].fechaUltimaModificacion = Date.now();
            setData("hgsp_pacientes", all);
            loadPacientes();
            showToast("✅ Paciente reactivado");
          }
        }

        /* FILTRADO */
        let filtered = pacientes;
        if (filtroEstado === "activos")
          filtered = filtered.filter((p) => p.activo);
        else if (filtroEstado === "inactivos")
          filtered = filtered.filter((p) => !p.activo);
        if (filtroTipo === "psicologia")
          filtered = filtered.filter((p) => p.tipo === "psicologia");
        else if (filtroTipo === "AT")
          filtered = filtered.filter((p) => p.tipo === "AT");
        if (filtroCobertura === "particular")
          filtered = filtered.filter((p) => p.cobertura === "particular");
        else if (filtroCobertura === "obra_social")
          filtered = filtered.filter(
            (p) => p.cobertura === "obra_social" || p.cobertura === "mixto",
          );

        if (search.trim()) {
          const q = search.toLowerCase();
          filtered = filtered.filter(
            (p) =>
              `${p.nombre} ${p.apellido}`.toLowerCase().includes(q) ||
              p.dni.includes(q),
          );
        }

        const activos = pacientes.filter((p) => p.activo).length;
        const inactivos = pacientes.filter((p) => !p.activo).length;
        const atCount = pacientes.filter(
          (p) => p.tipo === "AT" && p.activo,
        ).length;

        /* SI PERFIL ACTIVO */
        if (perfilPac) {
          const fresh = getData("hgsp_pacientes").find(
            (p) => p.id === perfilPac.id,
          );
          return (
            <PerfilPaciente
              paciente={fresh || perfilPac}
              onBack={() => {
                setPerfilPac(null);
                loadPacientes();
              }}
              onEdit={(p) => {
                setEditPac(p);
                setModalOpen(true);
              }}
              onBaja={(p) => setBajaModal(p)}
              onReactivar={(id) => {
                reactivar(id);
                setPerfilPac(null);
              }}
            />
          );
        }

        return (
          <div>
            <div className="page-header">
              <div className="page-header-icon">🌿</div>
              <div>
                <div className="page-header-title">Pacientes</div>
                <div className="page-header-sub">
                  ABM completo con perfil detallado, filtros y baja lógica
                </div>
              </div>
            </div>

            {/* TOOLBAR */}
            <div
              style={{
                display: "flex",
                gap: "12px",
                alignItems: "center",
                marginBottom: "14px",
                flexWrap: "wrap",
              }}
            >
              <SearchInput
                placeholder="Buscar por nombre, apellido o DNI..."
                value={search}
                onChange={setSearch}
              />
              <button
                className="btn btn-g"
                onClick={() => {
                  setEditPac(null);
                  setModalOpen(true);
                }}
              >
                + Nuevo paciente
              </button>
              <button
                className="btn btn-sec"
                style={{ padding: "8px 14px", fontSize: "15px" }}
                onClick={() => setVistaCards((v) => !v)}
                title={vistaCards ? "Vista tabla" : "Vista cards"}
              >
                {vistaCards ? "☰" : "▦"}
              </button>
            </div>

            {/* FILTROS */}
            <div
              style={{
                display: "flex",
                gap: "8px",
                marginBottom: "16px",
                flexWrap: "wrap",
                alignItems: "center",
              }}
            >
              <Tabs
                tabs={[
                  { id: "activos", label: `Activos (${activos})` },
                  { id: "inactivos", label: `Inactivos (${inactivos})` },
                  { id: "todos", label: "Todos" },
                ]}
                active={filtroEstado}
                onChange={setFiltroEstado}
              />

              <select
                className="input"
                style={{
                  width: "auto",
                  padding: "6px 14px",
                  fontSize: "12px",
                  borderRadius: "50px",
                  borderColor: "var(--crb)",
                }}
                value={filtroTipo}
                onChange={(e) => setFiltroTipo(e.target.value)}
              >
                <option value="todos">Todos los tipos</option>
                <option value="psicologia">Psicología</option>
                <option value="AT">AT</option>
              </select>
              <select
                className="input"
                style={{
                  width: "auto",
                  padding: "6px 14px",
                  fontSize: "12px",
                  borderRadius: "50px",
                  borderColor: "var(--crb)",
                }}
                value={filtroCobertura}
                onChange={(e) => setFiltroCobertura(e.target.value)}
              >
                <option value="todos">Toda cobertura</option>
                <option value="particular">Particular</option>
                <option value="obra_social">Obra Social</option>
              </select>
            </div>

            {/* BADGES RESUMEN */}
            <div style={{ display: "flex", gap: "8px", marginBottom: "16px" }}>
              <Badge type="ok">Activos: {activos}</Badge>
              <Badge type="warn">AT: {atCount}</Badge>
              <Badge type="error">Inactivos: {inactivos}</Badge>
            </div>

            {/* VISTA TABLA */}
            {!vistaCards && (
              <div className="tbl-wrap">
                <table className="tbl">
                  <thead>
                    <tr>
                      <th>Paciente</th>
                      <th>DNI</th>
                      <th>Cobertura</th>
                      <th>Frecuencia</th>
                      <th>Tipo</th>
                      <th>Estado</th>
                      <th>Acciones</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.length === 0 && (
                      <tr>
                        <td
                          colSpan={7}
                          style={{
                            textAlign: "center",
                            color: "var(--tx3)",
                            padding: "28px",
                          }}
                        >
                          No se encontraron pacientes
                        </td>
                      </tr>
                    )}
                    {filtered.map((p) => {
                      const alerts = pacAlerts(p);
                      return (
                        <tr key={p.id}>
                          <td>
                            <div
                              style={{
                                display: "flex",
                                alignItems: "center",
                                gap: "8px",
                              }}
                            >
                              <div
                                className="pac-avatar"
                                style={{
                                  width: "30px",
                                  height: "30px",
                                  fontSize: "12px",
                                }}
                              >
                                {p.nombre.charAt(0)}
                                {p.apellido.charAt(0)}
                              </div>
                              <div>
                                <div style={{ fontWeight: 600 }}>
                                  {p.nombre} {p.apellido}
                                </div>
                                {alerts.length > 0 && (
                                  <span
                                    style={{
                                      color: "#D9534F",
                                      fontSize: "11px",
                                    }}
                                  >
                                    ⚠️ {alerts[0]}
                                  </span>
                                )}
                              </div>
                            </div>
                          </td>
                          <td
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: "12px",
                            }}
                          >
                            {p.dni}
                          </td>
                          <td>
                            {p.cobertura === "particular"
                              ? "Particular"
                              : p.obraSocial}
                          </td>
                          <td>{p.frecuencia}</td>
                          <td>
                            <Badge type={p.tipo === "AT" ? "warn" : "ok"}>
                              {p.tipo === "AT" ? "AT" : "Psico"}
                            </Badge>
                          </td>
                          <td>
                            <Badge type={p.activo ? "ok" : "error"}>
                              {p.activo ? "Activo" : "Inactivo"}
                            </Badge>
                          </td>
                          <td>
                            <div style={{ display: "flex", gap: "6px" }}>
                              <span
                                className="act-link"
                                title="Ver perfil"
                                onClick={() => setPerfilPac(p)}
                              >
                                👁️
                              </span>
                              <span
                                className="act-link"
                                title="Editar"
                                onClick={() => {
                                  setEditPac(p);
                                  setModalOpen(true);
                                }}
                              >
                                ✏️
                              </span>
                              {p.activo && (
                                <span
                                  className="act-link"
                                  title="Dar de baja"
                                  style={{ color: "#D9534F" }}
                                  onClick={() => setBajaModal(p)}
                                >
                                  🗑️
                                </span>
                              )}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}

            {/* VISTA CARDS */}
            {vistaCards && (
              <div className="pac-grid">
                {filtered.length === 0 && (
                  <p
                    style={{
                      color: "var(--tx3)",
                      gridColumn: "1/-1",
                      textAlign: "center",
                      padding: "28px",
                    }}
                  >
                    No se encontraron pacientes
                  </p>
                )}
                {filtered.map((p) => {
                  const alerts = pacAlerts(p);
                  return (
                    <div
                      className="pac-card"
                      key={p.id}
                      onClick={() => setPerfilPac(p)}
                    >
                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: "12px",
                          marginBottom: "12px",
                        }}
                      >
                        <div className="pac-avatar">
                          {p.nombre.charAt(0)}
                          {p.apellido.charAt(0)}
                        </div>
                        <div>
                          <div className="pac-name">
                            {p.nombre} {p.apellido}
                          </div>
                          <div className="pac-detail">DNI {p.dni}</div>
                        </div>
                      </div>
                      <div
                        style={{
                          display: "flex",
                          gap: "6px",
                          flexWrap: "wrap",
                          marginBottom: "8px",
                        }}
                      >
                        <Badge type={p.tipo === "AT" ? "warn" : "ok"}>
                          {p.tipo === "AT" ? "AT" : "Psicología"}
                        </Badge>
                        <Badge type={p.activo ? "ok" : "error"}>
                          {p.activo ? "Activo" : "Inactivo"}
                        </Badge>
                      </div>
                      <div className="pac-detail">
                        {p.cobertura === "particular"
                          ? `Particular · $${p.valorParticular?.toLocaleString("es-AR")}`
                          : `${p.obraSocial} · coseg. $${p.coseguro?.toLocaleString("es-AR")}`}
                      </div>
                      <div className="pac-detail" style={{ marginTop: "4px" }}>
                        {p.frecuencia} ·{" "}
                        {p.diasHorarios?.map((h) => h.dia).join(", ")}
                      </div>
                      {alerts.length > 0 && (
                        <div
                          style={{
                            color: "#FFD0B8",
                            fontSize: "11px",
                            marginTop: "6px",
                          }}
                        >
                          ⚠️ {alerts.join(" · ")}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* MODALES */}
            <ModalPaciente
              isOpen={modalOpen}
              onClose={() => {
                setModalOpen(false);
                setEditPac(null);
              }}
              paciente={editPac}
              onSave={savePaciente}
            />
            <ModalBaja
              isOpen={!!bajaModal}
              onClose={() => setBajaModal(null)}
              paciente={bajaModal}
              onConfirm={darDeBaja}
            />
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* FASE 5 — FACTURACIÓN: CHARTS           */
      /* ═══════════════════════════════════════ */

      function ChartBarras({ meses, osData, partData }) {
        const cvs = useRef(null);
        const inst = useRef(null);
        useEffect(() => {
          if (!cvs.current || typeof Chart === "undefined") return;
          if (inst.current) {
            inst.current.destroy();
            inst.current = null;
          }
          inst.current = new Chart(cvs.current, {
            type: "bar",
            data: {
              labels: meses,
              datasets: [
                {
                  label: "OS / Coseguro",
                  data: osData,
                  backgroundColor: "#2D5A3D",
                  borderRadius: 5,
                },
                {
                  label: "Particulares",
                  data: partData,
                  backgroundColor: "#C8922A",
                  borderRadius: 5,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  labels: {
                    color: "#4A6357",
                    font: { family: "DM Mono", size: 11 },
                    padding: 16,
                  },
                },
                tooltip: {
                  callbacks: {
                    label: (c) => ` $${c.parsed.y.toLocaleString("es-AR")}`,
                  },
                },
              },
              scales: {
                x: {
                  stacked: true,
                  ticks: {
                    color: "#7A9485",
                    font: { family: "DM Mono", size: 10 },
                  },
                  grid: { color: "#E8E0D4" },
                },
                y: {
                  stacked: true,
                  ticks: {
                    color: "#7A9485",
                    font: { family: "DM Mono", size: 10 },
                    callback: (v) => `$${(v / 1000).toFixed(0)}k`,
                  },
                  grid: { color: "#E8E0D4" },
                },
              },
            },
          });
          return () => {
            if (inst.current) {
              inst.current.destroy();
              inst.current = null;
            }
          };
        }, [
          JSON.stringify(meses),
          JSON.stringify(osData),
          JSON.stringify(partData),
        ]);
        return (
          <div style={{ position: "relative", height: "260px" }}>
            <canvas ref={cvs} />
          </div>
        );
      }

      function ChartTorta({ labels, valores }) {
        const cvs = useRef(null);
        const inst = useRef(null);
        const PAL = [
          "#1E3D2B",
          "#C8922A",
          "#2D5A3D",
          "#E8B84B",
          "#4A7C5F",
          "#D4E6DA",
          "#7A5200",
          "#B8B0A0",
        ];
        useEffect(() => {
          if (!cvs.current || typeof Chart === "undefined" || !labels.length)
            return;
          if (inst.current) {
            inst.current.destroy();
            inst.current = null;
          }
          inst.current = new Chart(cvs.current, {
            type: "doughnut",
            data: {
              labels,
              datasets: [
                {
                  data: valores,
                  backgroundColor: labels.map((_, i) => PAL[i % PAL.length]),
                  borderWidth: 2,
                  borderColor: "#FAF7F2",
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: "right",
                  labels: {
                    color: "#4A6357",
                    font: { family: "DM Mono", size: 11 },
                    padding: 12,
                  },
                },
                tooltip: {
                  callbacks: {
                    label: (c) => ` $${c.parsed.toLocaleString("es-AR")}`,
                  },
                },
              },
            },
          });
          return () => {
            if (inst.current) {
              inst.current.destroy();
              inst.current = null;
            }
          };
        }, [JSON.stringify(labels), JSON.stringify(valores)]);
        return (
          <div style={{ position: "relative", height: "260px" }}>
            <canvas ref={cvs} />
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* FASE 5 — TAB A: LIQUIDACIONES OS       */
      /* ═══════════════════════════════════════ */
      function TabLiquidaciones({ mes, anio }) {
        const [presentadas, setPresentadas] = useState({});

        useEffect(() => {
          setPresentadas(
            JSON.parse(
              localStorage.getItem("hgsp_liquidaciones_presentadas") || "{}",
            ),
          );
        }, [mes, anio]);

        function marcar(key) {
          const u = { ...presentadas, [key]: true };
          setPresentadas(u);
          localStorage.setItem(
            "hgsp_liquidaciones_presentadas",
            JSON.stringify(u),
          );
          showToast("✅ Liquidación marcada como presentada");
        }

        const sesiones = getData("hgsp_sesiones");
        const pacientes = getData("hgsp_pacientes");

        /* sesiones del mes, sin canceladas, con OS */
        const sesMes = sesiones.filter((s) => {
          const [y, m] = s.fecha.split("-").map(Number);
          return y === anio && m === mes && s.estado !== "cancelo";
        });

        /* agrupar por OS */
        const osMap = {};
        sesMes.forEach((s) => {
          const pac = pacientes.find((p) => p.id === s.pacienteId);
          if (!pac || pac.cobertura === "particular") return;
          const os = pac.obraSocial || "Sin especificar";
          if (!osMap[os]) osMap[os] = [];
          osMap[os].push({ s, pac });
        });

        const entries = Object.entries(osMap);

        if (!entries.length) {
          return (
            <div className="alert-info">
              Sin sesiones de Obra Social para {MESES_FULL[mes - 1]} {anio}.
            </div>
          );
        }

        return (
          <div>
            {entries.map(([os, items]) => {
              const key = `${anio}-${mes}-${os}`;
              const pres = !!presentadas[key];

              /* agrupar por paciente dentro de la OS */
              const porPac = Object.values(
                items.reduce((acc, { s, pac }) => {
                  if (!acc[pac.id]) acc[pac.id] = { pac, ses: [] };
                  acc[pac.id].ses.push(s);
                  return acc;
                }, {}),
              );

              const total = porPac.reduce(
                (sum, { pac, ses }) => sum + (pac.valorOrden || 0) * ses.length,
                0,
              );

              return (
                <div
                  key={os}
                  className="card"
                  style={{
                    marginBottom: "20px",
                    position: "relative",
                    overflow: "hidden",
                  }}
                >
                  {pres && (
                    <div
                      style={{
                        position: "absolute",
                        top: 0,
                        right: 0,
                        background: "#1E3D2B",
                        color: "#A8DDB8",
                        padding: "4px 14px",
                        borderRadius: "0 var(--r) 0 12px",
                        fontFamily: "var(--mono)",
                        fontSize: "10px",
                        fontWeight: 700,
                      }}
                    >
                      PRESENTADA
                    </div>
                  )}

                  {/* cabecera OS */}
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "12px",
                      marginBottom: "14px",
                    }}
                  >
                    <div
                      className="card-header-icon"
                      style={{
                        width: "38px",
                        height: "38px",
                        fontSize: "20px",
                      }}
                    >
                      🏥
                    </div>
                    <div>
                      <div
                        style={{
                          fontFamily: "var(--serif2)",
                          fontSize: "17px",
                          fontWeight: 700,
                          color: "var(--vd)",
                        }}
                      >
                        {os}
                      </div>
                      <div
                        style={{
                          fontFamily: "var(--mono)",
                          fontSize: "11px",
                          color: "var(--tx3)",
                        }}
                      >
                        {items.length} sesión{items.length !== 1 ? "es" : ""} ·{" "}
                        {MESES_FULL[mes - 1]} {anio}
                      </div>
                    </div>
                  </div>

                  {/* tabla */}
                  <div className="tbl-wrap">
                    <table className="tbl">
                      <thead>
                        <tr>
                          <th>Nº</th>
                          <th>Apellido y Nombre</th>
                          <th>Fechas</th>
                          <th style={{ textAlign: "center" }}>Cant.</th>
                          <th style={{ textAlign: "right" }}>$ Unitario</th>
                          <th style={{ textAlign: "right" }}>Subtotal</th>
                        </tr>
                      </thead>
                      <tbody>
                        {porPac.map(({ pac, ses }, idx) => {
                          const sub = (pac.valorOrden || 0) * ses.length;
                          return (
                            <tr key={pac.id}>
                              <td
                                style={{
                                  fontFamily: "var(--mono)",
                                  fontSize: "11px",
                                  color: "var(--tx3)",
                                }}
                              >
                                {idx + 1}
                              </td>
                              <td style={{ fontWeight: 600 }}>
                                {pac.apellido}, {pac.nombre}
                              </td>
                              <td
                                style={{
                                  fontFamily: "var(--mono)",
                                  fontSize: "11px",
                                  color: "var(--tx3)",
                                }}
                              >
                                {ses.map((s) => s.fecha.slice(8)).join(" · ")}
                              </td>
                              <td
                                style={{
                                  textAlign: "center",
                                  fontFamily: "var(--mono)",
                                }}
                              >
                                {ses.length}
                              </td>
                              <td
                                style={{
                                  textAlign: "right",
                                  fontFamily: "var(--mono)",
                                }}
                              >
                                ${(pac.valorOrden || 0).toLocaleString("es-AR")}
                              </td>
                              <td
                                style={{
                                  textAlign: "right",
                                  fontFamily: "var(--mono)",
                                  fontWeight: 700,
                                  color: "var(--vd)",
                                }}
                              >
                                ${sub.toLocaleString("es-AR")}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>

                  {/* pie */}
                  <div
                    style={{
                      display: "flex",
