      /* ═══════════════════════════════════════ */
      /* FASE 5 — TAB B: COBROS                 */
      /* ═══════════════════════════════════════ */
      function TabCobros({ mes, anio }) {
        const [cobros, setCobros] = useState([]);
        const [pacientes, setPacs] = useState([]);
        const [filtro, setFiltro] = useState("todos");
        const [modalConf, setModalConf] = useState(false);

        function load() {
          setCobros(getData("hgsp_cobros"));
          setPacs(getData("hgsp_pacientes"));
        }
        useEffect(() => {
          load();
        }, [mes, anio]);

        const cobrosMes = cobros.filter((c) => {
          const [y, m] = c.fecha.split("-").map(Number);
          return y === anio && m === mes;
        });

        const pendientes = cobrosMes.filter((c) => !c.cobrado);
        const filtered =
          filtro === "cobrados"
            ? cobrosMes.filter((c) => c.cobrado)
            : filtro === "pendientes"
              ? pendientes
              : cobrosMes;

        function cobrarUno(c) {
          const all = getData("hgsp_cobros");
          const i = all.findIndex((x) => x.id === c.id);
          if (i >= 0) all[i].cobrado = true;
          setData("hgsp_cobros", all);
          if (c.sesionId) {
            const ses = getData("hgsp_sesiones");
            const si = ses.findIndex((s) => s.id === c.sesionId);
            if (si >= 0) {
              ses[si].cobrado = true;
              ses[si].montoCobrado = c.monto;
              setData("hgsp_sesiones", ses);
            }
          }
          load();
          showToast("💰 Cobro registrado");
        }

        function cobrarTodo() {
          const allC = getData("hgsp_cobros");
          const allS = getData("hgsp_sesiones");
          pendientes.forEach((c) => {
            const i = allC.findIndex((x) => x.id === c.id);
            if (i >= 0) allC[i].cobrado = true;
            if (c.sesionId) {
              const si = allS.findIndex((s) => s.id === c.sesionId);
              if (si >= 0) {
                allS[si].cobrado = true;
                allS[si].montoCobrado = c.monto;
              }
            }
          });
          setData("hgsp_cobros", allC);
          setData("hgsp_sesiones", allS);
          load();
          setModalConf(false);
          showToast(
            `✅ ${pendientes.length} cobro${pendientes.length !== 1 ? "s" : ""} registrado${pendientes.length !== 1 ? "s" : ""}`,
          );
        }

        function getPac(id) {
          return pacientes.find((p) => p.id === id);
        }

        const totalCob = cobrosMes
          .filter((c) => c.cobrado)
          .reduce((s, c) => s + c.monto, 0);
        const totalPend = pendientes.reduce((s, c) => s + c.monto, 0);

        const CONC = {
          particular: "Particular",
          coseguro: "Coseguro OS",
          liquidacion: "Liquidación OS",
        };
        const METO = {
          efectivo: "Efectivo",
          transferencia: "Transferencia",
          obra_social: "Obra Social",
        };

        return (
          <div>
            <div
              className="stats-grid"
              style={{
                gridTemplateColumns: "repeat(3, 1fr)",
                marginBottom: "16px",
              }}
            >
              <StatCard
                label="Cobrado este mes"
                value={`$${totalCob.toLocaleString("es-AR")}`}
              />
              <StatCard
                label="Pendiente de cobro"
                value={`$${totalPend.toLocaleString("es-AR")}`}
              />
              <StatCard label="Total registros" value={cobrosMes.length} />
            </div>

            <div
              style={{
                display: "flex",
                gap: "10px",
                alignItems: "center",
                marginBottom: "14px",
                flexWrap: "wrap",
              }}
            >
              <div className="tabs-container">
                {[
                  ["todos", "Todos"],
                  ["cobrados", "Cobrados"],
                  ["pendientes", "Pendientes"],
                ].map(([v, l]) => (
                  <div
                    key={v}
                    className={`tab-item ${filtro === v ? "active" : ""}`}
                    onClick={() => setFiltro(v)}
                  >
                    {l}
                  </div>
                ))}
              </div>
              {pendientes.length > 0 && (
                <button
                  className="btn btn-g"
                  style={{ marginLeft: "auto" }}
                  onClick={() => setModalConf(true)}
                >
                  💰 Cobrar todo lo pendiente ({pendientes.length})
                </button>
              )}
            </div>

            <div className="tbl-wrap">
              <table className="tbl">
                <thead>
                  <tr>
                    <th>Fecha</th>
                    <th>Paciente</th>
                    <th>Concepto</th>
                    <th>Método</th>
                    <th style={{ textAlign: "right" }}>Monto</th>
                    <th>Estado</th>
                    <th>Acción</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 && (
                    <tr>
                      <td
                        colSpan={7}
                        style={{
                          textAlign: "center",
                          color: "var(--tx3)",
                          padding: "28px",
                        }}
                      >
                        Sin cobros para este período
                      </td>
                    </tr>
                  )}
                  {filtered.map((c) => {
                    const pac = getPac(c.pacienteId);
                    return (
                      <tr key={c.id}>
                        <td
                          style={{
                            fontFamily: "var(--mono)",
                            fontSize: "12px",
                          }}
                        >
                          {c.fecha}
                        </td>
                        <td style={{ fontWeight: 600 }}>
                          {pac ? `${pac.apellido}, ${pac.nombre}` : "—"}
                        </td>
                        <td>{CONC[c.concepto] || c.concepto}</td>
                        <td
                          style={{
                            fontFamily: "var(--mono)",
                            fontSize: "11px",
                            color: "var(--tx3)",
                          }}
                        >
                          {METO[c.metodoPago] || c.metodoPago}
                        </td>
                        <td
                          style={{
                            textAlign: "right",
                            fontFamily: "var(--mono)",
                            fontWeight: 700,
                            color: "var(--vd)",
                          }}
                        >
                          ${c.monto?.toLocaleString("es-AR")}
                        </td>
                        <td>
                          <Badge type={c.cobrado ? "ok" : "warn"}>
                            {c.cobrado ? "Cobrado" : "Pendiente"}
                          </Badge>
                        </td>
                        <td>
                          {!c.cobrado ? (
                            <button
                              className="btn btn-g"
                              style={{ padding: "4px 14px", fontSize: "11px" }}
                              onClick={() => cobrarUno(c)}
                            >
                              Cobrar
                            </button>
                          ) : (
                            <span
                              style={{
                                color: "var(--tx3)",
                                fontFamily: "var(--mono)",
                                fontSize: "12px",
                              }}
                            >
                              —
                            </span>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* modal confirmar cobro masivo */}
            {modalConf &&
              ReactDOM.createPortal(
                <div
                  className="modal-overlay"
                  onClick={(e) => {
                    if (e.target === e.currentTarget) setModalConf(false);
                  }}
                >
                  <div className="modal-card" style={{ maxWidth: "400px" }}>
                    <div className="modal-bar" />
                    <div className="modal-header">
                      <span className="modal-title">
                        Confirmar cobro masivo
                      </span>
                      <button
                        className="modal-close"
                        onClick={() => setModalConf(false)}
                      >
                        ✕
                      </button>
                    </div>
                    <div className="modal-body">
                      <div
                        className="alert-warn"
                        style={{ marginBottom: "16px" }}
                      >
                        ⚠️ Se marcarán {pendientes.length} cobros como cobrados
                      </div>
                      <p
                        style={{
                          color: "rgba(255,255,255,.7)",
                          marginBottom: "20px",
                        }}
                      >
                        Total a registrar:{" "}
                        <strong
                          style={{
                            color: "var(--do)",
                            fontFamily: "var(--mono)",
                          }}
                        >
                          ${totalPend.toLocaleString("es-AR")}
                        </strong>
                      </p>
                      <div
                        style={{
                          display: "flex",
                          gap: "10px",
                          justifyContent: "flex-end",
                        }}
                      >
                        <button
                          className="btn btn-sec"
                          onClick={() => setModalConf(false)}
                        >
                          Cancelar
                        </button>
                        <button className="btn btn-g" onClick={cobrarTodo}>
                          Confirmar
                        </button>
                      </div>
                    </div>
                  </div>
                </div>,
                document.body,
              )}
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* FASE 5 — TAB C: DASHBOARD              */
      /* ═══════════════════════════════════════ */
      function TabDashboard({ mes, anio }) {
        const cobros = getData("hgsp_cobros");
        const sesiones = getData("hgsp_sesiones");
        const pacientes = getData("hgsp_pacientes");

        /* stats del mes seleccionado */
        function enMes(fecha) {
          const [y, m] = fecha.split("-").map(Number);
          return y === anio && m === mes;
        }
        const cobrosMes = cobros.filter((c) => enMes(c.fecha));
        const sesMes = sesiones.filter((s) => enMes(s.fecha));

        const totalFact = cobrosMes.reduce((s, c) => s + c.monto, 0);
        const totalCob = cobrosMes
          .filter((c) => c.cobrado)
          .reduce((s, c) => s + c.monto, 0);
        const totalPend = cobrosMes
          .filter((c) => !c.cobrado)
          .reduce((s, c) => s + c.monto, 0);

        /* últimos 6 meses para barras */
        const base = new Date(anio, mes - 1, 1);
        const last6 = Array.from({ length: 6 }, (_, i) => {
          const d = new Date(base.getFullYear(), base.getMonth() - (5 - i), 1);
          const y = d.getFullYear(),
            m = d.getMonth() + 1;
          const mc = cobros.filter((c) => {
            const [cy, cm] = c.fecha.split("-").map(Number);
            return cy === y && cm === m && c.cobrado;
          });
          return {
            label: `${MESES_CORTO[d.getMonth()]} ${y}`,
            os: mc
              .filter(
                (c) =>
                  c.concepto === "coseguro" || c.concepto === "liquidacion",
              )
              .reduce((s, c) => s + c.monto, 0),
            part: mc
              .filter((c) => c.concepto === "particular")
              .reduce((s, c) => s + c.monto, 0),
          };
        });

        /* distribución por origen para torta */
        const dist = {};
        cobrosMes
          .filter((c) => c.cobrado)
          .forEach((c) => {
            const pac = pacientes.find((p) => p.id === c.pacienteId);
            const lbl =
              !pac || pac.cobertura === "particular"
                ? "Particulares"
                : pac.obraSocial || "Obra Social";
            dist[lbl] = (dist[lbl] || 0) + c.monto;
          });

        return (
          <div>
            <div className="stats-grid" style={{ marginBottom: "24px" }}>
              <StatCard
                label="Facturado este mes"
                value={`$${totalFact.toLocaleString("es-AR")}`}
              />
              <StatCard
                label="Total cobrado"
                value={`$${totalCob.toLocaleString("es-AR")}`}
              />
              <StatCard
                label="Pendiente de cobro"
                value={`$${totalPend.toLocaleString("es-AR")}`}
              />
              <StatCard label="Sesiones del mes" value={sesMes.length} />
            </div>

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "1fr 1fr",
                gap: "20px",
              }}
            >
              {/* Barras */}
              <div className="card" style={{ margin: 0 }}>
                <div className="card-header">
                  <div className="card-header-icon">📊</div>
                  <div className="card-header-title">
                    Ingresos últimos 6 meses
                  </div>
                </div>
                {typeof Chart !== "undefined" ? (
                  <ChartBarras
                    meses={last6.map((x) => x.label)}
                    osData={last6.map((x) => x.os)}
                    partData={last6.map((x) => x.part)}
                  />
                ) : (
                  <div
                    style={{
                      color: "var(--tx3)",
                      padding: "40px",
                      textAlign: "center",
                    }}
                  >
                    Cargando Chart.js…
                  </div>
                )}
                <div
                  style={{
                    display: "flex",
                    gap: "14px",
                    marginTop: "10px",
                    fontFamily: "var(--mono)",
                    fontSize: "10px",
                    color: "var(--tx3)",
                  }}
                >
                  <span
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "5px",
                    }}
                  >
                    <span
                      style={{
                        width: "10px",
                        height: "10px",
                        background: "#2D5A3D",
                        borderRadius: "2px",
                        display: "inline-block",
                      }}
                    />
                    OS / Coseguro
                  </span>
                  <span
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "5px",
                    }}
                  >
                    <span
                      style={{
                        width: "10px",
                        height: "10px",
                        background: "#C8922A",
                        borderRadius: "2px",
                        display: "inline-block",
                      }}
                    />
                    Particulares
                  </span>
                </div>
              </div>

              {/* Torta */}
              <div className="card" style={{ margin: 0 }}>
                <div className="card-header">
                  <div className="card-header-icon">🥧</div>
                  <div className="card-header-title">
                    Distribución por origen
                  </div>
                </div>
                {typeof Chart !== "undefined" ? (
                  Object.keys(dist).length > 0 ? (
                    <ChartTorta
                      labels={Object.keys(dist)}
                      valores={Object.values(dist)}
                    />
                  ) : (
                    <div
                      style={{
                        color: "var(--tx3)",
                        padding: "40px",
                        textAlign: "center",
                      }}
                    >
                      Sin cobros registrados este mes
                    </div>
                  )
                ) : (
                  <div
                    style={{
                      color: "var(--tx3)",
                      padding: "40px",
                      textAlign: "center",
                    }}
                  >
                    Cargando Chart.js…
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      /* ═══════════════════════════════════════ */
      /* GENERADOR EXCEL ASPURC (ExcelJS)       */
      /* ═══════════════════════════════════════ */
      async function generarExcelASPURC(paciente, mes, anio, sesionesAT) {
        if (typeof ExcelJS === "undefined") {
          showToast("❌ ExcelJS no cargado. Verificá conexión.");
          return;
        }
        const cfg = getData("hgsp_config");
        const wb = new ExcelJS.Workbook();
        wb.creator = "Plataforma Clínica";
        const ws = wb.addWorksheet("Asistencia");

        /* columnas */
        ws.columns = [
          { key: "A", width: 12 },
          { key: "B", width: 7 },
          { key: "C", width: 7 },
          { key: "D", width: 22 },
          { key: "E", width: 22 },
          { key: "F", width: 9 },
          { key: "G", width: 28 },
          { key: "H", width: 18 },
        ];

        /* helpers de estilo */
        const azulOscuro = {
          type: "pattern",
          pattern: "solid",
          fgColor: { argb: "FF1F3864" },
        };
        const amarillo = {
          type: "pattern",
          pattern: "solid",
          fgColor: { argb: "FFFFFF00" },
        };
        const verdeClaro = {
          type: "pattern",
          pattern: "solid",
          fgColor: { argb: "FFC6EFCE" },
        };
        const naranjaCl = {
          type: "pattern",
          pattern: "solid",
          fgColor: { argb: "FFFCD5B4" },
        };
        const thin = { style: "thin", color: { argb: "FF000000" } };
        const borde = { top: thin, left: thin, bottom: thin, right: thin };
        const fBlancoBold = {
          name: "Arial",
          bold: true,
          color: { argb: "FFFFFFFF" },
          size: 10,
        };
        const fBlanco = {
          name: "Arial",
          color: { argb: "FFFFFFFF" },
          size: 10,
        };
        const fNormal = { name: "Arial", size: 9 };
        const fBold = { name: "Arial", bold: true, size: 9 };
        const cCenter = { horizontal: "center", vertical: "middle" };
        const cLeft = { horizontal: "left", vertical: "middle" };
        const cRight = { horizontal: "right", vertical: "middle" };

        function styleRow(row, from, to, font, fill, align) {
          for (let c = from; c <= to; c++) {
            const cell = row.getCell(c);
            if (font) cell.font = font;
            if (fill) cell.fill = fill;
            if (align) cell.alignment = align;
            cell.border = borde;
          }
        }

        const diasEnMes = new Date(anio, mes, 0).getDate();
        const mesCorto = [
          "",
          "ene",
          "feb",
          "mar",
          "abr",
          "may",
          "jun",
          "jul",
          "ago",
          "sep",
          "oct",
          "nov",
          "dic",
        ][mes];
        const yearShort = String(anio).slice(2);
        const mesNombre = MESES_FULL[mes - 1];
        const feriadoMap = getFeriadoSet(getData("hgsp_feriados_extra"));

        /* FILA 1: Título + OS */
        const r1 = ws.addRow([]);
        r1.height = 28;
        ws.mergeCells("A1:F1");
        ws.mergeCells("G1:H1");
        const c1 = ws.getCell("A1");
        c1.value =
          "PLANILLA DE ASIST. DIARIA - REHABILITACIÓN -Acomp. Terapeutico";
        c1.font = fBlancoBold;
        c1.fill = azulOscuro;
        c1.alignment = cCenter;
        c1.border = borde;
        const c1os = ws.getCell("G1");
        c1os.value = paciente.obraSocial || "OBRA SOCIAL";
        c1os.font = fBlancoBold;
        c1os.fill = azulOscuro;
        c1os.alignment = cCenter;
        c1os.border = borde;

        /* FILA 2: Prestador */
        const r2 = ws.addRow([]);
        r2.height = 18;
        ws.mergeCells("A2:B2");
        ws.mergeCells("C2:D2");
        ws.mergeCells("E2:F2");
        ws.mergeCells("G2:H2");
        ws.getCell("A2").value = "Prestador:";
        ws.getCell("A2").font = fBold;
        ws.getCell("C2").value = cfg.prestador || "Lic. Stagni Hernán Gabriel";
        ws.getCell("C2").font = fNormal;
        ws.getCell("E2").value =
          `Especialidad: ${cfg.especialidad || "Psicología"}`;
        ws.getCell("E2").font = fNormal;
        ws.getCell("G2").value = `Matrícula: ${cfg.mp || "11919"}`;
        ws.getCell("G2").alignment = cRight;
        ws.getCell("G2").font = fNormal;
        styleRow(r2, 1, 8, null, null, cLeft);

        /* FILA 3: CUIT + Dirección */
        const r3 = ws.addRow([]);
        r3.height = 18;
        ws.mergeCells("A3:B3");
        ws.mergeCells("C3:D3");
        ws.mergeCells("E3:H3");
        ws.getCell("A3").value = "CUIT:";
        ws.getCell("A3").font = fBold;
        ws.getCell("C3").value = cfg.cuit || "20.24521983.1";
        ws.getCell("C3").font = fNormal;

        ws.getCell("D6").font = fBold;
        ws.getCell("E6").value = "Hora de Egreso";
        ws.getCell("E6").font = fBold;
        ws.getCell("F6").value = "Hs.";
        ws.getCell("F6").font = fBold;
        ws.getCell("G6").value = "Firma Titular/Respons.";
        ws.getCell("G6").font = fBold;
        ws.getCell("H6").value = "Obs./Dx.";
        ws.getCell("H6").font = fBold;
        styleRow(r6, 1, 8, null, null, cCenter);

        /* Mapa de sesiones por fecha */
        const sesMap = {};
        sesionesAT.forEach((s) => {
          sesMap[s.fecha] = s;
        });

        /* FILAS DE DATOS */
        for (let day = 1; day <= diasEnMes; day++) {
          const dt = new Date(anio, mes - 1, day);
          const ds = dateStr(dt);
          const dow = dt.getDay(); // 0=dom
          const esFeriado = !!feriadoMap[ds];
          const esDomingo = dow === 0;
          const ses = sesMap[ds];

          const ingreso = ses ? ses.horaInicio : "";
          const egreso = ses ? ses.horaFin : "";
          let horas = "";
          if (ses && ingreso && egreso) {
            const [ih, im] = ingreso.split(":").map(Number);
            const [fh, fm] = egreso.split(":").map(Number);
            horas = (fh * 60 + fm - (ih * 60 + im)) / 60;
          }
          const obs = esFeriado
            ? feriadoMap[ds].nombre || "FERIADO"
            : ses?.notas || "";

          const rowData = ws.addRow([
            day,
            String(mes).padStart(2, "0"),
            yearShort,
            ingreso,
            egreso,
            horas || "",
            "",
            obs,
          ]);
          rowData.height = 15;
          ws.mergeCells(`A${rowData.number}:C${rowData.number}`);
          ws.getCell(`A${rowData.number}`).value = day;

          let fill = null;
          if (esFeriado || esDomingo) fill = naranjaCl;
          for (let c = 1; c <= 8; c++) {
            const cell = rowData.getCell(c);
            cell.alignment = cCenter;
            cell.border = borde;
            cell.font = fNormal;
            if (fill) cell.fill = fill;
          }
          if (typeof horas === "number" && horas > 0) {
            rowData.getCell(6).numFmt = "0.00";
          }
        }

        /* FILA TOTAL */
        const totalRow = ws.addRow([]);
        totalRow.height = 18;
        const tRowNum = totalRow.number;
        ws.mergeCells(`A${tRowNum}:E${tRowNum}`);
        ws.getCell(`A${tRowNum}`).value = "TOTAL HORAS";
        ws.getCell(`A${tRowNum}`).font = {
          name: "Arial",
          bold: true,
          size: 10,
        };
        ws.getCell(`A${tRowNum}`).alignment = cRight;
        ws.getCell(`F${tRowNum}`).value = {
          formula: `SUM(F7:F${tRowNum - 1})`,
        };
        ws.getCell(`F${tRowNum}`).font = {
          name: "Arial",
          bold: true,
          size: 11,
        };
        ws.getCell(`F${tRowNum}`).numFmt = "0.00";
        ws.getCell(`F${tRowNum}`).alignment = cCenter;
        for (let c = 1; c <= 8; c++) totalRow.getCell(c).border = borde;

        /* NOTAS AL PIE */
        const notas = [
          "Las firmas deberán estar consignadas en c/u de los días asistidos. De ser un tercero deberá acreditarse el vínculo.",
          "La sesiones deben ser individualizadas, en caso contrario el familiar deber denunciar a la Obra Social.",
          "Los débitos realizados en relación a la falta de datos en las planillas de asistencias no serán acreditados. Sin excepción.",
        ];
        notas.forEach((nota, i) => {
          const nr = ws.addRow([nota]);
          ws.mergeCells(`A${nr.number}:H${nr.number}`);
          ws.getCell(`A${nr.number}`).font = {
            name: "Arial",
            size: 8,
            italic: true,
          };
          ws.getCell(`A${nr.number}`).alignment = cLeft;
        });

        /* Configuración de impresión A4 horizontal */
        ws.pageSetup.orientation = "landscape";
        ws.pageSetup.paperSize = 9;
        ws.pageSetup.fitToWidth = 1;
        ws.pageSetup.fitToHeight = 1;

        /* Generar y descargar */
        const buffer = await wb.xlsx.writeBuffer();
        const blob = new Blob([buffer], {
          type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Planilla_AT_${paciente.apellido}_${mesNombre}_${anio}.xlsx`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("📊 Planilla Excel descargada");
      }

      /* MÓDULO 4: PLANILLAS AT                 */

      function SeccionPlanillasAT() {
        const hoy = new Date();
        const [mes, setMes] = useState(hoy.getMonth() + 1);
        const [anio, setAnio] = useState(hoy.getFullYear());
        const [pacId, setPacId] = useState("");
        const [sesiones, setSesiones] = useState([]);
        const [pacientes, setPacientes] = useState([]);
        const [showPrint, setShowPrint] = useState(false);

        useEffect(() => {
          const pacs = getData("hgsp_pacientes").filter(
            (p) => p.activo && (p.tipo === "AT" || p.tipo === "ambos"),
          );
          setPacientes(pacs);
          if (pacs.length > 0 && !pacId) setPacId(pacs[0].id);
          setSesiones(getData("hgsp_sesiones"));
        }, []);

        const pacAT = pacientes;
        const pacSel = pacientes.find((p) => p.id === pacId);

        /* sesiones del mes seleccionado para este paciente (tipo AT, no canceladas) */
        const filas = sesiones
          .filter(
            (s) =>
              s.pacienteId === pacId &&
              s.tipo === "AT" &&
              s.estado !== "cancelo" &&
              new Date(s.fecha + "T12:00").getMonth() + 1 === mes &&
              new Date(s.fecha + "T12:00").getFullYear() === anio,
          )
          .sort((a, b) => a.fecha.localeCompare(b.fecha));

        function calcHoras(ini, fin) {
          const [ih, im] = ini.split(":").map(Number);
          const [fh, fm] = fin.split(":").map(Number);
          return (fh * 60 + fm - (ih * 60 + im)) / 60;
        }
        const totalHoras = filas.reduce(
          (s, f) => s + calcHoras(f.horaInicio, f.horaFin),
          0,
        );

        /* badge estado */
        const mesActual =
          hoy.getMonth() + 1 === mes && hoy.getFullYear() === anio;
        const badgeEstado =
          filas.length === 0
            ? { l: "Sin iniciar", t: "warn" }
            : mesActual
              ? { l: "En curso", t: "ok" }
              : { l: "Completa", t: "ok" };

        /* toggle observación firmado */
        function toggleFirmado(id) {
          const all = getData("hgsp_sesiones");
          const idx = all.findIndex((s) => s.id === id);
          if (idx >= 0) {
            all[idx].firmado = !all[idx].firmado;
            setData("hgsp_sesiones", all);
          }
          setSesiones(getData("hgsp_sesiones"));
        }
        function updateObs(id, val) {
          const all = getData("hgsp_sesiones");
          const idx = all.findIndex((s) => s.id === id);
          if (idx >= 0) {
            all[idx].observacion = val;
            setData("hgsp_sesiones", all);
          }
          setSesiones(getData("hgsp_sesiones"));

          new Date(d + "T12:00").toLocaleDateString("es-AR", {
            weekday: "long",
          });

        /* ── Stats ── */
        const allAT = sesiones.filter(
          (s) => s.tipo === "AT" && s.pacienteId === pacId,

        const horasMes = filas.reduce(

        const pacsTotales = pacAT.length;
        const firmadasMes = filas.filter((f) => f.firmado).length;

        return (

      const GASTO_CATS = [
        {
          id: "Casa",
          icon: "🏠",
          conceptos: [
            "Alquiler",
            "Expensas",
            "Luz",
            "Gas",
            "Cochera",
            "Internet",
            "Personal",
          ],
        },
        { id: "Salud", icon: "💊", conceptos: ["Jer.Salud", "Prepaga"] },
        {
          id: "Consultorio",
          icon: "🏢",
          conceptos: ["Alquiler", "Internet", "Luz"],
        },
        {
          id: "Profesional",
          icon: "📚",
          conceptos: ["CPPC", "CPPS", "Terapia"],
        },
        {
          id: "Transporte",
          icon: "🏍️",
          conceptos: ["Seguro moto", "Patente", "Nafta"],
        },
        {
          id: "Vida",
          icon: "🛒",
          conceptos: ["Supermercado", "Verdulería", "Varios"],
        },
        { id: "Otros", icon: "✏️", conceptos: [] },
      ];

      function SeccionGastos() {
        const hoy = new Date();
        const [mes, setMes] = useState(hoy.getMonth() + 1);
        const [anio, setAnio] = useState(hoy.getFullYear());
        const [gastos, setGastos] = useState([]);
        const [newConcepto, setNewConcepto] = useState({});

        useEffect(() => {
          setGastos(getData("hgsp_gastos"));
        }, []);

        function reload() {
          setGastos(getData("hgsp_gastos"));
        }

        const del_mes = gastos.filter((g) => g.mes === mes && g.anio === anio);

        /* actualizar campo de un gasto */
        function upd(id, campo, valor) {
          const all = getData("hgsp_gastos");
          const idx = all.findIndex((g) => g.id === id);
          if (idx < 0) return;
          all[idx][campo] = valor;
          setData("hgsp_gastos", all);
          reload();
        }

        /* agregar fila */
        function addFila(cat) {
          const concepto = (newConcepto[cat] || "").trim();
          if (!concepto) {
            showToast("⚠️ Ingresá un concepto");
            return;
          }
          const all = getData("hgsp_gastos");
          all.push({
            id: genId(),
            mes,
            anio,
            categoria: cat,
            concepto,
            montoEstimado: 0,
            montoReal: 0,
            pagado: false,
          });
          setData("hgsp_gastos", all);
          setNewConcepto((prev) => ({ ...prev, [cat]: "" }));
          reload();
        }

        /* eliminar fila */
        function delFila(id) {
          setData(
            "hgsp_gastos",
            getData("hgsp_gastos").filter((g) => g.id !== id),
          );
          reload();
        }

        /* copiar mes anterior */
        function copiarMesAnterior() {
          const mesAnt = mes === 1 ? 12 : mes - 1;
          const anioAnt = mes === 1 ? anio - 1 : anio;
          const anterior = getData("hgsp_gastos").filter(
            (g) => g.mes === mesAnt && g.anio === anioAnt,
          );
          if (anterior.length === 0) {
            showToast("⚠️ No hay gastos en el mes anterior");
            return;
          }
          const all = getData("hgsp_gastos");
          anterior.forEach((g) => {
            const yaExiste = all.some(
              (x) =>
                x.mes === mes &&
                x.anio === anio &&
                x.categoria === g.categoria &&
                x.concepto === g.concepto,
            );
            if (!yaExiste)
              all.push({
                ...g,
                id: genId(),
                mes,
                anio,
                montoReal: 0,
                pagado: false,
              });
          });
          setData("hgsp_gastos", all);
          reload();
          showToast("✅ Estructura del mes anterior copiada");
        }

        /* totales */
        const totEst = del_mes.reduce(
          (s, g) => s + (Number(g.montoEstimado) || 0),
          0,
        );
        const totReal = del_mes.reduce(
          (s, g) => s + (Number(g.montoReal) || 0),
          0,
        );
        const dif = totEst - totReal;

        /* ingresos del mes (cobros) */
        const cobros = getData("hgsp_cobros");
        const ingrMes = cobros
          .filter((c) => {
            const d = new Date(c.fecha + "T12:00");
            return (
              d.getMonth() + 1 === mes && d.getFullYear() === anio && c.cobrado
            );
          })
          .reduce((s, c) => s + (Number(c.monto) || 0), 0);
        const saldo = ingrMes - totReal;

        const MESES_LABEL = [
          "Enero",
          "Febrero",
          "Marzo",
          "Abril",
          "Mayo",
          "Junio",
          "Julio",
          "Agosto",
          "Septiembre",
          "Octubre",
          "Noviembre",
          "Diciembre",
        ];

        function fmtARS(n) {
          return "$" + Number(n || 0).toLocaleString("es-AR");
        }

        return (
          <div>
            <div className="page-header">
              <div className="page-header-icon">📊</div>
              <div>
                <div className="page-header-title">Gastos Mensuales</div>
                <div className="page-header-sub">
                  Control por categoría — estimado vs real
                </div>
              </div>
            </div>

            {/* STATS */}
            <div className="stats-grid">
              <StatCard label="Total estimado" value={fmtARS(totEst)} />
              <StatCard label="Total real" value={fmtARS(totReal)} />
              <StatCard
                label={dif >= 0 ? "Ahorro" : "Exceso"}
                value={fmtARS(Math.abs(dif))}
              />
              <StatCard
                label="Sin pagar"
                value={del_mes.filter((g) => !g.pagado).length}
              />
            </div>

            {/* TOOLBAR */}
            <div
              style={{
                display: "flex",
                gap: "10px",
                alignItems: "center",
                marginBottom: "20px",
                flexWrap: "wrap",
              }}
            >
              <select
                className="input-base"
                style={{ fontFamily: "var(--mono)" }}
                value={mes}
                onChange={(e) => setMes(Number(e.target.value))}
              >
                {MESES_LABEL.map((l, i) => (
                  <option key={i + 1} value={i + 1}>
                    {l}
                  </option>
                ))}
              </select>
              <select
                className="input-base"
                style={{ fontFamily: "var(--mono)", width: "90px" }}
                value={anio}
                onChange={(e) => setAnio(Number(e.target.value))}
              >
                {[anio - 1, anio, anio + 1].map((y) => (
                  <option key={y} value={y}>
                    {y}
                  </option>
                ))}
              </select>
              <button className="btn btn-sec" onClick={copiarMesAnterior}>
                📋 Copiar mes anterior
              </button>
            </div>

            {/* PANEL SALDO */}
            <div
              style={{
                background: saldo >= 0 ? "#EEF5F0" : "#FFF0EC",
                border: `2px solid ${saldo >= 0 ? "var(--vm)" : "#F97316"}`,
                borderRadius: "var(--r)",
                padding: "18px 22px",
                marginBottom: "20px",
                display: "flex",
                gap: "30px",
                flexWrap: "wrap",
                alignItems: "center",
              }}
            >
              <div>
                <div
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: "10px",
                    textTransform: "uppercase",
                    color: "var(--tx3)",
                    marginBottom: "4px",
                  }}
                >
                  Ingresos del mes
                </div>
                <div
                  style={{
                    fontFamily: "var(--data)",
                    fontSize: "22px",
                    fontWeight: 700,
                    color: "var(--vd)",
                  }}
                >
                  {fmtARS(ingrMes)}
                </div>
              </div>
              <div style={{ fontSize: "20px", color: "var(--tx3)" }}>−</div>
              <div>
                <div
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: "10px",
                    textTransform: "uppercase",
                    color: "var(--tx3)",
                    marginBottom: "4px",
                  }}
                >
                  Gastos reales
                </div>
                <div
                  style={{
                    fontFamily: "var(--data)",
                    fontSize: "22px",
                    fontWeight: 700,
                    color: "var(--vd)",
                  }}
                >
                  {fmtARS(totReal)}
                </div>
              </div>
              <div style={{ fontSize: "20px", color: "var(--tx3)" }}>=</div>
              <div>
                <div
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: "10px",
                    textTransform: "uppercase",
                    color: "var(--tx3)",
                    marginBottom: "4px",
                  }}
                >
                  Saldo neto
                </div>
                <div
                  style={{
                    fontFamily: "var(--data)",
                    fontSize: "26px",
                    fontWeight: 700,
                    color: saldo >= 0 ? "#1E5C30" : "#C0392B",
                  }}
                >
                  {saldo >= 0 ? "+" : ""}
                  {fmtARS(saldo)}
                </div>
              </div>
            </div>

            {/* CATEGORÍAS */}
            {GASTO_CATS.map((cat) => {
              const filas = del_mes.filter((g) => g.categoria === cat.id);
              const catEst = filas.reduce(
                (s, g) => s + (Number(g.montoEstimado) || 0),
                0,
              );
              const catReal = filas.reduce(
                (s, g) => s + (Number(g.montoReal) || 0),
                0,
              );
              return (
                <div
                  key={cat.id}
                  className="card"
                  style={{ padding: 0, marginBottom: "14px" }}
                >
                  {/* Header categoría */}
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "space-between",
                      padding: "14px 20px",
                      borderBottom: "1px solid var(--crb)",
                    }}
                  >
                    <div
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: "10px",
                      }}
                    >
                      <span style={{ fontSize: "18px" }}>{cat.icon}</span>
                      <span
                        style={{
                          fontFamily: "var(--serif2)",
                          fontWeight: 700,
                          fontSize: "15px",
                          color: "var(--vd)",
                        }}
                      >
                        {cat.id}
                      </span>
                    </div>
                    <div
                      style={{
                        display: "flex",
                        gap: "20px",
                        fontFamily: "var(--mono)",
                        fontSize: "12px",
                      }}
                    >
                      <span style={{ color: "var(--tx3)" }}>
                        Est:{" "}
                        <strong style={{ color: "var(--tx)" }}>
                          {fmtARS(catEst)}
                        </strong>
                      </span>
                      <span style={{ color: "var(--tx3)" }}>
                        Real:{" "}
                        <strong
                          style={{
                            color: catReal > catEst ? "#C0392B" : "var(--vd)",
                          }}
                        >
                          {fmtARS(catReal)}
                        </strong>
                      </span>
                    </div>
                  </div>
                  {/* Filas */}
                  {filas.length > 0 && (
                    <table className="tbl" style={{ width: "100%" }}>
                      <thead>
                        <tr>
                          <th>Concepto</th>
                          <th>Estimado $</th>
                          <th>Real $</th>
                          <th>Pagado</th>
                          <th></th>
                        </tr>
                      </thead>
                      <tbody>
                        {filas.map((g) => (
                          <tr
                            key={g.id}
                            style={{ opacity: g.pagado ? 0.65 : 1 }}
                          >
                            <td
                              style={{
                                textDecoration: g.pagado
                                  ? "line-through"
                                  : "none",
                              }}
                            >
                              {g.concepto}
                            </td>
                            <td>
                              <input
                                type="number"
                                style={{
                                  border: "none",
                                  background: "transparent",
                                  fontFamily: "var(--mono)",
                                  fontSize: "13px",
                                  width: "110px",
                                  color: "var(--tx)",
                                  outline: "none",
                                  textAlign: "right",
                                }}
                                defaultValue={g.montoEstimado || ""}
                                onBlur={(e) =>
                                  upd(
                                    g.id,
                                    "montoEstimado",
                                    Number(e.target.value),
                                  )
                                }
                                placeholder="0"
                              />
                            </td>
                            <td>
                              <input
                                type="number"
                                style={{
                                  border: "none",
                                  background: "transparent",
                                  fontFamily: "var(--mono)",
                                  fontSize: "13px",
                                  width: "110px",
                                  color:
                                    Number(g.montoReal) >
                                    Number(g.montoEstimado)
                                      ? "#C0392B"
                                      : "var(--tx)",
                                  outline: "none",
                                  textAlign: "right",
                                }}
                                defaultValue={g.montoReal || ""}
                                onBlur={(e) =>
                                  upd(g.id, "montoReal", Number(e.target.value))
                                }
                                placeholder="0"
                              />
                            </td>
                            <td style={{ textAlign: "center" }}>
                              <div
                                className="chk-wrap"
                                onClick={() => upd(g.id, "pagado", !g.pagado)}

                                <div
                                  className={`chk-box ${g.pagado ? "chk-on" : ""}`}
                                >
                                  {g.pagado ? "✓" : ""}
                                </div>
                              </div>
                            </td>
                            <td style={{ textAlign: "center" }}>
                              <span
                                className="act-link"
                                style={{ color: "#C0392B", fontSize: "14px" }}
                                onClick={() => delFila(g.id)}

                                ✕
                              </span>

                  {/* Agregar fila */}
                  <div
                    style={{
                      display: "flex",
                      gap: "8px",

                        filas.length > 0 ? "1px solid var(--crb)" : "none",
                    }}
                  >
                    <input
                      className="input-base"
                      style={{ flex: 1, fontSize: "12px", padding: "6px 14px" }}
                      placeholder={`Nuevo concepto en ${cat.id}...`}
                      value={newConcepto[cat.id] || ""}
                      onChange={(e) =>
                        setNewConcepto((prev) => ({
                          ...prev,
                          [cat.id]: e.target.value,
                        }))
                      }
                      onKeyDown={(e) => e.key === "Enter" && addFila(cat.id)}
                    />
                    <button
                      className="btn btn-p"
                      style={{ fontSize: "12px", padding: "6px 14px" }}
                      onClick={() => addFila(cat.id)}
                    >
                      + Agregar
                    </button>
                  </div>
                </div>
              );
            })}

            {/* TOTALES */}
            <div
              className="card"
              style={{ background: "var(--vd)", borderColor: "var(--vm)" }}
            >
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(3,1fr)",
                  gap: "20px",
                }}
              >
                {[
                  {
                    l: "Total estimado",
                    v: fmtARS(totEst),
                    c: "rgba(255,255,255,.7)",
                  },
                  {
                    l: "Total real",
                    v: fmtARS(totReal),
                    c: "rgba(255,255,255,.7)",
                  },
                  {
                    l: dif >= 0 ? "Ahorro del mes" : "Exceso del mes",
                    v: (dif >= 0 ? "+" : "") + fmtARS(dif),
                    c: dif >= 0 ? "#7DCC90" : "#F97316",
                  },
                ].map((x) => (
                  <div key={x.l}>
                    <div
                      style={{
                        fontFamily: "var(--mono)",

                      {x.v}
                    </div>

                ))}

            </div>
          </div>
        );
      }

      /* MÓDULO 6: EVENTOS Y RECORDATORIOS     */
      /* ═══════════════════════════════════════ */
      function SeccionEventos() {
        const hoy = new Date().toISOString().slice(0, 10);
        const [eventos, setEventos] = useState([]);
        const [filtro, setFiltro] = useState("pendientes");
        const [form, setForm] = useState({
          descripcion: "",
          fecha: "",
          hora: "09:00",
        });

        useEffect(() => {
          setEventos(getData("hgsp_eventos"));
        }, []);
        function reload() {
          setEventos(getData("hgsp_eventos"));
        }

        function agregar() {
          if (!form.descripcion.trim()) {
            showToast("⚠️ Ingresá una descripción");
            return;
          }
          if (!form.fecha) {
            showToast("⚠️ Ingresá la fecha");
            return;
          }
          const all = getData("hgsp_eventos");
          all.push({
            id: genId(),
            descripcion: form.descripcion.trim(),
            fecha: form.fecha,
            hora: form.hora,
            estado: "pendiente",
          });
          setData("hgsp_eventos", all);
          setForm({ descripcion: "", fecha: "", hora: "09:00" });
          reload();
          showToast("📌 Evento agregado");
        }

        function resolver(id) {
          const all = getData("hgsp_eventos");
          const idx = all.findIndex((e) => e.id === id);
          if (idx >= 0) {
            all[idx].estado = "resuelto";
            setData("hgsp_eventos", all);
          }
          reload();
          showToast("✅ Evento marcado como resuelto");
        }

        function eliminar(id) {
          setData(
            "hgsp_eventos",
            getData("hgsp_eventos").filter((e) => e.id !== id),
          );
          reload();
        }

        /* Ordenar: pendientes por fecha asc, resueltos al fondo */
        const pendientes = [
          ...eventos.filter((e) => e.estado === "pendiente"),
        ].sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));
        const resueltos = [
          ...eventos.filter((e) => e.estado === "resuelto"),
        ].sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));

        const visible =
          filtro === "pendientes"
            ? pendientes
            : filtro === "resueltos"
              ? resueltos
              : [...pendientes, ...resueltos];

        function esVencido(e) {
          return e.estado === "pendiente" && e.fecha < hoy;
        }

        return (
          <div>
            <div className="page-header">
              <div className="page-header-icon">🔔</div>
              <div>
                <div className="page-header-title">Eventos y Recordatorios</div>
                <div className="page-header-sub">
                  Lista cronológica — pendientes, vencidos y resueltos
                </div>
              </div>
            </div>

            {/* STATS */}
            <div className="stats-grid">
              <StatCard label="Pendientes" value={pendientes.length} />
              <StatCard
                label="Vencidos"
                value={pendientes.filter((e) => e.fecha < hoy).length}
              />
              <StatCard label="Resueltos" value={resueltos.length} />
              <StatCard label="Total" value={eventos.length} />
            </div>

            {/* FORMULARIO INLINE */}
            <div className="card" style={{ marginBottom: "20px" }}>
              <div className="card-header">
                <div className="card-header-icon">➕</div>
                <div className="card-header-title">Nuevo evento</div>
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr auto auto auto",
                  gap: "10px",
                  alignItems: "center",
                }}
              >
                <input
                  className="input-base"
                  placeholder="Descripción del evento..."
                  value={form.descripcion}
                  onChange={(e) =>
                    setForm((p) => ({ ...p, descripcion: e.target.value }))
                  }
                  onKeyDown={(e) => e.key === "Enter" && agregar()}
                />
                <input
                  className="input-base"
                  type="date"
                  style={{ fontFamily: "var(--mono)", width: "155px" }}
                  value={form.fecha}
                  onChange={(e) =>
                    setForm((p) => ({ ...p, fecha: e.target.value }))
                  }
                />
                <input
                  className="input-base"
                  type="time"
                  style={{ fontFamily: "var(--mono)", width: "100px" }}
                  value={form.hora}
                  onChange={(e) =>
                    setForm((p) => ({ ...p, hora: e.target.value }))
                  }
                />
                <button className="btn btn-g" onClick={agregar}>
                  Agregar
                </button>
              </div>
            </div>

            {/* FILTROS */}
            <div
              style={{
                display: "flex",
                gap: "10px",
                alignItems: "center",
                marginBottom: "16px",
              }}
            >
              <div className="tabs-container">
                {[
                  ["pendientes", "⏳ Pendientes"],
                  ["resueltos", "✅ Resueltos"],

      /* MÓDULO 7: CONFIGURACIÓN               */

      function SeccionConfig() {
        const [cfg, setCfg] = useState(() => getData("hgsp_config") || {});
        const [editMode, setEditMode] = useState(false);
        const [draft, setDraft] = useState({});
        const [modalClear, setModalClear] = useState(false);
        const [clearPin, setClearPin] = useState("");
        const [nuevoOS, setNuevoOS] = useState({
          nombre: "",
          valorOrden: "",
          valorCoseguro: "",
        });
        // Secciones colapsables: todas cerradas por defecto
        const [open, setOpen] = useState({
          prestador: false,
          economicos: false,
          os: false,
          backup: false,
        });
        function toggle(sec) {
          setOpen((o) => ({ ...o, [sec]: !o[sec] }));
        }

        function startEdit() {
          const d = JSON.parse(JSON.stringify(cfg));
          if (!Array.isArray(d.obrasSociales)) d.obrasSociales = [];
          setDraft(d);
          setEditMode(true);
        }
        function saveEdit() {
          setData("hgsp_config", draft);
          setCfg(JSON.parse(JSON.stringify(draft)));
          setEditMode(false);
          showToast("✅ Configuración guardada");
        }
        function cancelEdit() {
          setEditMode(false);
        }
        function upd(k, v) {
          setDraft((d) => ({ ...d, [k]: v }));
        }
        function updOS(id, k, v) {
          setDraft((d) => ({
            ...d,
            obrasSociales: (d.obrasSociales || []).map((os) =>
              os.id === id ? { ...os, [k]: v } : os,
            ),
          }));
        }
        function removeOS(id) {
          setDraft((d) => ({
            ...d,
            obrasSociales: (d.obrasSociales || []).filter((os) => os.id !== id),
          }));
        }
        function addOS() {
          if (!nuevoOS.nombre.trim()) return;
          setDraft((d) => ({
            ...d,
            obrasSociales: [
              ...(d.obrasSociales || []),
              {
                id: genId(),
                nombre: nuevoOS.nombre.trim(),
                valorOrden: Number(nuevoOS.valorOrden) || 0,
                valorCoseguro: Number(nuevoOS.valorCoseguro) || 0,
              },
            ],
          }));
          setNuevoOS({ nombre: "", valorOrden: "", valorCoseguro: "" });
        }

        function handleClear() {
          if (clearPin !== "1234") return;
          Object.keys(localStorage).forEach((key) => {
            if (key.startsWith("hgsp_")) localStorage.removeItem(key);
          });
          setClearPin("");
          setModalClear(false);
          window.location.reload();
        }

        function handleExport() {
          const data = {};
          Object.keys(localStorage).forEach((key) => {
            if (key.startsWith("hgsp_")) {
              try {
                data[key] = JSON.parse(localStorage.getItem(key));
              } catch (e) {
                data[key] = localStorage.getItem(key);
              }
            }
          });
          const blob = new Blob([JSON.stringify(data, null, 2)], {
            type: "application/json",
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `backup_clinica_${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          showToast("💾 Backup exportado correctamente");
        }

        function handleImport() {
          const input = document.createElement("input");
          input.type = "file";
          input.accept = ".json";
          input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = JSON.parse(event.target.result);
                Object.keys(data).forEach((key) => {
                  if (key.startsWith("hgsp_")) {
                    localStorage.setItem(
                      key,
                      typeof data[key] === "string"
                        ? data[key]
                        : JSON.stringify(data[key]),
                    );
                  }
                });
                showToast("✅ Datos importados. Reiniciando...");
                setTimeout(() => window.location.reload(), 1500);
              } catch (err) {
                showToast("❌ Error: El archivo no es un backup válido");
              }
            };
            reader.readAsText(file);
          };
          input.click();
        }

        /* helpers de render */
        const D = editMode ? draft : cfg;
        const monoLabel = {
          fontFamily: "var(--mono)",
          fontSize: "10px",
          color: "var(--tx3)",
          textTransform: "uppercase",

      /* Convierte "HH:MM" a horas decimales normalizadas.
         Horas 00:00–06:00 se tratan como "tarde" (hora+24).
         Ej: "02:15" → 26.25 | "23:30" → 23.5 */
      function normalizarHoraSueno(horaStr) {
        if (!horaStr) return null;
        const [h, m] = horaStr.split(":").map(Number);
        const dec = h + m / 60;
        return dec < 6 ? dec + 24 : dec;
      }

      /* Duración en minutos entre acostarse y despertar */
      function calcularDuracionMin(
        fechaDormir,
        horaAcostarse,
        fechaDespertar,
        horaDespertar,
      ) {
        if (!fechaDormir || !horaAcostarse || !fechaDespertar || !horaDespertar)
          return null;
        const inicio = new Date(`${fechaDormir}T${horaAcostarse}:00`);
        const fin = new Date(`${fechaDespertar}T${horaDespertar}:00`);
        const diff = fin - inicio;
        return diff > 0 ? Math.round(diff / 60000) : null;
      }

      /* Horas decimales normalizadas → "HH:MM"
         Ej: 26.25 → "02:15" | 23.5 → "23:30" */
      function horaDecAStr(dec) {
        if (dec === null || dec === undefined) return "--:--";
        const h = Math.floor(dec % 24);
        const m = Math.round((dec % 1) * 60);
        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
      }

      /* Minutos → "Xh YYm" */
      function minAHoras(min) {
        if (!min) return "--";
        const h = Math.floor(min / 60);
        const m = min % 60;
        return m > 0 ? `${h}h ${String(m).padStart(2, "0")}m` : `${h}h`;
      }

      /* Racha actual: días consecutivos cumpliendo meta (hacia atrás desde el más reciente) */
      function calcularRachaSueno(registros, metaHora) {
        if (!registros.length || !metaHora) return 0;
        const metaN = normalizarHoraSueno(metaHora);
        const sorted = [...registros].sort((a, b) =>
          b.fechaDespertar.localeCompare(a.fechaDespertar),
        );
        let racha = 0;
        for (let i = 0; i < sorted.length; i++) {
          if (i > 0) {
            const prev = sorted[i - 1];
            const pd = new Date(prev.fechaDespertar + "T12:00:00");
            pd.setDate(pd.getDate() - 1);
            const exp = `${pd.getFullYear()}-${String(pd.getMonth() + 1).padStart(2, "0")}-${String(pd.getDate()).padStart(2, "0")}`;
            if (sorted[i].fechaDespertar !== exp) break;
          }
          const horaReg = normalizarHoraSueno(sorted[i].horaAcostarse);
          if (horaReg !== null && horaReg <= metaN) racha++;
          else break;
        }
        return racha;
      }

      /* % de días cumpliendo meta en los últimos N días */
      function cumplimientoSueno(registros, metaHora, dias) {
        if (!registros.length || !metaHora) return 0;
        const metaN = normalizarHoraSueno(metaHora);
        const corte = new Date();
        corte.setDate(corte.getDate() - dias);
        const rec = registros.filter(
          (r) => new Date(r.fechaDespertar + "T12:00:00") >= corte,
        );
        if (!rec.length) return 0;
        const ok = rec.filter(
          (r) => normalizarHoraSueno(r.horaAcostarse) <= metaN,
        ).length;
        return Math.round((ok / rec.length) * 100);
      }

      /* Promedio hora acostarse (últimos N días) → string "HH:MM" */
      function promedioHoraSueno(registros, dias) {
        const corte = new Date();
        corte.setDate(corte.getDate() - dias);
        const rec = registros.filter(
          (r) => new Date(r.fechaDespertar + "T12:00:00") >= corte,
        );
        if (!rec.length) return null;
        const suma = rec.reduce(
          (a, r) => a + (normalizarHoraSueno(r.horaAcostarse) || 0),
          0,
        );
        return horaDecAStr(suma / rec.length);
      }

      /* Mediana de hora de acostarse (últimos N días) → string "HH:MM"
         La mediana ignora valores extremos y refleja mejor el patrón real */
      function medianaHoraSueno(registros, dias) {
        const corte = new Date();
        corte.setDate(corte.getDate() - dias);
        const rec = registros.filter(
          (r) => new Date(r.fechaDespertar + "T12:00:00") >= corte,
        );
        if (!rec.length) return null;
        const valores = rec
          .map((r) => normalizarHoraSueno(r.horaAcostarse))
          .filter((v) => v !== null)
          .sort((a, b) => a - b);
        if (!valores.length) return null;
        const mid = Math.floor(valores.length / 2);
        const med =
          valores.length % 2 === 0
            ? (valores[mid - 1] + valores[mid]) / 2
            : valores[mid];
        return horaDecAStr(med);
      }

      /* Mensaje motivacional — tono sobrio, directo */
      function mensajeSueno(registros, config) {
        if (!registros.length)
          return "Empezá registrando anoche. No hace falta que sea perfecto, solo que sea real.";
        const metaHora = config?.metaHoraAcostarse || "01:00";
        const metaN = normalizarHoraSueno(metaHora);
        const sorted = [...registros].sort((a, b) =>
          b.fechaDespertar.localeCompare(a.fechaDespertar),
        );
        const ultimo = sorted[0];
        const racha = calcularRachaSueno(registros, metaHora);
        const cumpl7 = cumplimientoSueno(registros, metaHora, 7);
        const cumplioAnoche =
          normalizarHoraSueno(ultimo.horaAcostarse) <= metaN;
        if (racha >= 7)
          return `${racha} días seguidos cumpliendo la meta. Esto ya no es casualidad, es un hábito formándose.`;
        if (racha >= 3) return `${racha} días seguidos. Va tomando forma.`;
        if (cumplioAnoche && racha < 3)
          return "Bien anoche. Lo importante ahora es repetir.";
        if (!cumplioAnoche && cumpl7 >= 60)
          return "Una noche fuera del objetivo no rompe el proceso. Lo que cuenta es el patrón de la semana.";
        if (!cumplioAnoche && cumpl7 < 40)
          return "Ajustá la meta si hace falta. Una meta alcanzable es mejor que una ideal que se siente inalcanzable.";
        return "Seguí registrando. Lo que se mide, se puede cambiar.";
      }

      /* Sugerencia de próximo objetivo */
      function sugerirObjetivo(registros, config) {
        if (!config)
          return {
            sugerir: false,
            mensaje: "Configurá tu meta inicial para activar sugerencias.",
          };
        const corte = new Date();
        corte.setDate(corte.getDate() - 14);
        const rec = registros.filter(
          (r) => new Date(r.fechaDespertar + "T12:00:00") >= corte,
        );
        if (rec.length < 7)
          return {
            sugerir: false,
            mensaje:
              "Seguí registrando para que pueda sugerirte un próximo paso.",
          };
        const metaHora = config.metaHoraAcostarse;
        const metaN = normalizarHoraSueno(metaHora);
        const cumpl = cumplimientoSueno(registros, metaHora, 14);
        const promN =
          rec.reduce(
            (a, r) => a + (normalizarHoraSueno(r.horaAcostarse) || 0),
            0,
          ) / rec.length;
        if (cumpl >= 70) {
          return {
            sugerir: true,
            nuevaMeta: horaDecAStr(metaN - 0.5),
            razon: `Cumpliste la meta el ${cumpl}% de los últimos 14 días. Probemos adelantar 30 minutos.`,
          };
        }
        if (cumpl >= 40)
          return {
            sugerir: false,
            mensaje: "Seguí consolidando la meta actual antes de avanzar.",
          };
        return {
          sugerir: true,
          nuevaMeta: horaDecAStr(promN - 0.25),
          razon:
            "Ajustemos la meta a algo más cercano a tu ritmo actual. Pequeños pasos son más sostenibles.",
        };
      }

      /* ── Gráfico semanal (barras) ── */
      function SuenoChartSemanal({ registros, metaHora }) {
        const canvasRef = useRef(null);
        const chartRef = useRef(null);
        useEffect(() => {
          if (!canvasRef.current) return;
          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }
          const metaN = normalizarHoraSueno(metaHora) || 25;
          const dias = [];
          for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dias.push(dateStr(d));
          }
          const labels = dias.map((d) => {
            const w = new Date(d + "T12:00:00").getDay();
            return ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"][w];
          });
          const values = dias.map((d) => {
            const r = registros.find((x) => x.fechaDespertar === d);
            return r ? normalizarHoraSueno(r.horaAcostarse) : null;
          });
          const colors = values.map((v) =>
            v === null
              ? "rgba(160,153,140,.25)"
              : v <= metaN
                ? "#4A7C5F"
                : v <= metaN + 1
                  ? "#C8922A"
                  : "#C85A2A",
          );
          chartRef.current = new Chart(canvasRef.current, {
            type: "bar",
            data: {
              labels,
              datasets: [
                {
                  label: "Acostarse",
                  data: values,
                  backgroundColor: colors,
                  borderRadius: 6,
                  borderSkipped: false,
                },
                {
                  type: "line",
                  label: "Meta",
                  data: Array(7).fill(metaN),
                  borderColor: "#C8922A",
                  borderWidth: 2,
                  borderDash: [6, 4],
                  pointRadius: 0,
                  fill: false,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: {
                  min: 20,
                  max: 32,
                  ticks: {
                    callback: (v) => horaDecAStr(v),
                    color: "#7A9485",
                    font: { family: "'DM Mono', monospace", size: 11 },
                  },
                  grid: { color: "rgba(45,90,61,.12)" },
                },
                x: {
                  ticks: {
                    color: "#4A6357",
                    font: { family: "'Nunito', sans-serif", size: 12 },
                  },
                  grid: { display: false },
                },
              },
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: (ctx) => {
                      if (ctx.datasetIndex === 1) return `Meta: ${metaHora}`;
                      if (ctx.raw === null) return "Sin registro";
                      const r = registros.find(
                        (x) => x.fechaDespertar === dias[ctx.dataIndex],
                      );
                      return [
                        `Acostarse: ${horaDecAStr(ctx.raw)}`,
                        r ? `Dormido: ${minAHoras(r.duracionMin)}` : "",
                      ];
                    },
                  },
                },
              },
            },
          });
          return () => {
            if (chartRef.current) {
              chartRef.current.destroy();
              chartRef.current = null;
            }
          };
        }, [registros, metaHora]);
        return (
          <div style={{ height: "200px", position: "relative" }}>
            <canvas ref={canvasRef} />
          </div>
        );
      }

      /* ── Gráfico mensual (línea) ── */

      /* ── Modal único de registro de sueño ── */
      function ModalRegistroSueno({ onClose, onGuardar }) {
        const hoy = dateStr(new Date());
        const ayer = dateStr(new Date(Date.now() - 86400000));
        const [f, setF] = useState({
          fechaDormir: ayer,
          horaAcostarse: "",
          fechaDespertar: hoy,
          horaDespertar: "",
          calidad: 3,
          notas: "",
        });
        const [mostrarCalidad, setMostrarCalidad] = useState(false);
        const [mostrarNotas, setMostrarNotas] = useState(false);
        const [warn, setWarn] = useState(null);

        /* Inputs de hora en texto puro 24h — sin AM/PM */
        function fmtHora(v) {
          const d = v.replace(/\D/g, "").slice(0, 4);
          return d.length > 2 ? d.slice(0, 2) + ":" + d.slice(2) : d;
        }
        function completarHora(v) {
          const d = v.replace(/\D/g, "");
          if (!d) return "";
          if (d.length === 1) return "0" + d + ":00";
          if (d.length === 2) return d + ":00";
          if (d.length === 3) return "0" + d[0] + ":" + d.slice(1);
          return d.slice(0, 2) + ":" + d.slice(2, 4);
        }
        function validarHora(v) {
          if (!/^\d{2}:\d{2}$/.test(v)) return false;
          const [h, m] = v.split(":").map(Number);
          return h <= 23 && m <= 59;
        }

        function construirReg() {
          const dur = calcularDuracionMin(
            f.fechaDormir,
            f.horaAcostarse,
            f.fechaDespertar,
            f.horaDespertar,
          );
          return {
            id: genId(),
            ...f,
            duracionMin: dur,
            fechaRegistro: new Date().toISOString(),
          };
        }

        function guardar() {
          if (!f.horaAcostarse || !f.horaDespertar) {
            showToast("Ingresá la hora de acostarte y despertarte.", "warn");
            return;
          }
          if (!validarHora(f.horaAcostarse) || !validarHora(f.horaDespertar)) {
            showToast(
              "Hora inválida. Usá el formato HH:MM (00:00 – 23:59).",
              "warn",
            );
            return;
          }
          const reg = construirReg();
          if (reg.duracionMin > 900) {
            setWarn(reg);
            return;
          }
          onGuardar(reg);
          onClose();
        }

        if (warn) {
          const h = Math.floor(warn.duracionMin / 60),
            m = warn.duracionMin % 60;
          return (
            <div
              style={{
                position: "fixed",
                inset: 0,
                background: "rgba(30,61,43,.55)",
                zIndex: 300,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                padding: "16px",
              }}
            >
              <div
                style={{
                  background: "var(--vd)",
                  border: "2px solid var(--vm)",
                  borderRadius: "var(--r)",
                  width: "100%",
                  maxWidth: "420px",
                  overflow: "hidden",
                }}
              >
                <div
                  style={{
                    height: "4px",
                    background: "linear-gradient(90deg,var(--do),#E8B84B)",
                  }}
                />
                <div style={{ padding: "24px" }}>
                  <div
                    style={{
                      fontFamily: "var(--serif)",
                      fontSize: "17px",
                      color: "var(--do)",
                      marginBottom: "12px",
                    }}
                  >
                    ⚠️ Verificá la duración
                  </div>
                  <div
                    style={{
                      color: "rgba(255,255,255,.82)",
                      fontSize: "13px",
                      lineHeight: 1.7,
                      marginBottom: "20px",
                    }}
                  >
                    La duración calculada es de{" "}
                    <strong style={{ color: "var(--do)" }}>
                      {h} horas {m} minutos
                    </strong>
                    . Verificá que las fechas y horas ingresadas sean correctas.
                  </div>
                  <div style={{ display: "flex", gap: "10px" }}>
                    <button
                      type="button"
                      onClick={() => setWarn(null)}
                      style={{
                        flex: 1,
                        padding: "10px",
                        borderRadius: "50px",
                        border: "1px solid rgba(255,255,255,.2)",
                        background: "transparent",
                        color: "rgba(255,255,255,.7)",
                        cursor: "pointer",
                        fontFamily: "var(--sans)",
                        fontWeight: 600,
                      }}
                    >
                      Revisar
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        onGuardar(warn);
                        onClose();
                      }}
                      style={{
                        flex: 1,
                        padding: "10px",
                        borderRadius: "50px",
                        background: "var(--do)",
                        color: "var(--vd)",
                        border: "none",
                        cursor: "pointer",
                        fontWeight: 700,
                        fontFamily: "var(--sans)",
                      }}
                    >
                      Guardar igual
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        return (

              background: "rgba(30,61,43,.55)",
